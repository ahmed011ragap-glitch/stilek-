<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>إدارة الطلبات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:#121212;color:#e0e0e0;padding:15px;min-height:100vh}

.user-bar{background:#1e1e1e;border:1px solid #333;border-radius:10px;padding:12px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.user-bar span{font-size:14px;color:#b0b0b0}
.user-bar strong{color:#4caf50}
.user-type{padding:4px 10px;background:#2a2a2a;border-radius:6px;font-size:12px;color:#00ff88}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:10px;flex-wrap:wrap}
.header h2{color:#ffffff;font-size:24px}
.search-box{flex:1;min-width:250px;padding:12px;border:1px solid #444;border-radius:8px;background:#2a2a2a;color:#e0e0e0;font-size:14px}
.search-box:focus{outline:none;border-color:#1e88e5}

.orders-list{display:flex;flex-direction:column;gap:15px}
.order-card{background:#1e1e1e;border:1px solid #333;border-radius:12px;padding:15px;transition:0.3s}
.order-card:hover{border-color:#444}

.order-header{display:flex;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.order-header h4{color:#fff;font-size:16px;font-weight:700}
.order-header span{font-size:13px;color:#b0b0b0}

.order-info{font-size:14px;color:#b0b0b0;margin-bottom:12px;line-height:1.8}

.products-list{margin-top:8px;padding-top:8px;border-top:1px solid #333}
.product-item{display:flex;gap:10px;margin-bottom:10px;padding:8px;background:#2a2a2a;border-radius:6px}
.product-item img{width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid #444}
.product-item-info{flex:1;font-size:13px;color:#81c784;line-height:1.6}
.product-code{color:#00ff88;font-weight:bold}

.progress-bar{position:relative;display:flex;justify-content:space-between;margin:25px 0 10px}
.progress-line{position:absolute;top:15px;left:0;right:0;height:3px;background:#333;z-index:1}
.progress-fill{position:absolute;top:15px;left:0;height:3px;background:#4caf50;z-index:2;transition:width 0.5s}
.step{position:relative;z-index:3;text-align:center;flex:1}
.step-dot{width:30px;height:30px;border-radius:50%;background:#333;border:3px solid #1e1e1e;margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#777;transition:0.3s}
.step.completed .step-dot{background:#4caf50;color:#fff;border-color:#4caf50}
.step.active .step-dot{background:#4caf50;color:#fff;border-color:#4caf50;box-shadow:0 0 10px #4caf50}
.step.last{flex:1.3}
.step.last .step-dot{width:40px;height:30px;border-radius:15px}
.step-label{font-size:11px;color:#b0b0b0}
.step.active .step-label{color:#4caf50;font-weight:bold}

.loading{text-align:center;padding:50px;color:#b0b0b0;font-size:16px}

.menu-btn{position:fixed;top:15px;right:15px;font-size:28px;color:#00ff88;cursor:pointer;z-index:1001;background:#151515;width:45px;height:45px;border-radius:12px;display:flex;align-items:center;justify-content:center;border:1px solid #333;box-shadow:0 4px 15px rgba(0,0,0,0.5)}
.sidebar{position:fixed;top:0;right:-300px;width:280px;height:100%;background:#0a0a0a;border-left:2px solid #00ff88;transition:right 0.3s ease;z-index:1002;overflow-y:auto;direction:rtl}
.sidebar.active{right:0}
.sidebar-header{padding:20px;background:#151515;border-bottom:2px solid #00ff88;display:flex;justify-content:space-between;align-items:center;color:#00ff88;font-size:20px;font-weight:900}
.sidebar-header button{background:none;border:none;color:#ff4444;font-size:32px;cursor:pointer;line-height:1}
.sidebar-menu{padding:15px 0}
.sidebar-menu a{display:block;padding:18px 20px;color:#e0e0e0;text-decoration:none;font-size:16px;font-weight:600;margin:4px 10px;border-radius:8px;transition:0.2s;border-right:4px solid transparent}
.sidebar-menu a:hover{background:#151515;color:#00ff88;border-right:4px solid #00ff88;padding-right:30px}
.sidebar-menu a.active{background:#151515;color:#00ff88;border-right:4px solid #00ff88;font-weight:800}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;z-index:1001}
.overlay.active{display:block}
</style>
</head>
<body>

<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <span>القائمة</span>
    <button onclick="toggleSidebar()">×</button>
  </div>
  <div class="sidebar-menu">
    <a href="#" id="menu-dashboard" onclick="loadPage('Data_Page')">🏠 لوحة البيانات</a>
    <a href="#" id="menu-add_product" onclick="loadPage('add_product')">➕ إضافة منتج</a>
    <a href="#" id="menu-your_products" onclick="loadPage('your_products')">📦 منتجاتي</a>
    <a href="#" id="menu-manage_orders" class="active" onclick="loadPage('manage_orders')">📋 إدارة الطلبات</a>
    <a href="#" id="menu-my_wallet" onclick="loadPage('my_wallet')">💰 المحفظة</a>
    <a href="#" id="menu-index" onclick="loadPage('index')">🚪 تسجيل خروج</a>
  </div>
</div>

<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<div id="userBar" class="user-bar">
  <span>المستخدم: <strong id="userName">-</strong></span>
  <span>اليوزر: <strong id="userCode">-</strong></span>
  <span class="user-type" id="userTypeLabel">مورد</span>
</div>

<div class="header">
  <h2 id="pageTitle">طلبات منتجاتي</h2>
  <input type="text" class="search-box" id="searchPhone" placeholder="ابحث برقم تليفون العميل..." onkeyup="filterOrders()">
</div>

<div id="loading" class="loading">جاري تحميل الطلبات...</div>
<div id="ordersList" class="orders-list"></div>

<script>
const SUPABASE_URL = 'https://zphepebjpxrzpudncuas.supabase.co';
const SUPABASE_KEY = 'sb_publishable_tIG9XDZeHVZpZjz74e-dBA_ui5GIYw7';

const urlParams = new URLSearchParams(window.location.search);
let currentUser = urlParams.get('user') || sessionStorage.getItem('username') || localStorage.getItem('username') || '';
let userType = urlParams.get('type') || 'supplier'; 

if(currentUser) {
  localStorage.setItem('username', currentUser);
  sessionStorage.setItem('username', currentUser);
}

let allOrders = [];
let supplierProductIds = []; 

window.onload = function() {
  if(!currentUser) {
    document.getElementById('loading').innerHTML = 'خطأ: لم يتم التعرف على المستخدم. يرجى إعادة تسجيل الدخول.';
    return;
  }
  document.getElementById('userCode').innerText = currentUser;
  
  if(userType == 'marketer') {
    document.getElementById('pageTitle').innerText = 'طلباتي كمسوق';
    document.getElementById('userTypeLabel').innerText = 'مسوق';
    document.getElementById('searchPhone').placeholder = 'ابحث برقم الأوردر أو العميل...';
  } else {
    document.getElementById('pageTitle').innerText = 'طلبات منتجاتي';
    document.getElementById('userTypeLabel').innerText = 'مورد';
  }

  initializeApp();
}

async function supabaseApi(endpoint, options = {}) {
  const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    ...options.headers
  };
  const response = await fetch(url, { ...options, headers });
  if (!response.ok) {
    const error = await response.text();
    throw new Error(`خطأ ${response.status}: ${error}`);
  }
  return await response.json();
}

async function initializeApp() {
  try {
    // تم الإصلاح هنا: استدعاء اسم الجدول مباشرة بدون رموز تشفير إضافية
    const tableEndpoint = 'Marketer_Products';
    const userData = await supabaseApi(`${tableEndpoint}?username=eq.${encodeURIComponent(currentUser)}&select=*`);
    
    if(userData && userData.length > 0) {
      document.getElementById('userName').innerText = userData[0].name || currentUser;
      supplierProductIds = userData.map(p => p.product_id);
    }

    await loadOrders();
  } catch(err) {
    console.error(err);
    document.getElementById('loading').innerHTML = 'خطأ أثناء الاتصال بالسيرفر: ' + err.message;
  }
}

async function loadOrders() {
  try {
    let orders = [];
    
    if (userType === 'marketer') {
      orders = await supabaseApi(`orders?marketer_username=eq.${encodeURIComponent(currentUser)}&select=*`);
    } else {
      const fetchedOrders = await supabaseApi(`orders?select=*`);
      orders = fetchedOrders.filter(order => supplierProductIds.includes(order.product_id));
    }

    allOrders = orders || [];

    if(allOrders.length === 0) {
      document.getElementById('loading').innerHTML = 'لا توجد طلبات حالياً تخص منتجاتك.';
      return;
    }

    await displayOrders(allOrders);
  } catch(err) {
    document.getElementById('loading').innerHTML = 'فشل في تحميل الطلبات: ' + err.message;
  }
}

async function displayOrders(orders) {
  const list = document.getElementById('ordersList');
  const loading = document.getElementById('loading');
  loading.style.display = 'none';
  list.innerHTML = '';

  let html = '';
  const tableEndpoint = 'Marketer_Products';

  for(let order of orders) {
    try {
      let products = [];
      if(order.product_id) {
        const productResult = await supabaseApi(`${tableEndpoint}?product_id=eq.${encodeURIComponent(order.product_id)}&select=*`);
        if(productResult && productResult.length > 0) {
          const p = productResult[0];
          products.push({
            code: p.product_id,
            name: p.name,
            qty: order.qty || 1,
            price: order.price || 0,
            size: order.size || '',
            color: order.color || '',
            image_url: p.image_url || p.thumbnail || ''
          });
        } else {
          products.push({
            code: order.product_id,
            name: 'منتج غير معروف',
            qty: order.qty || 1,
            price: order.price || 0,
            size: order.size || '',
            color: order.color || '',
            image_url: ''
          });
        }
      }
      
      const stage = getOrderStage(order.order_status, order.created_at);
      const progressWidth = (stage * 33.33) + '%';

      let productsDisplay = '';
      for(let p of products) {
        productsDisplay += `
          <div class="product-item">
            <img src="${p.image_url || 'https://via.placeholder.com/60x60/2a2a2a/888?text=No+Img'}" onerror="this.src='https://via.placeholder.com/60x60/2a2a2a/888?text=No+Img'">
            <div class="product-item-info">
              <div class="product-code">كود المنتج: ${p.code}</div>
              <div>الاسم: ${p.name}</div>
              <div>الكمية: ${p.qty} قطعة ${p.size ? '- مقاس: ' + p.size : ''} ${p.color ? '- لون: ' + p.color : ''}</div>
              <div>السعر المحسوب: ${p.price} ج.م</div>
            </div>
          </div>
        `;
      }

      html += `
      <div class="order-card">
        <div class="order-header">
          <h4>العميل: ${order.customer_name || 'بدون اسم'}</h4>
          <span>📞 تليفون: ${order.phone || '-'}</span>
          <span>📍 المحافظة: ${order.governorate || ''} ${order.city ? '- ' + order.city : ''}</span>
        </div>

        <div class="order-info">
          <div style="margin-bottom:8px">رقم الأوردر: <strong style="color:#00ff88">${order.order_id}</strong></div>
          <div class="products-list">${productsDisplay}</div>
          <div style="margin-top:8px; color:#eee;">العنوان بالكامل: ${order.address || '-'}</div>
          <div style="margin-top:4px; color:#aaa;">ملاحظات: ${order.notes || 'لا يوجد'}</div>
        </div>

        <div class="progress-bar">
          <div class="progress-line"></div>
          <div class="progress-fill" style="width:${progressWidth}"></div>
          <div class="step ${stage >= 0 ? 'completed' : ''}"><div class="step-dot">✓</div><div class="step-label">تغليف</div></div>
          <div class="step ${stage >= 1 ? 'completed' : ''} ${stage == 1 ? 'active' : ''}"><div class="step-dot">🚚</div><div class="step-label">شحن</div></div>
          <div class="step ${stage >= 2 ? 'completed' : ''} ${stage == 2 ? 'active' : ''}"><div class="step-dot">📦</div><div class="step-label">توصيل</div></div>
          <div class="step last ${stage >= 3 ? 'completed active' : ''}"><div class="step-dot">تم</div><div class="step-label">تم التسليم</div></div>
        </div>
      </div>
      `;
    } catch(e) {
      console.error('Error rendering individual order:', e);
    }
  }

  list.innerHTML = html;
}

function getOrderStage(status, created_at) {
  const s = (status || '').trim();
  if(s === 'تم التسليم' || s === 'delivered' || s === 'completed') return 3;
  if(s === 'استلام' || s === 'توصيل' || s === 'shipped') return 2;
  if(s === 'جديد' || s === 'pending') return 1;
  
  const created = new Date(created_at);
  const now = new Date();
  const diffDays = (now - created) / (1000 * 60 * 60 * 24);
  if(diffDays < 2) return 0;
  if(diffDays < 5) return 1;
  if(diffDays < 15) return 2;
  return 3;
}

function filterOrders() {
  const val = document.getElementById('searchPhone').value.trim().toLowerCase();
  const filtered = allOrders.filter(o => 
    (o.phone || '').includes(val) || 
    (o.customer_name || '').toLowerCase().includes(val) ||
    (o.order_id || '').toLowerCase().includes(val)
  );
  displayOrders(filtered);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('active');
  document.getElementById('overlay').classList.toggle('active');
}

function loadPage(pageName) {
  toggleSidebar();
  window.location.href = pageName + '.html?user=' + encodeURIComponent(currentUser) + '&type=' + userType;
}
</script>

</body>
</html>
