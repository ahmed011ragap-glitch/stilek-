    .fl { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:4px; }
    .fi { width:100%; padding:10px 12px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:14px; font-family:"Tajawal",sans-serif; transition:.2s; }

    .fi-gold { border-color:var(--gold-light); }

    .sum-box { background:var(--bg); border-radius:var(--radius-sm); padding:12px 14px; border:1px solid var(--border); }

    .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
    .btn { padding:12px; border-radius:var(--radius-sm); font-weight:700; font-size:15px; text-align:center; cursor:pointer; transition:.2s; border:none; font-family:"Tajawal",sans-serif; }

    .alert { padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; margin-bottom:10px; }
    .alert-danger { background:var(--red-light); color:var(--red); border:1px solid var(--red); }
    .alert-success { background:var(--green-light); color:var(--green); border:1px solid var(--green); }

function cleanText(t){ 
  if(!t) return '';
  return t.replace(/[«»""''()\[\]{}]/g, '')
          .replace(/[\<\>\/\\|;:\*\?]/g, '')
          .replace(/\s+/g, ' ')
          .trim(); 
}

function esc(s){ return(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function sellP(b){ const v=parseFloat(b)||0; return v+SITE_PROFIT; }
function comm(b){ const v=parseFloat(b)||0; if(v<100)return 50; if(v<200)return 80; if(v<400)return 150; if(v<500)return 200; return 250; }
function iurl(u){ return u?.toString().trim()||'https://placehold.co/400x400/2a2a2a/808080?text=🛍️'; }

function checkPromoBonus() {
  const userCreatedAt = localStorage.getItem('userCreatedAt');
  if (userCreatedAt) {
    const regDate = new Date(userCreatedAt);
    const currentDate = new Date();
    const diffTime = Math.abs(currentDate - regDate);
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    if (diffDays <= 30) return 5;
  }
  return 0;
}

async function req(ep, opts={}){
  let maxRetries = 3;
  let attempt = 0;
  while (attempt < maxRetries) {
    try {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${ep}`, {
        ...opts,
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          ...opts.headers
        }
      });
      const text = await r.text();
      if (!r.ok) {
        throw new Error(text || `HTTP error! status: ${r.status}`);
      }
      return text ? JSON.parse(text) : {};
    } catch (error) {
      attempt++;
      if (attempt >= maxRetries) {
        throw new Error(`فشل الاتصال بعد ${maxRetries} محاولات. السبب: ${error.message}`);
      }
      await new Promise(resolve => setTimeout(resolve, 1000 * attempt));
    }
  }
}

async function callApi(action,data={}){
  try{
    switch(action){
      case 'get_product':{
        const p=await req(`products?product_id=eq.${data.product_id}&select=*`);
        if(Array.isArray(p)&&p.length){ const v=await req(`product_variants?product_id=eq.${data.product_id}&select=*`); return [{...p[0],variants:Array.isArray(v)?v:[]}]; }
        return p;
      }
      case 'place_order':{
        return await req('orders',{method:'POST',body:JSON.stringify(data)});
      }
      default: return {status:'error'};
    }
  }catch(e){ return {status:'error',message:e.message}; }
}

async function updateStockAfterOrder(productId, size, color, qty){
  try{
    const variants=await req(`product_variants?product_id=eq.${productId}&select=*`);
    if(!Array.isArray(variants)||variants.length===0)return false;
    
    const matchedVariant=variants.find(v=>v.size===size&&v.color===color);
    if(matchedVariant){
      const currentStock=parseInt(matchedVariant.stock)||0;
      const newStock=Math.max(0,currentStock-qty);
      
      await req(`product_variants?id=eq.${matchedVariant.id}`,{method:'PATCH',body:JSON.stringify({stock:newStock})});
      
      const totalStock=variants.reduce((sum,v)=>{
        if(v.id===matchedVariant.id)return sum+newStock;
        return sum+(parseInt(v.stock)||0);
      },0);
      
      await req(`products?product_id=eq.${productId}`,{method:'PATCH',body:JSON.stringify({stock:totalStock})});
      return true;
    }
    return false;
  }catch(e){ console.error('خطأ في تحديث المخزون:',e); return false; }
}

      <div class="sum-row"><span>رسوم الشحن الرسمية</span><span style="color:var(--muted);" id="shippingDisplay">115 ج</span></div>
      ${promoRowHtml}
      <div class="sum-total"><span>الإجمالي النهائي</span><span id="totalAmount">${totalProductsPrice + (defaultComm * totalQty) + 115 + promoBonus} ج</span></div>
    </div>
    <div id="alertContainer"></div>
    <div class="btn-row"><button class="btn btn-primary" onclick="submitOrder()">✅ تأكيد وإرسال الطلب</button><button class="btn btn-sec" onclick="goBack()">← رجوع</button></div>
  `;
}

function updateCities(){
  const gov=document.getElementById('oGovernorate').value, cs=document.getElementById('oCity');
  cs.innerHTML='<option value="">اختر المدينة / المركز</option>';
  if(gov&&CITIES[gov]) { 
    CITIES[gov].forEach(c=>{ cs.innerHTML+=`<option value="${c}">${c}</option>`; }); 
  }
  updateOrderTotal();
}

function updateOrderTotal(){
  const ci=document.getElementById('oCommission'), cd=document.getElementById('commissionDisplay'), td=document.getElementById('totalAmount'), sd=document.getElementById('shippingDisplay');
  const commPerItemTxt = document.getElementById('commPerItemTxt');
  if(!ci||!cd||!td)return;
  
  const cv = parseFloat(ci.value) || 0; 
  if(commPerItemTxt) commPerItemTxt.textContent = cv;
  
  const totalComm = cv * totalQty;
  cd.textContent = totalComm + ' ج';
  
  const gov = document.getElementById('oGovernorate')?.value || '', ship = getShippingCost(gov);
  if(sd) sd.textContent = ship + ' ج';
  
  const promoBonus = checkPromoBonus();
  td.textContent = (totalProductsPrice + totalComm + ship + promoBonus) + ' ج';
}

async function sendSupplierEmailNotification(emailData) {
  try {
    await req('supplier_emails', {
      method: 'POST',
      body: JSON.stringify({
        supplier_id: emailData.supplier_id,
        subject: `طلب جديد رقم ${emailData.order_id}`,
        body_content: `مرحباً، تم استلام طلب جديد رقم: ${emailData.order_id}\n\n` +
                      `المنتج: ${emailData.product_name}\n` +
                      `العميل: ${emailData.customer_name}\n` +
                      `الهاتف: ${emailData.phone}\n` +
                      `المحافظة: ${emailData.governorate}\n` +
                      `المدينة: ${emailData.city}\n` +
                      `العنوان: ${emailData.address}\n` +
                      `الكمية: ${emailData.qty}\n` +
                      `المقاس: ${emailData.size}\n` +
                      `اللون: ${emailData.color}\n` +
                      `إجمالي الربح: ${emailData.supplier_profit} ج\n` +
                      `تاريخ ووقت الطلب: ${emailData.timestamp}`
      })
    });
  } catch(e) {
    console.warn("إشعار البريد الإلكتروني لم يصل للمورد، لكن تم حفظ الأوردر بنجاح:", e.message);
  }
}

async function submitOrder(){
  if (isSubmitting) return;

  const name = cleanText(document.getElementById('oName').value);
  const phone = document.getElementById('oPhone').value.trim();
  const phone2 = document.getElementById('oPhone2').value.trim();
  const gov = document.getElementById('oGovernorate').value;
  const city = document.getElementById('oCity').value;
  const address = cleanText(document.getElementById('oAddress').value);
  const notes = cleanText(document.getElementById('oNotes').value);
  const commissionPerItem = parseFloat(document.getElementById('oCommission').value)||0;

  if(!name){ alert('⚠️ يرجى كتابة اسم العميل'); return; }
  
  const phoneRegex = /^01[0125][0-9]{8}$/;
  if(!phone || !phoneRegex.test(phone)){ 
    alert('⚠️ رقم الهاتف غير صحيح! يجب أن يتكون من 11 رقماً ويبدأ بـ 010 أو 011 أو 012 أو 015'); 
    return; 
  }
  
  if(phone2 && !phoneRegex.test(phone2)){
    alert('⚠️ رقم الهاتف الإضافي غير صحيح!');
    return;
  }

  if(!gov){ alert('⚠️ يرجى تحديد المحافظة'); return; }
  if(!city){ alert('⚠️ يرجى تحديد المدينة / المركز'); return; }
  if(!address){ alert('⚠️ يرجى كتابة العنوان السكني بالتفصيل'); return; }

  isSubmitting = true;
  const btn = document.querySelector('.btn-primary');
  if(btn){ btn.disabled = true; btn.textContent = '⏳ جاري مراجعة وإرسال الطلب...'; }
  const alertContainer = document.getElementById('alertContainer');
  if(alertContainer) alertContainer.innerHTML = '';

  const shippingCost = getShippingCost(gov);
  const promoBonus = checkPromoBonus(); 

  try{
    let allSuccess = true, errorMsg = '';
    const createdOrders = [];
    let bonusDistributed = false;

    const allUsersAccounts = await req(`stylek_password?select=*`);

    if (!affiliateUser) {
      const currentMarketerObj = allUsersAccounts.find(u => (u.username || '').trim().toLowerCase() === marketerId);
      if (currentMarketerObj && currentMarketerObj.affiliate_user) {
        affiliateUser = currentMarketerObj.affiliate_user.trim().toLowerCase();
      }
    }

    for(const item of orderProducts){
      const bp = parseFloat(item.base_price) || 0;
      const qty = parseInt(item.qty) || 1;
      
      let totalProductCost = ((bp + SITE_PROFIT) * qty) + (commissionPerItem * qty) + shippingCost;
      if(promoBonus > 0 && !bonusDistributed) {
        totalProductCost += promoBonus;
        bonusDistributed = true;
      }

      const currentOrderReferralProfit = affiliateUser ? (REFERRAL_COMMISSION_PER_QTY * qty) : 0;
      
      // اسم المستخدم لصاحب المنتج (المورد)
      const productOwner = (item.supplier_username || item.supplier_id || 'supplier_default').trim().toLowerCase();
      const supplierProfitAmount = bp * qty;
      const oid = 'ORD-' + Date.now() + '-' + String(item.product_id) + '-' + Math.random().toString(36).substr(2,4).toUpperCase();

      const currentSupplierObj = allUsersAccounts.find(u => (u.username || '').trim().toLowerCase() === productOwner);
      const supplierReferredBy = currentSupplierObj && currentSupplierObj.affiliate_user ? currentSupplierObj.affiliate_user.trim().toLowerCase() : null;
      const supplierReferralProfit = supplierReferredBy ? (SUPPLIER_REFERRAL_COMMISSION_PER_QTY * qty) : 0;

      // تعديل الـ Payload بناء على طلبك بدقة
      const orderDataPayload = {
        order_id: oid,
        product_id: String(item.product_id),
        customer_name: name,
        phone: phone,
        phone2: phone2,
        governorate: gov,
        city: city,
        address: address,
        qty: qty,
        size: item.size||'',
        color: item.color||'',
        price: bp, 
        shipping: shippingCost, 
        total_price: totalProductCost, 
        commission: (commissionPerItem * qty), 
        site_profit: (SITE_PROFIT * qty), 
        referred_by_marketer: affiliateUser, 
        marketer_referral_profit: currentOrderReferralProfit, 
        supplier_id: marketerId,                  // الشخص الذي سجل من رابط الإحالة (المستخدم المشتري/المسوق الحالي)
        supplier_username: productOwner,          // اسم المستخدم لصاحب المنتج (المورد)
        supplier_profit: supplierProfitAmount, 
        supplier_referred_by: supplierReferredBy, 
        supplier_referral_profit: supplierReferralProfit, 
        notes: notes,
        marketer_username: marketerName,
        marketer_id: marketerId,
        order_status: 'pending',
        cart_id: GlobalCartId 
      };

      const result = await callApi('place_order', orderDataPayload);

      if(result.code || result.message || result.status === 'error') { 
        allSuccess = false; 
        errorMsg = result.message || 'خطأ داخلي في الخادم أو فشل التحقق من الحقول المطلوبة.'; 
        break; 
      }

      createdOrders.push({
        order_id: oid, 
        product_id: String(item.product_id), 
        size: item.size||'', 
        color: item.color||'', 
        qty: qty,
        emailInfo: {
          order_id: oid,
          supplier_id: productOwner,
          product_name: item.name || 'منتج متجر ستايلك',
          customer_name: name,
          phone: phone,
          governorate: gov,
          city: city,
          address: address,
          qty: qty,
          size: item.size || 'حر',
          color: item.color || 'افتراضي',
          supplier_profit: supplierProfitAmount,
          timestamp: new Date().toLocaleString('ar-EG')
        }
      });
    }

    if(allSuccess){
      for(const order of createdOrders){
        await updateStockAfterOrder(order.product_id, order.size, order.color, order.qty);
        await sendSupplierEmailNotification(order.emailInfo);
      }
      
      localStorage.removeItem('cart_' + marketerId);
      
      if(alertContainer) alertContainer.innerHTML = `
        <div class="alert alert-success" style="padding: 16px; font-size: 14px;">
          🎉 <strong style="font-size: 16px;">تم تسجيل طلبك بنجاح واحتسابه في السجلات!</strong><br>
          سيتم الآن مراجعة الطلب وتحضيره للشحن فوراً. جاري توجيهك...
        </div>`;
        
      setTimeout(()=>{ goBack(); }, 2500);
    } else {
      isSubmitting = false; 
      if(alertContainer) alertContainer.innerHTML = `<div class="alert alert-danger">❌ فشل تسجيل الطلب: ${errorMsg}</div>`;
    }
  } catch(e) {
    isSubmitting = false; 
    if(alertContainer) alertContainer.innerHTML = `<div class="alert alert-danger">❌ خطأ غير متوقع في النظام: ${e.message}</div>`;
  }
  
  if(btn && !allSuccess){ btn.disabled = false; btn.textContent = '✅ تأكيد وإرسال الطلب'; }
}

function showError(msg){
  document.getElementById('orderContainer').innerHTML=`
    <div class="alert alert-danger">⚠️ ${msg}</div>
    <button class="btn btn-primary" onclick="goBack()" style="width:100%;">← رجوع للمنتجات</button>
  `;
}

function goBack(){
  window.location.href = `displayed_products.html?user=${encodeURIComponent(marketerId)}&type=marketer`;
}

loadOrderData();
</script>
