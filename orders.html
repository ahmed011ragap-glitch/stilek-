    :root {
      --bg: #121212;
      --white: #1e1e1e;
      --surface: #2a2a2a;
      --border: #3a3a3a;
      --border-dark: #4a4a4a;
      --text: #e4e4e4;
      --text-2: #b0b0b0;
      --muted: #808080;
      --green: #00b86b;
      --green-light: #1a3a2a;
      --gold: #f0a500;
      --gold-light: #3a2a0a;
      --red: #e8334a;
      --red-light: #3a1a1f;
      --blue: #3b82f6;
      --blue-light: #1a2a4a;
      --radius: 14px;
      --radius-sm: 9px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Tajawal", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 40px;
    }

    /* ===== توب بار ===== */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .back-btn:hover { border-color: var(--green); }
    .page-title { font-size: 20px; font-weight: 800; }
    .page-title span { color: var(--green); }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      padding: 4px 12px 4px 8px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .udot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }

    /* ===== الحاوية ===== */
    .container {
      max-width: 560px;
      margin: 0 auto;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px;
    }

    .order-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }
    .order-badge img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      background: var(--bg);
      border-radius: 8px;
    }
    .ob-name { font-size: 14px; font-weight: 700; }
    .ob-sub { font-size: 11px; color: var(--muted); }

    /* ===== الحقول ===== */
    .fsec {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-2);
      margin: 14px 0 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    .fg { margin-bottom: 10px; }
    .fl {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .fi {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      font-family: "Tajawal", sans-serif;
      transition: 0.2s;
    }
    .fi:focus { border-color: var(--green); outline: none; }
    .fi-gold { border-color: var(--gold-light); }
    .fi-gold:focus { border-color: var(--gold); }

    .fgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .fi-hint {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ===== ملخص الطلب ===== */
    .sum-box {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      border: 1px solid var(--border);
    }
    .sum-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
    }
    .sum-total {
      display: flex;
      justify-content: space-between;
      padding: 8px 0 4px;
      font-size: 18px;
      font-weight: 900;
      border-top: 2px solid var(--green);
      margin-top: 6px;
    }
    .sum-total span:last-child { color: var(--green); }

    /* ===== أزرار ===== */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    .btn {
      padding: 12px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 15px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      border: none;
      font-family: "Tajawal", sans-serif;
    }
    .btn-primary {
      background: var(--green);
      color: #000;
    }
    .btn-primary:hover { background: #00cc66; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sec {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-sec:hover { background: var(--border); }

    /* ===== رسائل ===== */
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .alert-danger { background: var(--red-light); color: var(--red); border: 1px solid var(--red); }
    .alert-success { background: var(--green-light); color: var(--green); border: 1px solid var(--green); }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .fgrid { grid-template-columns: 1fr; }
      .btn-row { grid-template-columns: 1fr; }
      .container { padding: 14px 12px; }
      .page-title { font-size: 17px; }
    }
  </style>
</head>

// ===== دالة Supabase =====
async function req(ep, opts = {}) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${ep}`, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      ...opts.headers
    }
  });
  const t = await r.text();
  return t ? JSON.parse(t) : {};
}

async function callApi(action, data = {}) {
  try {
    switch (action) {
      case 'get_product': {
        const product = await req(`products?product_id=eq.${data.product_id}&select=*`);
        if (Array.isArray(product) && product.length) {
          const variants = await req(`product_variants?product_id=eq.${data.product_id}&select=*`);
          return [{
            ...product[0],
            variants: Array.isArray(variants) ? variants : []
          }];
        }
        return product;
      }
      case 'get_cart': {
        const c = await req(`cart?marketer_id=ilike.${data.mid}&select=*`);
        if (!Array.isArray(c)) return c;
        const pr = await req('products?select=*');
        return c.map(i => {
          const p = pr.find(x => String(x.product_id) === String(i.product_id));
          return p ? { ...i, ...p } : i;
        });
      }
      case 'place_order': {
        const orderBody = {
          order_id: data.order_id,
          product_id: String(data.product_id),
          customer_name: data.customer_name,
          phone: data.phone,
          phone2: data.phone2 || '',
          governorate: data.governorate,
          city: data.city,
          address: data.address,
          qty: data.qty || 1,
          size: data.size || '',
          color: data.color || '',
          price: data.price,
          shipping: data.shipping || 115,
          total_price: data.total_price,
          commission: data.commission,
          site_profit: data.site_profit || 20,
          notes: data.notes || '',
          marketer_username: data.marketer_username,
          marketer_id: data.marketer_id,
          order_status: data.order_status || 'pending'
        };
        return await req('orders', { method: 'POST', body: JSON.stringify(orderBody) });
      }
      default:
        return { status: 'error' };
    }
  } catch (e) {
    return { status: 'error', message: e.message };
  }
}

// ===== تحميل بيانات الطلب =====
async function loadOrderData() {
  // استقبال البيانات من الـ URL
  const productId = urlP.get('product_id');
  const fromCart = urlP.get('from_cart') === 'true';
  const size = urlP.get('size') || '';
  const color = urlP.get('color') || '';

  document.getElementById('userLabel').textContent = marketerName;

  if (fromCart) {
    // جلب السلة
    const cart = await callApi('get_cart', { mid: marketerId });
    if (Array.isArray(cart) && cart.length) {
      orderProducts = cart.map(item => ({
        ...item,
        qty: item.qty || 1,
        size: size || item.size || '',
        color: color || item.color || ''
      }));
      renderOrderForm();
    } else {
      showError('السلة فارغة');
    }
  } else if (productId) {
    // جلب منتج واحد
    const result = await callApi('get_product', { product_id: productId });
    if (Array.isArray(result) && result.length) {
      currentProduct = result[0];
      orderProducts = [{
        ...currentProduct,
        qty: 1,
        size: size || '',
        color: color || '',
        cart_id: 'temp_' + Date.now()
      }];
      renderOrderForm();
    } else {
      showError('المنتج غير موجود');
    }
  } else {
    showError('لا توجد بيانات للطلب');
  }
}

function updateCities() {
  const gov = document.getElementById('oGovernorate').value;
  const cs = document.getElementById('oCity');
  cs.innerHTML = '<option value="">اختر المدينة</option>';
  if (gov && CITIES[gov]) {
    CITIES[gov].forEach(city => {
      cs.innerHTML += `<option value="${city}">${city}</option>`;
    });
  }
  updateOrderTotal();
}

// ===== تحديث الإجمالي =====
function updateOrderTotal() {
  const ci = document.getElementById('oCommission');
  const cd = document.getElementById('commissionDisplay');
  const td = document.getElementById('totalAmount');
  const sd = document.getElementById('shippingDisplay');
  if (!ci || !cd || !td) return;

  const cv = parseFloat(ci.value) || 0;
  cd.textContent = cv + ' ج';

  const gov = document.getElementById('oGovernorate')?.value || '';
  const ship = getShippingCost(gov);
  if (sd) sd.textContent = ship + ' ج';

  const total = totalProductsPrice + cv + ship;
  td.textContent = total + ' ج';
}

// ===== إرسال الطلب =====
async function submitOrder() {
  const name = document.getElementById('oName').value.trim();
  const phone = document.getElementById('oPhone').value.trim();
  const phone2 = document.getElementById('oPhone2').value.trim();
  const gov = document.getElementById('oGovernorate').value;
  const city = document.getElementById('oCity').value;
  const address = document.getElementById('oAddress').value.trim();
  const notes = document.getElementById('oNotes').value.trim();
  const commission = parseFloat(document.getElementById('oCommission').value) || 0;

  // التحقق
  if (!name) { alert('⚠️ يرجى إدخال اسم العميل'); return; }
  if (!phone) { alert('⚠️ يرجى إدخال رقم الهاتف'); return; }
  if (phone.length !== 11) { alert('⚠️ رقم الهاتف يجب أن يكون 11 رقم'); return; }
  if (!gov) { alert('⚠️ يرجى اختيار المحافظة'); return; }
  if (!city) { alert('⚠️ يرجى اختيار المدينة'); return; }
  if (!address) { alert('⚠️ يرجى إدخال العنوان بالتفصيل'); return; }

  const btn = document.querySelector('.btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ جاري الإرسال...'; }

  const alertContainer = document.getElementById('alertContainer');
  if (alertContainer) alertContainer.innerHTML = '';

  const shippingCost = getShippingCost(gov);

  try {
    let allSuccess = true;
    let errorMsg = '';

    for (const item of orderProducts) {
      const bp = parseFloat(item.base_price) || 0;
      const qty = item.qty || 1;
      const total = (bp * qty) + commission + shippingCost;
      const oid = 'ORD-' + Date.now() + '-' + String(item.product_id) + '-' + Math.random().toString(36).substr(2, 4);

      const result = await callApi('place_order', {
        order_id: oid,
        product_id: String(item.product_id),
        customer_name: name,
        phone: phone,
        phone2: phone2,
        governorate: gov,
        city: city,
        address: address,
        qty: qty,
        size: item.size || '',
        color: item.color || '',
        price: bp,
        shipping: shippingCost,
        total_price: total,
        commission: commission,
        site_profit: 20,
        notes: notes,
        marketer_username: marketerName,
        marketer_id: marketerId,
        order_status: 'pending'
      });

      if (result.status === 'error') {
        allSuccess = false;
        errorMsg = result.message || '';
        break;
      }
    }

    if (allSuccess) {
      // حذف من السلة إذا كان من السلة
      for (const item of orderProducts) {
        if (item.cart_id && !item.cart_id.startsWith('temp_')) {
          await req(`cart?cart_id=eq.${item.cart_id}`, { method: 'DELETE' });
        }
      }

      if (alertContainer) {
        alertContainer.innerHTML = `<div class="alert alert-success">✅ تم إنشاء الطلب بنجاح! عدد المنتجات: ${orderProducts.length}</div>`;
      }
      
      // إعادة تعيين بعد 2 ثانية
      setTimeout(() => {
        goBack();
      }, 2000);

    } else {
      if (alertContainer) {
        alertContainer.innerHTML = `<div class="alert alert-danger">❌ فشل إنشاء الطلب: ${errorMsg || 'خطأ غير معروف'}</div>`;
      }
    }

  } catch (e) {
    if (alertContainer) {
      alertContainer.innerHTML = `<div class="alert alert-danger">❌ خطأ: ${e.message}</div>`;
    }
  }

  if (btn) { btn.disabled = false; btn.textContent = '✅ تأكيد الطلب'; }
}

// ===== دوال مساعدة =====
function showError(msg) {
  document.getElementById('orderContainer').innerHTML = `
    <div class="alert alert-danger">⚠️ ${msg}</div>
    <button class="btn btn-primary" onclick="goBack()" style="width:100%;">← رجوع للمنتجات</button>
  `;
}

function goBack() {
  window.location.href = `product_page.html?user=${encodeURIComponent(marketerId)}&type=marketer`;
}

function openWhatsApp() {
  window.open(`https://wa.me/${WA_NUM}`, '_blank');
}

// ===== بدء التشغيل =====
loadOrderData();
</script>
