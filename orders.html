async function req(ep, opts={}){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${ep}`,{...opts,headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',...opts.headers}});
  const t=await r.text(); return t?JSON.parse(t):{};
}

async function callApi(action,data={}){
  try{
    switch(action){
      case 'get_product':{
        const p=await req(`products?product_id=eq.${data.product_id}&select=*`);
        if(Array.isArray(p)&&p.length){ const v=await req(`product_variants?product_id=eq.${data.product_id}&select=*`); return [{...p[0],variants:Array.isArray(v)?v:[]}]; }
        return p;
      }
      case 'place_order':{
        const orderBody={
          order_id:data.order_id,
          product_id:String(data.product_id),
          customer_name:data.customer_name,
          phone:data.phone,
          phone2:data.phone2||'',
          governorate:data.governorate,
          city:data.city,
          address:data.address,
          qty:data.qty||1,
          size:data.size||'',
          color:data.color||'',
          price:data.price,
          shipping:data.shipping||115,
          total_price:data.total_price,
          commission:data.commission,
          site_profit:data.site_profit||20,
          notes:data.notes||'',
          marketer_username:data.marketer_username,
          marketer_id:data.marketer_id,
          order_status:data.order_status||'pending'
        };
        return await req('orders',{method:'POST',body:JSON.stringify(orderBody)});
      }
      default: return {status:'error'};
    }
  }catch(e){ return {status:'error',message:e.message}; }
}

async function updateStockAfterOrder(productId, size, color, qty){
  try{
    const variants=await req(`product_variants?product_id=eq.${productId}&select=*`);
    if(!Array.isArray(variants)||variants.length===0)return false;
    
    const matchedVariant=variants.find(v=>v.size===size&&v.color===color);
    if(matchedVariant){
      const currentStock=parseInt(matchedVariant.stock)||0;
      const newStock=Math.max(0,currentStock-qty);
      
      // تحديث المخزون في product_variants
      await req(`product_variants?id=eq.${matchedVariant.id}`,{
        method:'PATCH',
        body:JSON.stringify({stock:newStock})
      });
      
      // تحديث المخزون الكلي في products
      const totalStock=variants.reduce((sum,v)=>{
        if(v.id===matchedVariant.id)return sum+newStock;
        return sum+(parseInt(v.stock)||0);
      },0);
      
      await req(`products?product_id=eq.${productId}`,{
        method:'PATCH',
        body:JSON.stringify({stock:totalStock})
      });
      
      return true;
    }
    return false;
  }catch(e){ console.error('خطأ في تحديث المخزون:',e); return false; }
}

    showError('لا توجد بيانات للطلب');
  }
}

// ============================================================
// ===== عرض الفورم =====
// ============================================================
function renderOrderForm(){
  const container=document.getElementById('orderContainer');
  if(!orderProducts||!orderProducts.length){
    container.innerHTML=`<div class="alert alert-danger">⚠️ لا توجد منتجات في الطلب</div><button class="btn btn-primary" onclick="goBack()" style="width:100%;">← رجوع للمنتجات</button>`;
    return;
  }
  
  const p=orderProducts[0];
  const defaultComm=comm(p.base_price);
  
  totalProductsPrice=0; totalQty=0;
  let summaryHtml='';
  orderProducts.forEach(item=>{
    const isp=sellP(item.base_price);
    const qty=item.qty||1;
    const it=isp*qty;
    totalProductsPrice+=it;
    totalQty+=qty;
    let vi='';
    if(item.color||item.size) vi=` (${item.color||''}${item.color&&item.size?' - ':''}${item.size||''})`;
    summaryHtml+=`<div style="font-size:12px;color:var(--text-2);padding:3px 0;border-bottom:1px solid var(--border);">
      ${esc(cleanText(item.name))}${vi} × ${qty} = ${it} ج
    </div>`;
  });
  
  const govOpts=Object.keys(CITIES).map(g=>`<option value="${g}">${g}</option>`).join('');
  
  container.innerHTML=`
    <div class="order-badge">
      <img src="${iurl(p.image_url)}" onerror="this.src='https://placehold.co/60x60/2a2a2a/808080?text=🛍️'" alt="product">
      <div><div class="ob-name">${totalQty} منتج</div><div class="ob-sub">${orderProducts.length} منتج مختلف</div></div>
    </div>
    <div class="fsec">👤 بيانات العميل</div>
    <div class="fg"><label class="fl">👤 اسم العميل <span style="color:var(--red);">*</span></label><input class="fi" id="oName" placeholder="أدخل اسم العميل"></div>
    <div class="fg"><label class="fl">📱 رقم الهاتف 1 <span style="color:var(--red);">*</span></label><input class="fi" id="oPhone" type="tel" placeholder="01012345678" maxlength="11" oninput="this.value=this.value.replace(/\\D/g,'').slice(0,11)"></div>
    <div class="fg"><label class="fl">📱 رقم هاتف إضافي</label><input class="fi" id="oPhone2" type="tel" placeholder="رقم آخر" maxlength="11" oninput="this.value=this.value.replace(/\\D/g,'').slice(0,11)"></div>
    <div class="fgrid">
      <div class="fg"><label class="fl">🏙️ المحافظة <span style="color:var(--red);">*</span></label><select class="fi" id="oGovernorate" onchange="updateCities()"><option value="">اختر</option>${govOpts}</select></div>
      <div class="fg"><label class="fl">🏘️ المدينة <span style="color:var(--red);">*</span></label><select class="fi" id="oCity"><option value="">اختر</option></select></div>
    </div>
    <div class="fg"><label class="fl">📍 العنوان <span style="color:var(--red);">*</span></label><input class="fi" id="oAddress" placeholder="الشارع، المنطقة..."></div>
    <div class="fg"><label class="fl">📝 ملاحظات</label><input class="fi" id="oNotes" placeholder="أي ملاحظات..."></div>
    <div class="fsec">💰 تعديل العمولة</div>
    <div class="fg"><label class="fl">⭐ العمولة (ج) <span style="color:var(--gold);">قابلة للتعديل</span></label><input class="fi fi-gold" id="oCommission" type="number" value="${defaultComm}" oninput="updateOrderTotal()" step="1" min="0"><div class="fi-hint">القيمة الافتراضية: ${defaultComm} ج</div></div>
    <div class="fsec">📋 ملخص الطلب</div>
    <div class="sum-box">
      ${summaryHtml}
      <div class="sum-row" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);"><span>إجمالي المنتجات</span><span style="color:var(--green);">${totalProductsPrice} ج</span></div>
      <div class="sum-row"><span>العمولة</span><span style="color:var(--gold);" id="commissionDisplay">${defaultComm} ج</span></div>
      <div class="sum-row"><span>رسوم الشحن</span><span style="color:var(--muted);" id="shippingDisplay">115 ج</span></div>
      <div class="sum-total"><span>الإجمالي</span><span id="totalAmount">${totalProductsPrice+defaultComm+115} ج</span></div>
    </div>
    <div id="alertContainer"></div>
    <div class="btn-row"><button class="btn btn-primary" onclick="submitOrder()">✅ تأكيد الطلب</button><button class="btn btn-sec" onclick="goBack()">← رجوع</button></div>
  `;
}

function updateCities(){
  const gov=document.getElementById('oGovernorate').value, cs=document.getElementById('oCity');
  cs.innerHTML='<option value="">اختر</option>';
  if(gov&&CITIES[gov]) CITIES[gov].forEach(c=>{ cs.innerHTML+=`<option value="${c}">${c}</option>`; });
  updateOrderTotal();
}

function updateOrderTotal(){
  const ci=document.getElementById('oCommission'), cd=document.getElementById('commissionDisplay'), td=document.getElementById('totalAmount'), sd=document.getElementById('shippingDisplay');
  if(!ci||!cd||!td)return;
  const cv=parseFloat(ci.value)||0; cd.textContent=cv+' ج';
  const gov=document.getElementById('oGovernorate')?.value||'', ship=getShippingCost(gov);
  if(sd)sd.textContent=ship+' ج';
  td.textContent=(totalProductsPrice+cv+ship)+' ج';
}

// ============================================================
// ===== إرسال الطلب =====
// ============================================================
async function submitOrder(){
  const name=document.getElementById('oName').value.trim();
  const phone=document.getElementById('oPhone').value.trim();
  const phone2=document.getElementById('oPhone2').value.trim();
  const gov=document.getElementById('oGovernorate').value;
  const city=document.getElementById('oCity').value;
  const address=document.getElementById('oAddress').value.trim();
  const notes=document.getElementById('oNotes').value.trim();
  const commission=parseFloat(document.getElementById('oCommission').value)||0;

  if(!name){ alert('⚠️ أدخل اسم العميل'); return; }
  if(!phone||phone.length!==11){ alert('⚠️ رقم الهاتف 11 رقم'); return; }
  if(!gov){ alert('⚠️ اختر المحافظة'); return; }
  if(!city){ alert('⚠️ اختر المدينة'); return; }
  if(!address){ alert('⚠️ أدخل العنوان'); return; }

  const btn=document.querySelector('.btn-primary');
  if(btn){ btn.disabled=true; btn.textContent='⏳ جاري الإرسال...'; }
  const alertContainer=document.getElementById('alertContainer');
  if(alertContainer)alertContainer.innerHTML='';

  const shippingCost=getShippingCost(gov);

  try{
    let allSuccess=true, errorMsg='';
    const createdOrders=[];

    for(const item of orderProducts){
      const bp=parseFloat(item.base_price)||0;
      const qty=item.qty||1;
      const total=(bp*qty)+commission+shippingCost;
      const oid='ORD-'+Date.now()+'-'+String(item.product_id)+'-'+Math.random().toString(36).substr(2,4);

      const result=await callApi('place_order',{
        order_id:oid,
        product_id:String(item.product_id),
        customer_name:name,
        phone:phone,
        phone2:phone2,
        governorate:gov,
        city:city,
        address:address,
        qty:qty,
        size:item.size||'',
        color:item.color||'',
        price:bp,
        shipping:shippingCost,
        total_price:total,
        commission:commission,
        site_profit:20,
        notes:notes,
        marketer_username:marketerName,
        marketer_id:marketerId,
        order_status:'pending'
      });

      if(result.status==='error'){ allSuccess=false; errorMsg=result.message||''; break; }
      createdOrders.push({order_id:oid, product_id:String(item.product_id), size:item.size||'', color:item.color||'', qty:qty});
    }

    if(allSuccess){
      // ===== تحديث المخزون لكل منتج =====
      for(const order of createdOrders){
        await updateStockAfterOrder(order.product_id, order.size, order.color, order.qty);
      }
      
      // حذف من السلة
      for(const item of orderProducts){
        if(item.cart_id&&!item.cart_id.startsWith('temp_')){
          const localCart=JSON.parse(localStorage.getItem('cart_'+marketerId)||'[]');
          const newCart=localCart.filter(i=>i.cart_id!==item.cart_id);
          localStorage.setItem('cart_'+marketerId, JSON.stringify(newCart));
        }
      }

      if(alertContainer)alertContainer.innerHTML=`<div class="alert alert-success">✅ تم إنشاء الطلب بنجاح! ${orderProducts.length} منتج</div>`;
      setTimeout(()=>{ goBack(); }, 2000);
    }else{
      if(alertContainer)alertContainer.innerHTML=`<div class="alert alert-danger">❌ فشل: ${errorMsg||'خطأ غير معروف'}</div>`;
    }
  }catch(e){
    if(alertContainer)alertContainer.innerHTML=`<div class="alert alert-danger">❌ خطأ: ${e.message}</div>`;
  }
  if(btn){ btn.disabled=false; btn.textContent='✅ تأكيد الطلب'; }
}

// ============================================================
// ===== دوال مساعدة =====
// ============================================================
function showError(msg){
  document.getElementById('orderContainer').innerHTML=`
    <div class="alert alert-danger">⚠️ ${msg}</div>
    <button class="btn btn-primary" onclick="goBack()" style="width:100%;">← رجوع للمنتجات</button>
  `;
}

function goBack(){
  // التوجيه لصفحة displayed_products.html
  window.location.href = `displayed_products.html?user=${encodeURIComponent(marketerId)}&type=marketer`;
}

function openWhatsApp(){
  window.open(`https://wa.me/${WA_NUM}`, '_blank');
}

// ============================================================

loadOrderData();
