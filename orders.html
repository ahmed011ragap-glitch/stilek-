    .back-btn { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 16px; border-radius:10px; font-size:14px; cursor:pointer; font-weight:600; transition:.2s; }
    .back-btn:hover { border-color:var(--green); }
    .page-title { font-size:20px; font-weight:800; }
    .page-title span { color:var(--green); }
    .user-chip { display:flex; align-items:center; gap:6px; background:var(--surface); padding:4px 12px 4px 8px; border-radius:20px; font-size:12px; font-weight:600; }
    .udot { width:8px; height:8px; background:var(--green); border-radius:50%; }
    .container { max-width:560px; margin:0 auto; background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:20px 18px; }
    .order-badge { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); border-radius:var(--radius-sm); margin-bottom:16px; border:1px solid var(--border); }

    .fsec { font-size:14px; font-weight:700; color:var(--text-2); margin:14px 0 8px; padding-bottom:4px; border-bottom:1px solid var(--border); }
    .fg { margin-bottom:10px; }
    .fl { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:4px; }
    .fi { width:100%; padding:10px 12px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:14px; font-family:"Tajawal",sans-serif; transition:.2s; }
    .fi:focus { border-color:var(--green); outline:none; }
    .fi-gold { border-color:var(--gold-light); }
    .fi-gold:focus { border-color:var(--gold); }
    .fgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .fi-hint { font-size:10px; color:var(--muted); margin-top:2px; }
    .sum-box { background:var(--bg); border-radius:var(--radius-sm); padding:12px 14px; border:1px solid var(--border); }
    .sum-row { display:flex; justify-content:space-between; padding:4px 0; font-size:13px; }
    .sum-total { display:flex; justify-content:space-between; padding:8px 0 4px; font-size:18px; font-weight:900; border-top:2px solid var(--green); margin-top:6px; }
    .sum-total span:last-child { color:var(--green); }
    .shipping-note { margin-top:10px; padding-top:8px; border-top:1px dashed var(--gold-light); text-align:center; font-size:12px; color:var(--gold); }
    .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
    .btn { padding:12px; border-radius:var(--radius-sm); font-weight:700; font-size:15px; text-align:center; cursor:pointer; transition:.2s; border:none; font-family:"Tajawal",sans-serif; }
    .btn-primary { background:var(--green); color:#000; }
    .btn-primary:hover { background:#00cc66; }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .btn-sec { background:var(--surface); color:var(--text); border:1px solid var(--border); }
    .btn-sec:hover { background:var(--border); }
    .alert { padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; margin-bottom:10px; }
    .alert-danger { background:var(--red-light); color:var(--red); border:1px solid var(--red); }
    .alert-success { background:var(--green-light); color:var(--green); border:1px solid var(--green); }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner { width:40px; height:40px; border:4px solid var(--surface); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto; }
    @media(max-width:480px){ .fgrid{grid-template-columns:1fr;} .btn-row{grid-template-columns:1fr;} .container{padding:14px 12px;} .page-title{font-size:17px;} }
  </style>
</head>

async function req(ep, opts = {}){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${ep}`, {
    ...opts,
    headers:{
      'apikey'        : SUPABASE_KEY,
      'Authorization' : `Bearer ${SUPABASE_KEY}`,
      'Content-Type'  : 'application/json',
      ...opts.headers
    }
  });
  const t = await r.text();
  return t ? JSON.parse(t) : {};
}

async function loadOrderData(){
  const productId = urlP.get('product_id');
  const fromCart  = urlP.get('from_cart') === 'true';
  const size      = urlP.get('size')  || '';
  const color     = urlP.get('color') || '';

  globalCartId = 'CRT-' + Date.now() + '-' + Math.random().toString(36).substr(2,4).toUpperCase();

  if (fromCart) {
    const localCart = JSON.parse(localStorage.getItem('cart_' + marketerId) || '[]');
    if (localCart.length) {
      orderProducts = localCart.map(item => ({ ...item, qty: item.qty || 1, cart_id: globalCartId }));
      renderOrderForm();
    } else {
      showError('السلة فارغة');
    }
  } else if (productId) {
    try {
      const pArr = await req(`products?product_id=eq.${productId}&select=*`);
      if (Array.isArray(pArr) && pArr.length) {
        const vArr = await req(`product_variants?product_id=eq.${productId}&select=*`);
        const prod = { ...pArr[0], variants: Array.isArray(vArr) ? vArr : [] };
        orderProducts = [{ ...prod, qty: 1, size, color, cart_id: globalCartId }];
        renderOrderForm();
      } else {
        showError('المنتج غير موجود');
      }
    } catch(e) {
      showError('خطأ في تحميل المنتج: ' + e.message);
    }
  } else {
    showError('لا توجد بيانات للطلب');
  }
}

  const govOpts   = Object.keys(CITIES).map(g => `<option value="${g}">${g}</option>`).join('');
  const promoBonus = getPromoBonus();
  const promoRowHtml = promoBonus > 0
    ? `<div class="sum-row" style="color:#00ff88;"><span>🎁 هدية ترحيبية (كامل الطلب)</span><span>+ ${promoBonus} ج</span></div>`
    : '';

  const initShip  = 115;
  const initTotal = totalProductsPrice + (defComm * totalQty) + initShip + promoBonus;

  container.innerHTML = `
    <div class="order-badge">
      <img src="${imageUrl(p.image_url)}" onerror="this.src='https://placehold.co/60x60/2a2a2a/808080?text=🛍️'" alt="product">
      <div>
        <div class="ob-name">إجمالي عدد القطع: ${totalQty}</div>
        <div class="ob-sub">${orderProducts.length} منتج مختلف</div>
      </div>
    </div>

    <div class="fsec">👤 بيانات العميل</div>
    <div class="fg"><label class="fl">👤 اسم العميل <span style="color:var(--red)">*</span></label>
      <input class="fi" id="oName" placeholder="أدخل اسم العميل"></div>
    <div class="fg"><label class="fl">📱 رقم الهاتف 1 <span style="color:var(--red)">*</span></label>
      <input class="fi" id="oPhone" type="tel" placeholder="01012345678" maxlength="11" oninput="this.value=this.value.replace(/\\D/g,'').slice(0,11)"></div>
    <div class="fg"><label class="fl">📱 رقم هاتف إضافي</label>
      <input class="fi" id="oPhone2" type="tel" placeholder="رقم آخر" maxlength="11" oninput="this.value=this.value.replace(/\\D/g,'').slice(0,11)"></div>

    <div class="fgrid">
      <div class="fg"><label class="fl">🏙️ المحافظة <span style="color:var(--red)">*</span></label>
        <select class="fi" id="oGovernorate" onchange="updateCities()"><option value="">اختر</option>${govOpts}</select></div>
      <div class="fg"><label class="fl">🏘️ المدينة <span style="color:var(--red)">*</span></label>
        <select class="fi" id="oCity"><option value="">اختر</option></select></div>
    </div>
    <div class="fg"><label class="fl">📍 العنوان <span style="color:var(--red)">*</span></label>
      <input class="fi" id="oAddress" placeholder="الشارع، المنطقة..."></div>
    <div class="fg"><label class="fl">📝 ملاحظات</label>
      <input class="fi" id="oNotes" placeholder="أي ملاحظات..."></div>

    <div class="fsec">💰 تعديل العمولة (لكل قطعة)</div>
    <div class="fg">
      <label class="fl">⭐ عمولة القطعة الواحدة (ج) <span style="color:var(--gold)">تُضرب في الكمية</span></label>
      <input class="fi fi-gold" id="oCommission" type="number" value="${defComm}" oninput="updateOrderTotal()" step="1" min="0">
      <div class="fi-hint">القيمة الافتراضية: ${defComm} ج للقطعة × ${totalQty} قطع = ${defComm * totalQty} ج</div>
    </div>

    <div class="fsec">📋 ملخص الطلب</div>
    <div class="sum-box">
      ${summaryHtml}
      <div class="sum-row" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);">
        <span>إجمالي المنتجات</span><span style="color:var(--green)">${totalProductsPrice} ج</span>
      </div>
      <div class="sum-row">
        <span>إجمالي العمولة (<span id="commPerItemTxt">${defComm}</span> ج × ${totalQty} قطع)</span>
        <span style="color:var(--gold)" id="commissionDisplay">${defComm * totalQty} ج</span>
      </div>
      <div class="sum-row"><span>رسوم الشحن</span><span style="color:var(--muted)" id="shippingDisplay">${initShip} ج</span></div>
      ${promoRowHtml}
      <div class="sum-total"><span>الإجمالي النهائي</span><span id="totalAmount">${initTotal} ج</span></div>
      <div class="shipping-note">🚚 مدة الشحن القصوى: <strong>4 أيام عمل</strong></div>
    </div>

    <div id="alertContainer"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="submitOrder()">✅ تأكيد الطلب</button>
      <button class="btn btn-sec" onclick="goBack()">← رجوع</button>
    </div>
  `;
}

// ============================================================
// تحديث المحافظات والإجمالي
// ============================================================
function updateCities(){
  const gov = document.getElementById('oGovernorate').value;
  const cs  = document.getElementById('oCity');
  cs.innerHTML = '<option value="">اختر</option>';
  if (gov && CITIES[gov]) CITIES[gov].forEach(c => { cs.innerHTML += `<option value="${c}">${c}</option>`; });
  updateOrderTotal();
}

function updateOrderTotal(){
  const ci   = document.getElementById('oCommission');
  const cd   = document.getElementById('commissionDisplay');
  const td   = document.getElementById('totalAmount');
  const sd   = document.getElementById('shippingDisplay');
  const cpt  = document.getElementById('commPerItemTxt');
  if (!ci || !cd || !td) return;

  const cv        = parseFloat(ci.value) || 0;
  const totalComm = cv * totalQty;
  if (cpt) cpt.textContent = cv;
  cd.textContent = totalComm + ' ج';

  const gov  = document.getElementById('oGovernorate')?.value || '';
  const ship = getShippingCost(gov);
  if (sd) sd.textContent = ship + ' ج';

  const promoBonus = getPromoBonus();
  td.textContent   = (totalProductsPrice + totalComm + ship + promoBonus) + ' ج';
}

// ============================================================
// تحديث المخزون بعد الطلب
// ============================================================
async function updateStockAfterOrder(productId, size, color, qty){
  try {
    const variants = await req(`product_variants?product_id=eq.${productId}&select=*`);
    if (!Array.isArray(variants) || variants.length === 0) return false;

    const matched = variants.find(v => v.size === size && v.color === color);
    if (!matched) return false;

    const newStock = Math.max(0, (parseInt(matched.stock) || 0) - qty);
    await req(`product_variants?id=eq.${matched.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ stock: newStock })
    });

    const totalStock = variants.reduce((sum, v) => {
      return sum + (v.id === matched.id ? newStock : (parseInt(v.stock) || 0));
    }, 0);
    await req(`products?product_id=eq.${productId}`, {
      method: 'PATCH',
      body: JSON.stringify({ stock: totalStock })
    });
    return true;
  } catch(e) {
    console.error('خطأ في تحديث المخزون:', e);
    return false;
  }
}

// ============================================================
// إرسال الطلب
// ============================================================
async function submitOrder(){
  const name    = document.getElementById('oName').value.trim();
  const phone   = document.getElementById('oPhone').value.trim();
  const phone2  = document.getElementById('oPhone2').value.trim();
  const gov     = document.getElementById('oGovernorate').value;
  const city    = document.getElementById('oCity').value;
  const address = document.getElementById('oAddress').value.trim();
  const notes   = document.getElementById('oNotes').value.trim();
  const commPerItem = parseFloat(document.getElementById('oCommission').value) || 0;

  if (!name)                  { alert('⚠️ أدخل اسم العميل'); return; }
  if (!phone || phone.length !== 11) { alert('⚠️ رقم الهاتف يجب أن يكون 11 رقم'); return; }
  if (!gov)                   { alert('⚠️ اختر المحافظة'); return; }
  if (!city)                  { alert('⚠️ اختر المدينة'); return; }
  if (!address)               { alert('⚠️ أدخل العنوان'); return; }

  const btn            = document.querySelector('.btn-primary');
  const alertContainer = document.getElementById('alertContainer');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ جاري الإرسال...'; }
  if (alertContainer) alertContainer.innerHTML = '';

  const shippingCost   = getShippingCost(gov);
  const promoBonus     = getPromoBonus(); // 5 ج مرة واحدة على كامل الطلبية

  // ✅ جلب المسوق الفوقي (المُحيل)
  const referredByMarketer = localStorage.getItem('affiliate_user') || null;

  try {
    let allSuccess    = true;
    let errorMsg      = '';
    const createdOrders = [];

    // ✅ نوزع الـ promo مرة واحدة فقط على أول منتج في الطلبية
    let bonusDistributed = false;

    for (const item of orderProducts) {
      const bp  = parseFloat(item.base_price) || 0;
      const qty = parseInt(item.qty) || 1;

      // ✅ إجمالي ما يدفعه العميل لهذا المنتج
      let totalForThisItem = (sellPrice(bp) + commPerItem) * qty;

      if (promoBonus > 0 && !bonusDistributed) {
        totalForThisItem += promoBonus;
        bonusDistributed = true;
      }

      // ✅ أرباح المورد = سعره الأساسي × الكمية
      const supplierProfitAmount = bp * qty;

      // ✅ هامش الموقع = SITE_PROFIT × الكمية
      const siteProfitAmount = SITE_PROFIT * qty;

      // ✅ عمولة المسوق = commPerItem × الكمية
      const marketerCommission = commPerItem * qty;

      // ✅ عمولة الإحالة = 5 ج مرة واحدة للـ cart_id كله (تُضاف على الصف الأول فقط)
      const referralProfit = (referredByMarketer && !bonusDistributed) ? REFERRAL_COMMISSION_PER_ORDER : 0;

      const supplierId = item.supplier_username || item.username || 'supplier_default';
      const oid = 'ORD-' + Date.now() + '-' + String(item.product_id) + '-' + Math.random().toString(36).substr(2,4);

      const orderPayload = {
        order_id         : oid,
        cart_id          : globalCartId,
        product_id       : String(item.product_id),
        customer_name    : name,
        phone            : phone,
        phone2           : phone2,
        governorate      : gov,
        city             : city,
        address          : address,
        qty              : qty,
        size             : item.size  || '',
        color            : item.color || '',
        notes            : notes,
        order_status     : 'pending',

        // ✅ الأسعار — متسقة مع wallet_page
        price            : bp,                  // سعر المورد الأساسي للقطعة
        shipping         : shippingCost,
        total_price      : totalForThisItem,    // ما يدفعه العميل لهذا الصف
        commission       : marketerCommission,  // عمولة المسوق الحالي
        site_profit      : siteProfitAmount,    // هامش الموقع

        // ✅ الحقول التي تقرأها wallet_page
        supplier_id      : supplierId,
        supplier_profit  : supplierProfitAmount, // ← wallet يقرأ هذا الحقل
        referred_by_marketer : referredByMarketer,
        marketer_referral_profit : referralProfit,

        // ✅ بيانات المسوق
        marketer_username : marketerName,
        marketer_id       : marketerId,

        // الحقول القديمة للتوافق مع أي جزء آخر من النظام
        referrer_username : referredByMarketer,
        referrer_id       : referredByMarketer,
      };

      const result = await req('orders', { method: 'POST', body: JSON.stringify(orderPayload) });

      if (result.status === 'error' || (result.message && !Array.isArray(result))) {
        allSuccess = false;
        errorMsg   = result.message || 'خطأ أثناء الحفظ';
        break;
      }
      createdOrders.push({ order_id: oid, product_id: String(item.product_id), size: item.size || '', color: item.color || '', qty });
    }

    if (allSuccess) {
      // تحديث المخزون
      for (const order of createdOrders) {
        await updateStockAfterOrder(order.product_id, order.size, order.color, order.qty);
      }

      // مسح السلة المحلية
      const localCart = JSON.parse(localStorage.getItem('cart_' + marketerId) || '[]');
      const newCart   = localCart.filter(i => i.cart_id !== globalCartId);
      localStorage.setItem('cart_' + marketerId, JSON.stringify(newCart));

      if (alertContainer) alertContainer.innerHTML = `<div class="alert alert-success">✅ تم إنشاء الطلب بنجاح! (${orderProducts.length} منتج)</div>`;
      setTimeout(() => goBack(), 2000);
    } else {
      if (alertContainer) alertContainer.innerHTML = `<div class="alert alert-danger">❌ فشل: ${errorMsg || 'خطأ غير معروف'}</div>`;
    }

  } catch(e) {
    if (alertContainer) alertContainer.innerHTML = `<div class="alert alert-danger">❌ خطأ: ${e.message}</div>`;
  }

  if (btn) { btn.disabled = false; btn.textContent = '✅ تأكيد الطلب'; }
}

// ============================================================
// مساعدات
// ============================================================
function showError(msg){
  document.getElementById('orderContainer').innerHTML = `
    <div class="alert alert-danger">⚠️ ${msg}</div>
    <button class="btn btn-primary" onclick="goBack()" style="width:100%">← رجوع للمنتجات</button>
  `;
}

function goBack(){
  window.location.href = `displayed_products.html?user=${encodeURIComponent(marketerId)}&type=marketer`;
}
