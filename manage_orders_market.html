<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>طلباتي - المسوق</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --card-bg: #151515;
  --card-border: #2a2a2a;
  --text: #ffffff;
  --muted: #888;
  --green: #00ff88;
  --red: #ff3366;
  --blue: #00aaff;
  --orange: #ff9900;
  --gold: #ffd700;
  --purple: #aa44ff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Tajawal", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
  min-height: 100vh;
}

/* ===== السليدر الجانبي (Sidebar) ===== */
.menu-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  font-size: 28px;
  color: var(--green);
  cursor: pointer;
  z-index: 1001;
  background: #151515;
  width: 45px;
  height: 45px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #333;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  transition: all 0.3s ease;
}
.menu-btn:hover {
  background: var(--green);
  color: #000;
  transform: scale(1.05);
}

.sidebar {
  position: fixed;
  top: 0;
  right: -280px;
  width: 280px;
  height: 100%;
  background: #0a0a0a;
  border-left: 2px solid var(--green);
  transition: right 0.3s ease;
  z-index: 1002;
  overflow-y: auto;
  direction: rtl;
  box-shadow: -5px 0 30px rgba(0,0,0,0.5);
}
.sidebar.active { right: 0; }
.sidebar-header {
  padding: 20px;
  background: #151515;
  border-bottom: 2px solid var(--green);
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--green);
  font-size: 20px;
  font-weight: 900;
}
.sidebar-header button {
  background: none;
  border: none;
  color: #ff4444;
  font-size: 32px;
  cursor: pointer;
  transition: 0.2s;
}
.sidebar-header button:hover { transform: scale(1.1); }
.sidebar-menu { padding: 15px 0; }
.sidebar-menu a {
  display: block;
  padding: 15px 20px;
  color: #e0e0e0;
  text-decoration: none;
  font-size: 15px;
  font-weight: 600;
  margin: 4px 10px;
  border-radius: 10px;
  transition: 0.2s;
  border-right: 4px solid transparent;
}
.sidebar-menu a:hover {
  background: #151515;
  color: var(--green);
  border-right: 4px solid var(--green);
  padding-right: 30px;
}
.sidebar-menu a.active {
  background: #151515;
  color: var(--green);
  border-right: 4px solid var(--green);
}
.sidebar-menu a.logout-btn {
  color: #ff4444;
  margin-top: 30px;
  border-right: 4px solid transparent;
}
.sidebar-menu a.logout-btn:hover {
  background: #221111;
  color: #ff6666;
  border-right: 4px solid #ff4444;
}
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  z-index: 1001;
}
.overlay.active { display: block; }

/* ===== بار معلومات المسوق ===== */
.user-bar {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 14px 20px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}
.user-bar span { font-size: 14px; color: #b0b0b0; }
.user-bar strong { color: var(--green); }
.user-type {
  padding: 4px 12px;
  background: #0a2a0a;
  border-radius: 20px;
  font-size: 12px;
  color: var(--green);
  border: 1px solid var(--green);
}

/* ===== إحصائيات ===== */
.stats-container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 25px;
}
@media(max-width: 768px) { .stats-container { grid-template-columns: repeat(2, 1fr); } }
@media(max-width: 480px) { .stats-container { grid-template-columns: 1fr; } }

.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 15px;
  text-align: center;
}
.stat-card .number { font-size: 26px; font-weight: bold; color: var(--green); }
.stat-card .label { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ===== الهيدر ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  gap: 15px;
  flex-wrap: wrap;
}
.header h2 { color: #ffffff; font-size: 24px; font-weight: 800; }
.search-box {
  flex: 1;
  min-width: 250px;
  padding: 14px;
  border: 1px solid var(--card-border);
  border-radius: 12px;
  background: var(--card-bg);
  color: var(--text);
  font-size: 14px;
}
.search-box:focus { outline: none; border-color: var(--green); }

.filter-tabs { display: flex; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
.filter-tab {
  padding: 8px 18px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 30px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: 0.2s;
}
.filter-tab.active { background: var(--green); color: #000; border-color: var(--green); }
.filter-tab:hover { background: #222; }

/* ===== كروت الطلبات ===== */
.orders-list { display: flex; flex-direction: column; gap: 15px; }
.order-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 20px; transition: 0.3s; }
.order-card:hover { border-color: var(--green); }

.order-header { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.order-header h4 { color: #fff; font-size: 18px; font-weight: 700; }
.order-id { color: var(--green); font-size: 13px; font-weight: 600; margin-top: 2px; }
.order-date { font-size: 12px; color: var(--muted); }

.customer-details { background: #0e0e0e; border-radius: 12px; padding: 14px; margin: 12px 0; font-size: 14px; color: #c0c0c0; line-height: 1.8; }

/* معلومات المسوق */
.marketer-info {
  background: #0a1a2a;
  border-right: 3px solid #00aaff;
  border-radius: 8px;
  padding: 10px 14px;
  margin: 8px 0;
  font-size: 13px;
  color: #90caf9;
}
.marketer-info strong { color: #00aaff; }

/* المنتجات */
.products-list { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--card-border); }
.product-item { display: flex; gap: 12px; margin-bottom: 10px; padding: 10px; background: #0e0e0e; border-radius: 12px; align-items: center; }
.product-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; border: 1px solid var(--card-border); }
.product-item-info { flex: 1; font-size: 13px; color: #e0e0e0; line-height: 1.6; }
.product-code { color: var(--green); font-weight: 700; }
.product-price { color: var(--orange); font-weight: 600; }

/* شارات الحالات */
.status-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; }
.status-new { background: #1a237e; color: #9fa8da; }
.status-packing { background: #e65100; color: #ffcc80; }
.status-delivery { background: #0d47a1; color: #90caf9; }
.status-received { background: #1b5e20; color: #a5d6a7; }
.status-completed { background: #004d40; color: #80cbc4; }
.status-returned { background: #b71c1c; color: #ef9a9a; }

/* بروجريس */
.progress-bar { position: relative; display: flex; justify-content: space-between; margin: 25px 0 10px; }
.progress-line { position: absolute; top: 15px; left: 0; right: 0; height: 3px; background: #2a2a2a; z-index: 1; }
.progress-fill { position: absolute; top: 15px; left: 0; height: 3px; background: var(--green); z-index: 2; transition: width 0.5s; }
.step { position: relative; z-index: 3; text-align: center; flex: 1; }
.step-dot { width: 32px; height: 32px; border-radius: 50%; background: #222; border: 2px solid var(--card-border); margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #777; transition: 0.3s; }
.step.completed .step-dot { background: var(--green); color: #000; border-color: var(--green); }
.step.active .step-dot { background: var(--green); color: #000; border-color: var(--green); box-shadow: 0 0 12px var(--green); }
.step-label { font-size: 11px; color: var(--muted); }
.step.active .step-label { color: var(--green); font-weight: bold; }

/* أزرار التحكم */
.status-controls { display: flex; gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--card-border); justify-content: flex-end; flex-wrap: wrap; }
.status-btn { padding: 8px 18px; border-radius: 30px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
.btn-received { background: #1b5e20; color: #fff; }
.btn-completed { background: #004d40; color: #fff; }
.btn-return { background: #b71c1c; color: #fff; }
.status-btn:hover { opacity: 0.85; transform: scale(1.02); }

.commission-box { background: linear-gradient(90deg, #0a2a0a, #0d1e0d); border: 1px solid var(--green); border-radius: 12px; padding: 12px; margin-top: 12px; text-align: center; font-size: 14px; }
.commission-box span { color: var(--green); font-size: 18px; font-weight: bold; }

.loading { text-align: center; padding: 50px; color: var(--muted); font-size: 16px; }
.empty-orders { text-align: center; padding: 50px; color: var(--muted); }

.supplier-product-tag {
  display: inline-block;
  background: #1a2a1a;
  color: var(--green);
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  border: 1px solid var(--green);
  margin-right: 8px;
}

.order-count-badge {
  background: var(--green);
  color: #000;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
  margin-right: 8px;
}

.empty-state-icon { font-size: 48px; margin-bottom: 15px; }
</style>
</head>
<body>

<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <span>🏬 لوحة تحكم المسوق</span>
    <button onclick="toggleSidebar()">×</button>
  </div>
  <div class="sidebar-menu">
    <!-- 1. لوحة البيانات -->
    <a href="#" onclick="goToPage('data_page_market')">🏠 لوحة البيانات</a>
    
    <!-- 2. المنتجات المعروضة -->
    <a href="#" onclick="goToPage('displayed_products')">🛍️ المنتجات المعروضة</a>
    
    <!-- 3. المحفظة -->
    <a href="#" onclick="goToPage('my_wallet_market')">💰 المحفظة</a>
    
    <!-- 4. إدارة الأوردرات -->
    <a href="#" onclick="goToPage('manage_orders_market')">📋 إدارة الأوردرات</a>
    
    <!-- 5. الدعم الفني (واتساب) -->
    <a href="https://wa.me/201108712091" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:10px;background:#25d366;color:#fff !important;font-weight:700 !important;margin:20px 15px 5px !important;box-shadow:0 4px 15px rgba(37,211,102,0.3);">💬 الدعم الفني</a>
    
    <!-- 6. تسجيل الخروج -->
    <a href="#" onclick="logout()" class="logout-btn">🚪 تسجيل الخروج</a>
  </div>
</div>
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<div id="userBar" class="user-bar">
  <span>🧑‍💼 المسوق: <strong id="userName">-</strong></span>
  <span>🆔 كود المستخدم: <strong id="userCode">-</strong></span>
  <span class="user-type">🧑‍💼 مسوق</span>
</div>

<div class="stats-container">
  <div class="stat-card"><div class="number" id="statTotal">0</div><div class="label">إجمالي الطلبات</div></div>
  <div class="stat-card"><div class="number" id="statPending">0</div><div class="label">قيد التنفيذ</div></div>
  <div class="stat-card"><div class="number" id="statCompleted">0</div><div class="label">مكتملة</div></div>
  <div class="stat-card"><div class="number" id="statCommission">0</div><div class="label">إجمالي المبيعات</div></div>
</div>

<div class="header">
  <h2 id="pageTitle">📋 طلباتي <span id="orderCount" class="order-count-badge">0</span></h2>
  <input type="text" class="search-box" id="searchInput" placeholder="🔍 ابحث باسم العميل، رقم الهاتف أو كود الأوردر..." onkeyup="filterOrders()">
</div>

<div class="filter-tabs">
  <div class="filter-tab active" data-filter="all" onclick="setFilter('all')">الكل</div>
  <div class="filter-tab" data-filter="pending" onclick="setFilter('pending')">قيد التنفيذ</div>
  <div class="filter-tab" data-filter="completed" onclick="setFilter('completed')">المكتملة</div>
  <div class="filter-tab" data-filter="returned" onclick="setFilter('returned')">المرتجعة</div>
</div>

<div id="loading" class="loading">⏳ جاري تحميل الطلبات...</div>
<div id="ordersList" class="orders-list"></div>

<script>
// ===== دوال السليدر والتنقل =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('active');
  document.getElementById('overlay').classList.toggle('active');
}

function goToPage(pageName) {
  toggleSidebar();
  const currentUser = (localStorage.getItem('username') || currentUserVar || '').toLowerCase().trim();
  window.location.href = `${pageName}.html?user=${encodeURIComponent(currentUser)}&type=marketer`;
}

function logout() {
  if(confirm("هل أنت متأكد من رغبتك في تسجيل الخروج؟")) {
    localStorage.clear();
    window.location.href = "index.html";
  }
}

// ===== إعدادات Supabase =====
const SUPABASE_URL = 'https://zphepebjpxrzpudncuas.supabase.co';
const SUPABASE_KEY = 'sb_publishable_tIG9XDZeHVZpZjz74e-dBA_ui5GIYw7';

const urlParams = new URLSearchParams(window.location.search);
let currentUserVar = (urlParams.get('user') || localStorage.getItem('username') || '').toLowerCase().trim();
let allOrders = [];
let currentFilter = 'all';
let currentSearch = '';

// تعريف شامل للحالات مع المرادفات العربية والإنجليزية
const STATUS_STAGES = {
  'pending': 0, 'جديد': 0, 
  'packing': 1, 'تغليف': 1, 
  'shipping': 2, 'توصيل': 2, 
  'received': 3, 'تم الاستلام': 3, 
  'completed': 4, 'تم التسليم': 4, 'تم التوصيل': 4, 
  'returned': -1, 'مرتجع': -1, 'مرفوض': -1, 'cancelled': -1
};

// حالات الطلب المكتملة (للإحصائيات والتصفية)
const COMPLETED_STATUSES = ['completed', 'تم التسليم', 'تم التوصيل'];
const RETURNED_STATUSES = ['returned', 'مرتجع', 'مرفوض', 'cancelled'];

// ===== تهيئة الصفحة =====
window.onload = function() {
  // جلب اسم المستخدم تلقائياً من الرابط أو localStorage
  if (currentUserVar) {
    document.getElementById('userName').innerText = currentUserVar;
    document.getElementById('userCode').innerText = currentUserVar;
  } else {
    // لو مفيش اسم مستخدم، نستخدم اسم افتراضي أو نطلب من المستخدم
    const defaultUser = 'ragap';
    currentUserVar = defaultUser;
    localStorage.setItem('username', defaultUser);
    document.getElementById('userName').innerText = defaultUser;
    document.getElementById('userCode').innerText = defaultUser;
  }
  
  // تحميل الطلبات تلقائياً
  loadOrders();
  
  // تحديث الطلبات كل 30 ثانية
  setInterval(loadOrders, 30000);
}

// ===== دوال API =====
async function supabaseApi(endpoint, options = {}) {
  const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    ...options.headers
  };
  const response = await fetch(url, { ...options, headers });
  if (!response.ok) throw new Error(`خطأ ${response.status}: ${await response.text()}`);
  return await response.json();
}

// ===== الوظيفة الأساسية - جلب طلبات المسوق (باستخدام marketer_id و marketer_username) =====
async function loadOrders() {
  const username = currentUserVar;
  
  if (!username) {
    alert('⚠️ لا يوجد اسم مستخدم');
    return;
  }
  
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loading').innerHTML = '⏳ جاري تحميل طلباتك...';
  
  try {
    // 1. نجيب الـ ID بتاع المسوق من جدول stylek_password
    const userQuery = `stylek_password?select=id&username=eq.${username}`;
    const userData = await supabaseApi(userQuery);
    
    let marketerId = null;
    if (userData && userData.length > 0) {
      marketerId = userData[0].id;
    }
    
    // 2. نبني استعلام الطلبات بحيث يدور في الاتنين (marketer_id و marketer_username)
    let ordersQuery;
    if (marketerId) {
      // لو لقينا ID، نجيب الطلبات بالـ ID أو بالـ Username (احتياطي)
      ordersQuery = `orders?select=*&or=(marketer_id.eq.${marketerId},marketer_username.eq.${username})&order=created_at.desc`;
    } else {
      // لو ملقناش ID، ندور بالـ Username بس
      ordersQuery = `orders?select=*&marketer_username=eq.${username}&order=created_at.desc`;
    }
    
    const ordersData = await supabaseApi(ordersQuery);
    
    if (!ordersData || ordersData.length === 0) {
      document.getElementById('loading').innerHTML = '📭 لا توجد طلبات';
      document.getElementById('ordersList').innerHTML = `
        <div class="empty-orders">
          <div class="empty-state-icon">📭</div>
          <div>لم تقم بأي طلبات حتى الآن</div>
          <div style="font-size:12px;color:var(--muted);margin-top:8px;">الطلبات اللي هتعملها كمسوق هتظهر هنا</div>
        </div>
      `;
      allOrders = [];
      updateStats();
      return;
    }
    
    // 3. نجمع كل product_id من الطلبات عشان نجيب تفاصيل المنتجات
    const productIds = [...new Set(ordersData.map(o => o.product_id))];
    
    // 4. نجيب تفاصيل المنتجات من جدول products
    let productMap = {};
    if (productIds.length > 0) {
      const productIdsStr = productIds.map(id => `"${id}"`).join(',');
      const productsQuery = `products?select=product_id,name,base_price,image_url&product_id=in.(${productIdsStr})`;
      const productsData = await supabaseApi(productsQuery);
      
      // 5. نعمل Map للوصول السريع
      productsData.forEach(p => {
        productMap[p.product_id] = p;
      });
    }
    
    // 6. ندمج بيانات الطلب مع بيانات المنتج
    allOrders = ordersData.map(order => {
      const product = productMap[order.product_id] || {};
      
      return {
        ...order,
        // بيانات المنتج من جدول products
        product_name: product.name || 'منتج غير معروف',
        image_url: product.image_url || '',
        product_price: product.base_price || order.price || 0,
        product_stock: product.stock || 0,
        // بيانات الطلب
        order_qty: order.qty || 1,
        order_price: order.price || 0,
        order_status: order.order_status || 'pending',
        // معلومات المسوق
        marketer_id: order.marketer_id,
        marketer_username: order.marketer_username || username
      };
    });
    
    updateStats();
    filterAndDisplay();
    
    document.getElementById('loading').innerHTML = `✅ تم تحميل ${ordersData.length} طلب`;
    
  } catch(err) {
    console.error('❌ خطأ في التحميل:', err);
    document.getElementById('loading').innerHTML = '❌ خطأ في التحميل: ' + err.message;
    document.getElementById('ordersList').innerHTML = `
      <div class="empty-orders">
        <div style="color:var(--red);font-size:20px;">⚠️</div>
        <div>حدث خطأ أثناء تحميل الطلبات</div>
        <div style="font-size:12px;color:var(--muted);margin-top:8px;">${err.message}</div>
      </div>
    `;
  }
}

// ===== تحديث الإحصائيات =====
function updateStats() {
  const total = allOrders.length;
  
  // الطلبات قيد التنفيذ (غير مكتملة وغير مرتجعة)
  const pending = allOrders.filter(o => 
    !COMPLETED_STATUSES.includes(o.order_status) && 
    !RETURNED_STATUSES.includes(o.order_status)
  ).length;
  
  // الطلبات المكتملة
  const completed = allOrders.filter(o => 
    COMPLETED_STATUSES.includes(o.order_status)
  ).length;
  
  // إجمالي المبيعات (الطلبات المكتملة فقط)
  const totalSales = allOrders
    .filter(o => COMPLETED_STATUSES.includes(o.order_status))
    .reduce((sum, o) => sum + (parseFloat(o.product_price) || 0) * (parseInt(o.order_qty) || 1), 0);
  
  document.getElementById('statTotal').innerText = total;
  document.getElementById('statPending').innerText = pending;
  document.getElementById('statCompleted').innerText = completed;
  document.getElementById('statCommission').innerText = totalSales.toFixed(2);
  
  // تحديث عدد الطلبات في الهيدر
  document.getElementById('orderCount').innerText = total;
}

// ===== دوال التصفية والعرض =====
function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.classList.remove('active');
    if(tab.dataset.filter === filter) tab.classList.add('active');
  });
  filterAndDisplay();
}

function filterOrders() {
  currentSearch = document.getElementById('searchInput').value.toLowerCase().trim();
  filterAndDisplay();
}

function filterAndDisplay() {
  let filtered = [...allOrders];
  
  // تصفية حسب الحالة
  if(currentFilter === 'pending') {
    filtered = filtered.filter(o => !COMPLETED_STATUSES.includes(o.order_status) && !RETURNED_STATUSES.includes(o.order_status));
  } else if(currentFilter === 'completed') {
    filtered = filtered.filter(o => COMPLETED_STATUSES.includes(o.order_status));
  } else if(currentFilter === 'returned') {
    filtered = filtered.filter(o => RETURNED_STATUSES.includes(o.order_status));
  }
  
  // تصفية حسب البحث
  if(currentSearch) {
    filtered = filtered.filter(o => 
      (o.customer_name || '').toLowerCase().includes(currentSearch) ||
      (o.phone || '').includes(currentSearch) ||
      (o.order_id || '').toLowerCase().includes(currentSearch) ||
      (o.product_name || '').toLowerCase().includes(currentSearch)
    );
  }
  
  displayOrders(filtered);
}

// ===== دوال مساعدة للعرض =====
function getStatusClass(status) {
  const classes = {
    'pending': 'status-new', 'جديد': 'status-new', 
    'packing': 'status-packing', 'تغليف': 'status-packing', 
    'shipping': 'status-delivery', 'توصيل': 'status-delivery',
    'received': 'status-received', 'تم الاستلام': 'status-received', 
    'completed': 'status-completed', 'تم التسليم': 'status-completed', 'تم التوصيل': 'status-completed',
    'returned': 'status-returned', 'مرتجع': 'status-returned', 'مرفوض': 'status-returned', 'cancelled': 'status-returned'
  };
  return classes[status] || 'status-new';
}

function getStatusArabicLabel(status) {
  const labels = {
    'pending': 'جديد', 'جديد': 'جديد',
    'packing': 'تغليف', 'تغليف': 'تغليف',
    'shipping': 'توصيل', 'توصيل': 'توصيل',
    'received': 'تم الاستلام', 'تم الاستلام': 'تم الاستلام',
    'completed': 'مكتمل', 'تم التسليم': 'مكتمل', 'تم التوصيل': 'مكتمل',
    'returned': 'مرتجع', 'مرتجع': 'مرتجع', 'مرفوض': 'مرفوض', 'cancelled': 'ملغي'
  };
  return labels[status] || status;
}

function getProgressWidth(stage) {
  if(stage === -1) return '0%';
  return (stage / 4) * 100 + '%';
}

function isOrderFinished(status) {
  return COMPLETED_STATUSES.includes(status) || RETURNED_STATUSES.includes(status);
}

// ===== تحديث حالة الطلب =====
async function updateStatus(orderId, newStatus) {
  if(RETURNED_STATUSES.includes(newStatus) && !confirm('⚠️ هل أنت متأكد من إرجاع هذا الطلب؟')) return;
  
  try {
    await supabaseApi(`orders?order_id=eq.${orderId}`, {
      method: 'PATCH',
      body: JSON.stringify({ order_status: newStatus })
    });
    
    const order = allOrders.find(o => o.order_id === orderId);
    if(order) order.order_status = newStatus;
    filterAndDisplay();
    updateStats();
    alert('✅ تم تحديث الحالة بنجاح');
  } catch(err) {
    alert('❌ فشل تحديث الحالة: ' + err.message);
  }
}

// ===== عرض الطلبات في واجهة المستخدم =====
function displayOrders(orders) {
  const container = document.getElementById('ordersList');
  document.getElementById('loading').style.display = 'none';
  
  if(!orders || orders.length === 0) {
    container.innerHTML = `
      <div class="empty-orders">
        <div class="empty-state-icon">🔍</div>
        <div>لا توجد طلبات مطابقة للبحث</div>
        <div style="font-size:12px;color:var(--muted);margin-top:8px;">جرب تغيير كلمات البحث أو الفلتر</div>
      </div>
    `;
    return;
  }
  
  let html = '';
  orders.forEach(order => {
    const stage = STATUS_STAGES[order.order_status] !== undefined ? STATUS_STAGES[order.order_status] : 0;
    const progressWidth = getProgressWidth(stage);
    const statusClass = getStatusClass(order.order_status);
    const isFinished = isOrderFinished(order.order_status);
    
    const imgUrl = order.image_url || 'https://placehold.co/60x60/1a1a1a/444?text=Stylek';
    const productName = order.product_name;
    const productPrice = parseFloat(order.product_price) || 0;
    const qty = parseInt(order.order_qty) || 1;
    const totalPrice = productPrice * qty;
    
    html += `
      <div class="order-card">
        <div class="order-header">
          <div>
            <h4>👤 ${order.customer_name || 'عميل غير مسجل'}</h4>
            <div class="order-id">🆔 كود الطلب: ${order.order_id || '-'}</div>
            <div class="order-id" style="color:var(--blue);font-size:12px;">
              📦 ${productName}
            </div>
          </div>
          <div style="text-align:left">
            <span class="status-badge ${statusClass}">${getStatusArabicLabel(order.order_status)}</span>
            <div class="order-date">📅 ${order.created_at ? new Date(order.created_at).toLocaleDateString('ar-EG') : '-'}</div>
          </div>
        </div>
        
        <div class="customer-details">
          <div>📞 رقم الهاتف: ${order.phone || '-'}</div>
          ${order.phone2 ? `<div>📞 رقم الهاتف الثاني: ${order.phone2}</div>` : ''}
          <div>📍 العنوان: ${order.governorate || ''}، ${order.city || ''}، ${order.address || ''}</div>
          <div>📝 ملاحظات: ${order.notes || 'لا توجد'}</div>
        </div>
        
        <div class="marketer-info">
          🤝 أنت المسوق: <strong>${order.marketer_username || 'غير معروف'}</strong>
          ${order.marketer_id ? `| 🆔 ${order.marketer_id}` : ''}
        </div>
        
        <div class="products-list">
          <div class="product-item">
            <img src="${imgUrl}" onerror="this.src='https://placehold.co/60x60/1a1a1a/444'">
            <div class="product-item-info">
              <div class="product-code">📦 ${productName}</div>
              <div>🔢 الكمية المطلوبة: ${qty}</div>
              ${order.size ? `<div>📏 المقاس: ${order.size}</div>` : ''}
              ${order.color ? `<div>🎨 اللون: ${order.color}</div>` : ''}
              <div class="product-price">💰 سعر القطعة: ${productPrice} ج.م</div>
              <div class="product-price" style="color:var(--gold);">💵 إجمالي الطلب: ${totalPrice} ج.م</div>
            </div>
          </div>
        </div>
        
        <div class="commission-box">
          💰 إجمالي قيمة الطلب: <span>${totalPrice} ج.م</span>
        </div>
        
        <div class="progress-bar">
          <div class="progress-line"></div>
          <div class="progress-fill" style="width:${progressWidth}"></div>
          <div class="step ${stage >= 0 ? 'completed' : ''} ${stage === 0 ? 'active' : ''}"><div class="step-dot">📅</div><div class="step-label">جديد</div></div>
          <div class="step ${stage >= 1 ? 'completed' : ''} ${stage === 1 ? 'active' : ''}"><div class="step-dot">🎁</div><div class="step-label">تغليف</div></div>
          <div class="step ${stage >= 2 ? 'completed' : ''} ${stage === 2 ? 'active' : ''}"><div class="step-dot">🚚</div><div class="step-label">توصيل</div></div>
          <div class="step ${stage >= 3 ? 'completed' : ''} ${stage === 3 ? 'active' : ''}"><div class="step-dot">📦</div><div class="step-label">استلام</div></div>
          <div class="step ${stage >= 4 ? 'completed' : ''} ${stage === 4 ? 'active' : ''}"><div class="step-dot">✅</div><div class="step-label">مكتمل</div></div>
        </div>
        
        <div class="status-controls">
          ${(order.order_status === 'shipping' || order.order_status === 'توصيل') ? 
            `<button class="status-btn btn-received" onclick="updateStatus('${order.order_id}', 'تم الاستلام')">📦 تأكيد الاستلام</button>` : ''}
          ${(order.order_status === 'received' || order.order_status === 'تم الاستلام') ? 
            `<button class="status-btn btn-completed" onclick="updateStatus('${order.order_id}', 'completed')">✅ إنهاء الطلب</button>` : ''}
          ${!isFinished ? 
            `<button class="status-btn btn-return" onclick="updateStatus('${order.order_id}', 'returned')">↩️ إلغاء / مرتجع</button>` : ''}
        </div>
      </div>
    `;
  });
  
  container.innerHTML = html;
}
</script>
</body>
</html>
