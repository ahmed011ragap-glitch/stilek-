<script>
// ============================================================
// ===== CONFIG =====
// ============================================================
const SUPABASE_URL = 'https://zphepebjpxrzpudncuas.supabase.co';
const SUPABASE_KEY = 'sb_publishable_tIG9XDZeHVZpZjz74e-dBA_ui5GIYw7';
const GOOGLE_SHEETS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbzPM33CzmK_7SiRoDvlUqH8EvzRYTxV1rk4Sx4pkOrnXR9XIZmlMTg0jRGUOTw4plnR/exec';

let otpRequestCount = 0;
let isCooldownActive = false;
let generatedCurrentOtp = "";
let cooldownInterval = null;

console.log('🔍 Checking CryptoJS:', typeof CryptoJS);

// جلب البارامترات تلقائياً من الرابط وملء حقل كود الترويج فوراً
const urlParams = new URLSearchParams(window.location.search);
let automaticRefCode = urlParams.get('ref') || urlParams.get('user') || '';
if(automaticRefCode) {
    document.getElementById('affiliate_user').value = automaticRefCode.trim().toLowerCase();
}

document.getElementById("type").addEventListener("change", function() {
    let notice = document.getElementById("noticeBox");
    if (this.value === "مسوق") {
        notice.style.display = "block";
    } else {
        notice.style.display = "none";
    }
});

// ============================================================
// ===== دوال التشفير =====
// ============================================================
function hashPassword(password) {
    try {
        if (typeof CryptoJS === 'undefined') {
            console.warn('⚠️ CryptoJS not loaded, using plain text');
            return password;
        }
        const salt = 'Stylek_Salt_2024_#Secure!';
        const hashed = CryptoJS.SHA256(password + salt).toString();
        console.log('✅ تم تشفير الباسورد بنجاح');
        return hashed;
    } catch (error) {
        console.error('❌ خطأ في التشفير:', error);
        return password;
    }
}

function verifyPassword(plainPassword, hashedPassword) {
    try {
        if (typeof CryptoJS === 'undefined') {
            console.warn('⚠️ CryptoJS not loaded, comparing plain text');
            return plainPassword === hashedPassword;
        }
        const hashed = hashPassword(plainPassword);
        return hashed === hashedPassword;
    } catch (error) {
        console.error('❌ خطأ في التحقق:', error);
        return plainPassword === hashedPassword;
    }
}

// ============================================================
// ===== دوال مساعدة =====
// ============================================================
function togglePass(id, eye) {
    let pass = document.getElementById(id);
    pass.type = pass.type === "password" ? "text" : "password";
    eye.innerHTML = pass.type === "password" ? "👁️" : "🙈";
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.error,.success').forEach(e => e.innerHTML = "");
    document.getElementById("otpBox").style.display = "none";
    document.getElementById("signupOtpBox").style.display = "none";
    if (cooldownInterval) clearInterval(cooldownInterval);
    isCooldownActive = false;
    document.getElementById("signupTimer").innerHTML = "";
    document.getElementById("noticeBox").style.display = "none";
    document.getElementById("type").value = "";
}

// ============================================================
// ===== API =====
// ============================================================
async function supabaseApi(endpoint, options = {}) {
    const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
    const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        ...options.headers
    };
    if (options.method === 'POST' || options.method === 'PATCH') {
        headers['Prefer'] = 'return=representation';
    }
    try {
        const response = await fetch(url, { ...options, headers });
        if (!response.ok) {
            const error = await response.text();
            throw new Error(`خطأ ${response.status}: ${error}`);
        }
        const text = await response.text();
        return text ? JSON.parse(text) : {};
    } catch(e) {
        console.error("Supabase API Safe catch applied:", e);
        return [];
    }
}

async function saveToSupabase(table, data) {
    try {
        return await supabaseApi(table, {
            method: 'POST',
            body: JSON.stringify(data)
        });
    } catch (e) {
        throw new Error(`❌ فشل الحفظ: ${e.message}`);
    }
}

async function sendToGoogleSheet(actionType, payload) {
    try {
        if (!payload.otp || payload.otp === payload.whatsapp) {
            payload.otp = Math.floor(100000 + Math.random() * 900000).toString();
        }
        generatedCurrentOtp = payload.otp;
        await fetch(GOOGLE_SHEETS_WEBHOOK_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: actionType, ...payload })
        });
        return { status: 'success', otp: payload.otp };
    } catch (e) {
        throw new Error(`❌ فشل الاتصال: ${e.message}`);
    }
}

function startOtpCooldown(timerId, buttonId) {
    if (cooldownInterval) clearInterval(cooldownInterval);
    otpRequestCount++;
    let seconds = otpRequestCount > 2 ? 180 : 60;
    isCooldownActive = true;
    const timerElement = document.getElementById(timerId);
    const btnElement = document.getElementById(buttonId);
    if (btnElement) btnElement.disabled = true;
    cooldownInterval = setInterval(() => {
        let mins = Math.floor(seconds / 60);
        let secs = seconds % 60;
        timerElement.innerHTML = `⏳ انتظر ${mins}:${secs < 10 ? '0' : ''}${secs}`;
        seconds--;
        if (seconds < 0) {
            clearInterval(cooldownInterval);
            timerElement.innerHTML = "";
            isCooldownActive = false;
            if (btnElement) btnElement.disabled = false;
        }
    }, 1000);
}

// ============================================================
// ===== إنشاء حساب جديد =====
// ============================================================
document.getElementById("create").onclick = async function() {
    let name = document.getElementById("name").value.trim();
    let username = document.getElementById("username").value.trim().toLowerCase();
    let email = document.getElementById("email").value.trim().toLowerCase();
    let password = document.getElementById("password").value;
    let type = document.getElementById("type").value;
    let whatsapp = document.getElementById("whatsapp").value.trim();
    let affiliate_user = document.getElementById("affiliate_user").value.trim().toLowerCase();
    let error = document.getElementById("error");
    let success = document.getElementById("success");
    let notice = document.getElementById("noticeBox");
    error.innerHTML = "";
    success.innerHTML = "";

    if (name.length < 3) { error.innerHTML = "⚠️ الاسم 3 أحرف على الأقل"; return; }
    if (username.length < 3) { error.innerHTML = "⚠️ اسم المستخدم 3 أحرف"; return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { error.innerHTML = "⚠️ البريد غير صحيح"; return; }
    if (password.length < 8) { error.innerHTML = "⚠️ كلمة المرور 8 أحرف على الأقل"; return; }
    if (whatsapp.length < 5) { error.innerHTML = "⚠️ رقم واتساب غير صحيح"; return; }
    if (type === "") { error.innerHTML = "⚠️ اختر نوع الحساب"; return; }

    if (type === "مسوق") {
        error.innerHTML = "";
        notice.style.display = "block";
        return;
    }

    this.disabled = true;
    try {
        success.innerHTML = "⏳ جاري الفحص...";
        const checkUser = await supabaseApi(`stylek_password?or=(username.ilike.${username},email.ilike.${email})&select=*`);
        if (checkUser && checkUser.length > 0) {
            error.innerHTML = "⚠️ اسم المستخدم أو البريد مسجل بالفعل";
            this.disabled = false;
            return;
        }

        success.innerHTML = "⏳ جاري إرسال كود التحقق إلى بريدك...";
        // إلحاق كود الترويج التلقائي في شيت جوجل
        await sendToGoogleSheet("signup", { name, username, email, password, role: type, whatsapp, affiliate_user });

        success.innerHTML = "✅ تم إرسال كود التحقق بنجاح 📧";
        document.getElementById("signupOtpBox").style.display = "block";
        startOtpCooldown("signupTimer", "resendSignupOtp");

    } catch (e) {
        error.innerHTML = "❌ " + e.message;
    }
    this.disabled = false;
};

// ============================================================
// ===== تأكيد OTP وتسجيل الدخول =====
// ============================================================
document.getElementById("verifyAndLogin").onclick = async function() {
    let enteredOtp = document.getElementById("signupOtpCode").value.trim();
    let error = document.getElementById("error");
    let success = document.getElementById("success");
    let notice = document.getElementById("noticeBox");
    error.innerHTML = "";
    notice.style.display = "none";

    if (enteredOtp !== generatedCurrentOtp) {
        error.innerHTML = "❌ كود OTP غير صحيح";
        return;
    }

    this.disabled = true;
    this.innerText = "⏳ جاري التفعيل...";

    try {
        let name = document.getElementById("name").value.trim();
        let username = document.getElementById("username").value.trim().toLowerCase();
        let email = document.getElementById("email").value.trim().toLowerCase();
        let password = document.getElementById("password").value;
        let type = document.getElementById("type").value;
        let whatsapp = document.getElementById("whatsapp").value.trim();
        let affiliate_user = document.getElementById("affiliate_user").value.trim().toLowerCase();

        const hashedPassword = hashPassword(password);
        console.log('✅ الباسورد المشفر:', hashedPassword);

        const newUser = { 
            username, 
            password: hashedPassword,
            email, 
            role: type, 
            name, 
            whatsapp,
            affiliate_user: affiliate_user || null
        };
        
        await saveToSupabase('stylek_password', newUser);

        success.innerHTML = "🎉 تم التفعيل بنجاح! جاري التوجيه...";
        if (cooldownInterval) clearInterval(cooldownInterval);

        localStorage.setItem('username', username);
        localStorage.setItem('userType', type);
        localStorage.setItem('userName', name);

        setTimeout(() => {
            if (type === 'تاجر') {
                window.location.href = 'data_page.html?user=' + encodeURIComponent(username);
            } else {
                window.location.href = 'displayed_products.html?user=' + encodeURIComponent(username);
            }
        }, 1500);

    } catch (e) {
        error.innerHTML = "❌ " + e.message;
        this.disabled = false;
        this.innerText = "تأكيد ودخول مباشر 🚀";
    }
};

// ============================================================
// ===== إعادة إرسال OTP =====
// ============================================================
document.getElementById("resendSignupOtp").onclick = function(e) {
    e.preventDefault();
    if (isCooldownActive) return;
    
    let name = document.getElementById("name").value.trim();
    let username = document.getElementById("username").value.trim().toLowerCase();
    let email = document.getElementById("email").value.trim().toLowerCase();
    let password = document.getElementById("password").value;
    let type = document.getElementById("type").value;
    let whatsapp = document.getElementById("whatsapp").value.trim();
    let affiliate_user = document.getElementById("affiliate_user").value.trim().toLowerCase();

    document.getElementById("success").innerHTML = "🔄 جاري إعادة إرسال الكود...";
    sendToGoogleSheet("signup", { name, username, email, password, role: type, whatsapp, affiliate_user });
    document.getElementById("success").innerHTML = "✅ تم إعادة الإرسال!";
    startOtpCooldown("signupTimer", "resendSignupOtp");
};

// ============================================================
// ===== تسجيل الدخول =====
// ============================================================
document.getElementById("login").onclick = async function() {
    let email = document.getElementById("loginEmail").value.trim().toLowerCase();
    let password = document.getElementById('loginPassword').value;
    let error = document.getElementById("loginError");
    let success = document.getElementById("loginSuccess");
    error.innerHTML = "";
    success.innerHTML = "";

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) || password.length < 3) {
        error.innerHTML = "⚠️ بيانات الدخول غير صحيحة";
        return;
    }

    this.disabled = true;
    try {
        const users = await supabaseApi(`stylek_password?email=ilike.${email}&select=*`);
        if (!users || users.length === 0) {
            error.innerHTML = "⚠️ البريد غير مسجل";
            this.disabled = false;
            return;
        }

        const user = users[0];

        const isValid = verifyPassword(password, user.password);
        
        if (!isValid) {
            error.innerHTML = "⚠️ كلمة المرور غير صحيحة";
            this.disabled = false;
            return;
        }

        if (user.role !== 'تاجر' && user.role !== 'مسوق') {
            error.innerHTML = "⚠️ نوع الحساب غير معروف";
            this.disabled = false;
            return;
        }

        await sendToGoogleSheet("login_success", {
            name: user.name,
            username: user.username,
            email: user.email,
            role: user.role,
            whatsapp: user.whatsapp || ""
        });

        localStorage.setItem('username', user.username);
        localStorage.setItem('userType', user.role);
        localStorage.setItem('userName', user.name || user.username);

        success.innerHTML = "✅ تم التحقق بنجاح! جاري التوجيه...";
        setTimeout(() => {
            if (user.role === 'تاجر') {
                window.location.href = 'data_page.html?user=' + encodeURIComponent(user.username);
            } else {
                window.location.href = 'displayed_products.html?user=' + encodeURIComponent(user.username);
            }
        }, 1500);

    } catch (e) {
        error.innerHTML = "❌ خطأ: " + e.message;
    }
    this.disabled = false;
};

// ============================================================
// ===== استعادة كلمة السر =====
// ============================================================
document.getElementById("sendOtp").onclick = async function() {
    let email = document.getElementById("forgotEmail").value.trim().toLowerCase();
    let error = document.getElementById("forgotError");
    let success = document.getElementById("forgotSuccess");
    error.innerHTML = "";
    success.innerHTML = "";

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        error.innerHTML = "⚠️ البريد غير صحيح";
        return;
    }

    this.disabled = true;
    try {
        const users = await supabaseApi(`stylek_password?email=ilike.${email}&select=*`);
        if (!users || users.length === 0) {
            error.innerHTML = "⚠️ البريد غير مسجل";
            this.disabled = false;
            return;
        }

        const otp = Math.floor(100000 + Math.random() * 900000).toString();
        await supabaseApi(`stylek_password?id=eq.${users[0].id}`, {
            method: 'PATCH',
            body: JSON.stringify({ otp_temp: otp })
        });

        await sendToGoogleSheet("forgot_password_otp", {
            name: users[0].name,
            username: users[0].username,
            email: email,
            otp: otp,
            whatsapp: users[0].whatsapp || ""
        });

        success.innerHTML = "✅ تم إرسال الكود إلى بريدك 📧";
        document.getElementById("otpBox").style.display = "block";

    } catch (e) {
        error.innerHTML = "❌ " + e.message;
    }
    this.disabled = false;
};

document.getElementById("resetPass").onclick = async function() {
    let email = document.getElementById("forgotEmail").value.trim().toLowerCase();
    let otp = document.getElementById("otpCode").value.trim();
    let newpass = document.getElementById("newPass").value;
    let error = document.getElementById("forgotError");
    let success = document.getElementById("forgotSuccess");
    error.innerHTML = "";
    success.innerHTML = "";

    if (otp.length < 6) { error.innerHTML = "⚠️ الكود غير مكتمل"; return; }
    if (newpass.length < 8) { error.innerHTML = "⚠️ كلمة السر 8 أحرف على الأقل"; return; }

    this.disabled = true;
    try {
        const users = await supabaseApi(`stylek_password?email=ilike.${email}&otp_temp=eq.${otp}&select=*`);
        if (!users || users.length === 0) {
            error.innerHTML = "⚠️ الكود غير صحيح أو منتهي الصلاحية";
            this.disabled = false;
            return;
        }

        const hashedPassword = hashPassword(newpass);

        await supabaseApi(`stylek_password?id=eq.${users[0].id}`, {
            method: 'PATCH',
            body: JSON.stringify({ password: hashedPassword, otp_temp: null })
        });

        await sendToGoogleSheet("password_changed_success", {
            name: users[0].name,
            username: users[0].username,
            email: email,
            whatsapp: users[0].whatsapp || ""
        });

        success.innerHTML = "✅ تم تغيير كلمة السر بنجاح!";
        setTimeout(() => {
            showPage('loginPage');
            document.getElementById("loginEmail").value = email;
        }, 2000);

    } catch (e) {
        error.innerHTML = "❌ " + e.message;
    }
    this.disabled = false;
};
</script>
