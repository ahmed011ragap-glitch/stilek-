<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>متجر المسوقين - منتجات أصلية</title>
  <meta name="description" content="تسوق أفضل المنتجات الأصلية من متجر المسوقين">
  <meta name="robots" content="index, follow">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    :root {
      --bg: #121212;
      --white: #1e1e1e;
      --surface: #2a2a2a;
      --border: #3a3a3a;
      --text: #e4e4e4;
      --text-2: #b0b0b0;
      --muted: #808080;
      --green: #00b86b;
      --green-light: #1a3a2a;
      --gold: #f0a500;
      --gold-light: #3a2a0a;
      --red: #e8334a;
      --red-light: #3a1a1f;
      --blue: #3b82f6;
      --radius: 14px;
      --radius-sm: 9px;
    }
    body.guest-mode {
      --bg: #f5f5f5;
      --white: #ffffff;
      --surface: #e8e8e8;
      --border: #ddd;
      --text: #222;
      --text-2: #555;
      --muted: #888;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"Tajawal",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; transition:background .3s; }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--surface); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
    a { text-decoration:none; color:inherit; }
    button { font-family:"Tajawal",sans-serif; cursor:pointer; border:none; outline:none; background:none; }
    input, select, textarea { font-family:"Tajawal",sans-serif; outline:none; border:none; }
    img { display:block; max-width:100%; }

    .sb-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:999; display:none; }
    .sb-overlay.show { display:block; }
    .sidebar { position:fixed; top:0; right:-300px; width:280px; height:100%; background:var(--white); z-index:1000; transition:right .3s; border-left:2px solid var(--green); overflow-y:auto; box-shadow:-5px 0 30px rgba(0,0,0,0.5); }
    .sidebar.open { right:0; }
    .sb-head { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; background:var(--surface); border-bottom:2px solid var(--green); }
    .sb-logo { font-size:16px; font-weight:800; color:var(--text); }
    .sb-logo span { color:var(--green); }
    .sb-close { font-size:28px; color:var(--red); cursor:pointer; padding:0 8px; }
    .sb-nav { padding:12px 8px; }
    .nav-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; color:var(--text-2); font-weight:600; font-size:14px; transition:.2s; margin-bottom:2px; }
    .nav-item:hover { background:var(--surface); color:var(--text); }
    .nav-item.active { background:var(--green-light); color:var(--green); }
    .nav-item.wa { background:#1a3a2a; color:#25d366; }
    .nav-item.wa:hover { background:#25d366; color:#fff; }
    .nav-item.danger { color:var(--red); }
    .nav-item.danger:hover { background:var(--red-light); }
    .ni { font-size:18px; }

    .topbar { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:var(--white); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; }
    .tb-left { display:flex; align-items:center; gap:10px; }
    .menu-btn { font-size:24px; color:var(--text); padding:4px 8px; }
    .store-name { font-size:18px; font-weight:800; color:var(--text); }
    .store-name span { color:var(--green); }
    .tb-right { display:flex; align-items:center; gap:8px; }
    .user-chip { display:flex; align-items:center; gap:6px; background:var(--surface); padding:4px 12px 4px 8px; border-radius:20px; font-size:12px; font-weight:600; color:var(--text); }
    .udot { width:8px; height:8px; background:var(--green); border-radius:50%; }
    .icon-btn { position:relative; background:var(--surface); color:var(--text); padding:6px 10px; border-radius:10px; font-size:18px; transition:.2s; }
    .icon-btn:hover { background:var(--border); }
    .badge { position:absolute; top:-4px; right:-4px; background:var(--red); color:#fff; font-size:9px; font-weight:700; padding:2px 6px; border-radius:10px; min-width:18px; text-align:center; }

    .filter-bar { padding:10px 14px; background:var(--white); border-bottom:1px solid var(--border); }
    .search-row { display:flex; gap:8px; align-items:center; }
    .search-wrap { flex:1; display:flex; align-items:center; background:var(--bg); border-radius:10px; padding:0 12px; border:1px solid var(--border); }
    .search-wrap:focus-within { border-color:var(--green); }
    .search-icon { font-size:14px; color:var(--muted); }
    .search-field { flex:1; padding:10px; background:transparent; color:var(--text); font-size:14px; }
    .search-field::placeholder { color:var(--muted); }
    .filter-toggle-btn { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:10px; font-size:16px; }
    .filter-toggle-btn:hover { border-color:var(--text-2); }
    .filter-toggle-btn.active { border-color:var(--green); background:var(--green-light); }
    .adv-filter { display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
    .adv-filter.show { display:block; }
    .filter-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .filter-label { font-size:11px; color:var(--muted); font-weight:600; margin-bottom:2px; }
    .filter-input { width:100%; padding:8px 10px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; }
    .filter-input:focus { border-color:var(--green); }
    .filter-actions { display:flex; gap:8px; margin-top:10px; }
    .filter-apply { flex:1; padding:8px; background:var(--green); color:#000; border-radius:8px; font-weight:700; font-size:13px; }
    .filter-reset { flex:1; padding:8px; background:var(--surface); color:var(--text-2); border-radius:8px; font-weight:600; font-size:13px; border:1px solid var(--border); }

    .result-bar { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; padding:8px 14px; background:var(--bg); gap:8px; }
    .result-count { font-size:13px; color:var(--text-2); }
    .result-count strong { color:var(--text); font-size:16px; }
    .sort-tabs { display:flex; gap:6px; flex-wrap:wrap; }
    .sort-pill { padding:4px 12px; border-radius:20px; font-size:11px; font-weight:600; background:var(--surface); color:var(--text-2); border:1px solid transparent; cursor:pointer; }
    .sort-pill:hover { border-color:var(--border); }
    .sort-pill.active { background:var(--green); color:#000; border-color:var(--green); }

    .tabs-wrap { display:flex; gap:6px; padding:8px 14px; overflow-x:auto; background:var(--bg); border-bottom:1px solid var(--border); scrollbar-width:none; }
    .tabs-wrap::-webkit-scrollbar { display:none; }
    .tab-pill { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; background:var(--surface); color:var(--text-2); white-space:nowrap; border:1px solid transparent; cursor:pointer; }
    .tab-pill:hover { border-color:var(--border); }
    .tab-pill.active { background:var(--green); color:#000; border-color:var(--green); }

    .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(165px,1fr)); gap:12px; padding:12px 14px; }
    .grid-ph { grid-column:1/-1; display:flex; justify-content:center; align-items:center; min-height:200px; }
    .empty-state { text-align:center; }
    .empty-state .big { font-size:48px; }
    .empty-state p { color:var(--muted); font-size:14px; margin-top:8px; }
    .ls { display:flex; flex-direction:column; align-items:center; gap:12px; }
    .spin { width:36px; height:36px; border:4px solid var(--surface); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .product-card { background:var(--white); border:1px solid var(--border); border-radius:14px; overflow:hidden; cursor:pointer; transition:.2s; display:flex; flex-direction:column; }
    .product-card:hover { border-color:var(--green); transform:translateY(-2px); }
    .card-img-wrap { position:relative; background:var(--bg); aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .card-img-wrap img { width:100%; height:100%; object-fit:contain; padding:8px; }
    .out-ribbon { position:absolute; top:8px; right:-24px; background:var(--red); color:#fff; font-size:10px; font-weight:700; padding:2px 28px; transform:rotate(45deg); }
    .fav-btn-card { position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.6); padding:6px 8px; border-radius:50%; font-size:16px; transition:.2s; backdrop-filter:blur(4px); }
    .fav-btn-card.on { background:var(--red-light); }
    .card-body { padding:10px 12px 12px; display:flex; flex-direction:column; gap:4px; flex:1; }
    .card-cat-tag { font-size:9px; color:var(--muted); background:var(--surface); padding:1px 8px; border-radius:10px; display:inline-block; width:fit-content; }
    .card-name { font-size:13px; font-weight:700; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; color:var(--text); }
    .card-price-row { display:flex; align-items:baseline; gap:4px; margin-top:2px; }
    .card-price { font-size:18px; font-weight:900; color:var(--green); }
    .card-price-cur { font-size:11px; color:var(--muted); font-weight:500; }
    .card-comm-badge { display:flex; align-items:baseline; gap:6px; font-size:11px; color:var(--gold); font-weight:600; }
    .card-comm-badge small { font-size:9px; color:var(--muted); font-weight:400; }
    .card-stock { font-size:10px; font-weight:600; margin-top:2px; }
    .stock-ok { color:var(--green); }
    .stock-out { color:var(--red); }
    .card-add-btn { margin-top:auto; padding:6px; border-radius:8px; background:var(--surface); color:var(--text-2); font-size:12px; font-weight:600; text-align:center; }
    .product-card:hover .card-add-btn { background:var(--green); color:#000; }

    .modal-bg { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:flex-end; opacity:0; transition:opacity .3s; }
    .modal-bg.show { opacity:1; display:flex; }
    .modal-bg.center { align-items:center; }
    .modal-sheet { width:100%; max-height:94vh; background:var(--white); border-radius:20px 20px 0 0; overflow-y:auto; position:relative; padding:0 0 20px; transform:translateY(20px); transition:transform .3s; }
    .modal-bg.show .modal-sheet { transform:translateY(0); }
    .modal-box { width:95%; max-width:460px; max-height:92vh; background:var(--white); border-radius:20px; overflow-y:auto; padding:16px 18px; position:relative; }
    .modal-drag { width:40px; height:4px; background:var(--border); border-radius:4px; margin:8px auto 12px; }
    .modal-close { position:absolute; top:8px; left:12px; font-size:28px; color:var(--muted); z-index:10; cursor:pointer; }

    .slider-wrap { position:relative; overflow:hidden; background:var(--bg); aspect-ratio:4/3; border-radius:12px 12px 0 0; }
    .slider-track { display:flex; transition:transform .4s; height:100%; }
    .slider-slide { min-width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    .slider-slide img { width:100%; height:100%; object-fit:contain; padding:12px; }
    .slider-btn { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.6); color:#fff; font-size:28px; padding:0 10px; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
    .slider-prev { left:8px; }
    .slider-next { right:8px; }
    .slider-dots { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
    .slider-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.4); cursor:pointer; }
    .slider-dot.on { background:var(--green); width:18px; border-radius:4px; }

    .prod-body { padding:0 16px 16px; color:var(--text); }
    .prod-name { font-size:22px; font-weight:800; margin:12px 0 8px; color:var(--text); }
    .prod-price-zone { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:8px 0 12px; }
    .price-tile { background:var(--surface); border-radius:12px; padding:12px; text-align:center; border:1px solid var(--border); }
    .price-tile.gold { border-color:var(--gold-light); background:var(--gold-light); }
    .pt-lbl { font-size:10px; color:var(--muted); font-weight:500; }
    .pt-lbl.g { color:var(--green); }
    .pt-lbl.gold { color:var(--gold); }
    .pt-val { font-size:22px; font-weight:900; }
    .pt-val.g { color:var(--green); }
    .pt-val.gold { color:var(--gold); }
    .pt-cur { font-size:10px; color:var(--muted); font-weight:500; }
    .prod-section { margin:12px 0 0; }
    .prod-sec-lbl { font-size:13px; font-weight:700; color:var(--text-2); margin-bottom:4px; }
    .prod-desc { font-size:13px; color:var(--text-2); line-height:1.6; padding:4px 0; }
    .spec-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; color:var(--text); }
    .spec-lbl { color:var(--muted); font-weight:500; }

    .variant-selector { display:flex; flex-direction:column; gap:12px; margin:8px 0; }
    .variant-group { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .variant-group-label { font-size:12px; color:var(--muted); font-weight:600; min-width:50px; }
    .color-btn { width:36px; height:36px; border-radius:50%; border:2px solid var(--border); cursor:pointer; transition:.2s; }
    .color-btn:hover { transform:scale(1.1); }
    .color-btn.active { border-color:var(--green); box-shadow:0 0 0 2px var(--green); }
    .size-btn { padding:6px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; font-weight:600; cursor:pointer; transition:.2s; }
    .size-btn:hover { border-color:var(--green); }
    .size-btn.active { background:var(--green); color:#000; border-color:var(--green); }

    .variant-details-box { margin-top:12px; background:var(--bg); border-radius:10px; padding:14px; border:2px solid var(--green); display:none; }
    .variant-details-box.show { display:block; }
    .variant-details-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .variant-detail-item { text-align:center; border-radius:8px; padding:10px; }
    .variant-detail-item.stock-item { background:var(--green-light); }
    .variant-detail-item.price-item { background:var(--gold-light); }
    .variant-detail-item .label { font-size:10px; color:var(--muted); font-weight:600; }
    .variant-detail-item .value { font-size:20px; font-weight:900; }
    .variant-detail-item .value.green { color:var(--green); }
    .variant-detail-item .value.red { color:var(--red); }
    .variant-detail-item .value.gold { color:var(--gold); }
    .variant-status { text-align:center; margin-top:8px; font-size:13px; font-weight:600; padding:6px; border-radius:6px; }
    .variant-status.in-stock { background:var(--green-light); color:var(--green); }
    .variant-status.out-stock { background:var(--red-light); color:var(--red); }
    .variant-status.not-available { background:var(--surface); color:var(--text-2); }
    .variant-placeholder { text-align:center; padding:12px; color:var(--muted); font-size:13px; border:1px dashed var(--border); border-radius:8px; margin-top:8px; }

    .prod-action { margin:14px 0; display:flex; flex-direction:column; gap:8px; }
    .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .btn { padding:10px 14px; border-radius:10px; font-weight:700; font-size:14px; text-align:center; transition:.2s; }
    .btn-primary { background:var(--green); color:#000; }
    .btn-primary:hover { background:#00cc66; }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .btn-sec { background:var(--surface); color:var(--text); border:1px solid var(--border); }
    .btn-sec:hover { background:var(--border); }
    .btn-fav { background:var(--surface); color:var(--text-2); border:1px solid var(--border); }
    .btn-fav.on { background:var(--red-light); color:var(--red); border-color:var(--red); }
    .btn-media { background:var(--blue-light); color:var(--blue); border:1px solid var(--blue); }
    .btn-media:hover { background:var(--blue); color:#000; }

    .cart-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .cart-item img { width:50px; height:50px; object-fit:contain; background:var(--bg); border-radius:8px; }
    .cart-info { flex:1; }
    .cart-name { font-size:13px; font-weight:600; color:var(--text); }
    .cart-price { font-size:12px; color:var(--green); font-weight:600; }
    .qty-row { display:flex; align-items:center; gap:6px; }
    .qty-btn { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:2px 10px; font-size:16px; color:var(--text); }
    .qty-btn:hover { background:var(--border); }
    .qty-num { font-size:14px; font-weight:700; min-width:20px; text-align:center; color:var(--text); }
    .del-btn { color:var(--red); font-size:11px; font-weight:600; cursor:pointer; }
    .del-btn:hover { text-decoration:underline; }
    .cart-total-bar { margin-top:12px; padding-top:12px; border-top:2px solid var(--border); }
    .total-row { display:flex; justify-content:space-between; padding:2px 0; font-size:13px; color:var(--text); }
    .total-row .green { color:var(--green); }
    .total-row .gold { color:var(--gold); }
    .total-row .muted { color:var(--muted); }
    .final-total { display:flex; justify-content:space-between; padding:8px 0 4px; font-size:18px; font-weight:900; border-top:2px solid var(--green); margin-top:4px; color:var(--text); }
    .final-total span:last-child { color:var(--green); }

    @media(max-width:480px){
      .products-grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; padding:8px 10px; }
      .card-name { font-size:11px; }
      .card-price { font-size:15px; }
      .prod-price-zone { grid-template-columns:1fr 1fr; }
      .prod-name { font-size:17px; }
      .btn-row { grid-template-columns:1fr; }
      .filter-grid { grid-template-columns:1fr; }
      .modal-box { padding:12px 14px; }
      .variant-group { gap:6px; }
      .color-btn { width:30px; height:30px; }
      .size-btn { padding:4px 10px; font-size:12px; }
    }
  </style>
</head>
<body>

<!-- ===== سايدبار ===== -->
<div class="sb-overlay" id="sbOverlay" onclick="closeSB()"></div>
<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <div class="sb-logo"><span>🛍️</span> متجر المسوقين</div>
    <button class="sb-close" onclick="closeSB()">×</button>
  </div>
  <nav class="sb-nav">
    <a class="nav-item" onclick="goToPage('data_page_market')"><span class="ni">🏠</span> لوحة البيانات</a>
    <a class="nav-item active"><span class="ni">🛍️</span> المنتجات</a>
    <a class="nav-item" onclick="goToPage('manage_orders_market')"><span class="ni">📋</span> طلباتي</a>
    <a class="nav-item" onclick="goToPage('my_wallet_market')"><span class="ni">💰</span> المحفظة</a>
    <a class="nav-item wa" href="https://wa.me/201108712091" target="_blank"><span class="ni">💬</span> الدعم</a>
    <a class="nav-item danger" onclick="logout()"><span class="ni">🚪</span> خروج</a>
  </nav>
</div>

<!-- ===== توب بار ===== -->
<header class="topbar">
  <div class="tb-left">
    <button class="menu-btn" onclick="openSB()">☰</button>
    <div class="store-name">متجر <span>المسوقين</span></div>
  </div>
  <div class="tb-right">
    <div class="user-chip"><div class="udot"></div><span id="userLabel">زائر</span></div>
    <div class="icon-btn" onclick="openWhatsApp()">💬</div>
    <div class="icon-btn" onclick="openFavorites()">❤️<span class="badge" id="favCount">0</span></div>
    <div class="icon-btn" onclick="openCart()">🛒<span class="badge" id="cartCount">0</span></div>
  </div>
</header>

<!-- ===== فلتر ===== -->
<div class="filter-bar">
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-field" id="searchInput" type="text" placeholder="ابحث..." oninput="applyFilters()">
    </div>
    <button class="filter-toggle-btn" id="filterToggleBtn" onclick="toggleFilterPanel()">⚙️</button>
  </div>
  <div class="adv-filter" id="advFilter">
    <div class="filter-grid">
      <div><div class="filter-label">💰 أقل سعر</div><input class="filter-input" type="number" id="fMinPrice" placeholder="0"></div>
      <div><div class="filter-label">💰 أعلى سعر</div><input class="filter-input" type="number" id="fMaxPrice" placeholder="9999"></div>
      <div><div class="filter-label">📦 الحالة</div><select class="filter-input" id="fStock"><option value="all">الكل</option><option value="in">متوفر</option><option value="out">نفذ</option></select></div>
    </div>
    <div class="filter-actions">
      <button class="filter-apply" onclick="applyFilters()">✅ تطبيق</button>

<script>
// ============================================================
// ===== CONFIG =====
// ============================================================
const SUPABASE_URL='https://zphepebjpxrzpudncuas.supabase.co';
const SUPABASE_KEY='sb_publishable_tIG9XDZeHVZpZjz74e-dBA_ui5GIYw7';
const WA_NUM='201108712091';
const SITE_PROFIT=20;

const urlP=new URLSearchParams(window.location.search);
let rawUser=urlP.get('user')||localStorage.getItem('username')||'';
let marketerId=rawUser.trim().toLowerCase();
let isLoggedIn=marketerId.length>0&&marketerId!==''&&marketerId!=='undefined';

if(!isLoggedIn){ document.body.classList.add('guest-mode'); marketerId='guest_'+Date.now(); document.getElementById('userLabel').textContent='زائر'; }
else { localStorage.setItem('username',marketerId); document.getElementById('userLabel').textContent='مسوق'; }

// ============================================================
// ===== دوال مساعدة =====
// ============================================================
function cleanText(t){ return t?t.replace(/[«»""''()\[\]{}]/g,'').replace(/\s+/g,' ').trim():''; }
function sellP(b){ const v=parseFloat(b)||0; return v+SITE_PROFIT; }
function comm(b){ const v=parseFloat(b)||0; if(v<100)return 50; if(v<200)return 80; if(v<400)return 150; if(v<500)return 200; return 250; }
function iurl(u){ return u?.toString().trim()||'https://placehold.co/400x400/2a2a2a/808080?text=🛍️'; }
function esc(s){ return(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function openSB(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sbOverlay').classList.add('show'); }
function closeSB(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbOverlay').classList.remove('show'); }
function openM(id){ const el=document.getElementById(id); el.style.display='flex'; requestAnimationFrame(()=>el.classList.add('show')); }
function closeM(id){ const el=document.getElementById(id); el.style.display='none'; el.classList.remove('show'); }
function openWhatsApp(){ window.open(`https://wa.me/${WA_NUM}`,'_blank'); }
function goToPage(p){ closeSB(); const u=isLoggedIn?`user=${encodeURIComponent(marketerId)}`:''; window.location.href=`${p}.html?${u}&type=marketer`; }
function logout(){ if(confirm('تسجيل الخروج؟')){ localStorage.clear(); window.location.href='index.html'; } }

function getColorHex(c){ const cl={'أحمر':'#DC3545','احمر':'#DC3545','red':'#DC3545','أزرق':'#0D6EFD','ازرق':'#0D6EFD','blue':'#0D6EFD','أخضر':'#198754','اخضر':'#198754','green':'#198754','أسود':'#212529','اسود':'#212529','black':'#212529','أبيض':'#F8F9FA','ابيض':'#F8F9FA','white':'#F8F9FA','أصفر':'#FFC107','اصفر':'#FFC107','yellow':'#FFC107','برتقالي':'#FD7E14','برتقالى':'#FD7E14','orange':'#FD7E14','بنفسجي':'#6F42C1','بنفسجى':'#6F42C1','purple':'#6F42C1','وردي':'#D63384','وردى':'#D63384','pink':'#D63384','بني':'#6C4A3E','brown':'#6C4A3E','رمادي':'#6C757D','رمادى':'#6C757D','gray':'#6C757D','ذهبي':'#D4AF37','ذهبى':'#D4AF37','gold':'#D4AF37','فضي':'#C0C0C0','فضى':'#C0C0C0','silver':'#C0C0C0'}; return cl[c?.toLowerCase()]||'#6C757D'; }

// ============================================================
// ===== API =====
// ============================================================
async function req(ep,opts={}){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${ep}`,{...opts,headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',...opts.headers}});
  const t=await r.text(); return t?JSON.parse(t):{};
}

async function callApi(action,data={}){
  try{
    switch(action){
      case 'get_products':{
        const p=await req('products?select=*&order=product_id.desc');
        if(!Array.isArray(p))return p;
        const v=await req('product_variants?select=*');
        const vm={};
        if(Array.isArray(v)){ v.forEach(x=>{ if(!vm[x.product_id])vm[x.product_id]=[]; vm[x.product_id].push(x); }); }
        return p.map(x=>({...x,variants:vm[x.product_id]||[]}));
      }
      case 'get_product':{
        const p=await req(`products?product_id=eq.${data.product_id}&select=*`);
        if(Array.isArray(p)&&p.length){ const v=await req(`product_variants?product_id=eq.${data.product_id}&select=*`); return [{...p[0],variants:Array.isArray(v)?v:[]}]; }
        return p;
      }
      case 'get_favs':{ if(!isLoggedIn)return[]; return await req(`favorites?marketer_id=ilike.${data.mid}&select=*`); }
      case 'add_fav':{ if(!isLoggedIn){ alert('⚠️ تسجيل الدخول أولاً'); return[]; } return await req('favorites',{method:'POST',body:JSON.stringify({marketer_id:data.mid.toLowerCase(),product_id:data.pid,fav_id:'F'+Date.now()})}); }
      case 'del_fav':{ if(!isLoggedIn)return[]; return await req(`favorites?marketer_id=ilike.${data.mid}&product_id=eq.${data.pid}`,{method:'DELETE'}); }
      case 'get_cart':{
        if(!isLoggedIn)return[];
        const c=await req(`cart?marketer_id=ilike.${data.mid}&select=*`);
        if(!Array.isArray(c))return c;
        const pr=await req('products?select=*');
        return c.map(i=>{ const p=pr.find(x=>String(x.product_id)===String(i.product_id)); return p?{...i,...p}:i; });
      }
      case 'add_cart':{
        if(!isLoggedIn){ alert('⚠️ تسجيل الدخول أولاً'); return; }
        const pId=String(data.pid);
        const vId=String(data.variant_id||'default');
        const existing=cartItems.find(i=>String(i.product_id)===pId&&String(i.variant_id||'default')===vId);
        if(existing)return await req(`cart?cart_id=eq.${existing.cart_id}`,{method:'PATCH',body:JSON.stringify({qty:existing.qty+1})});
        return await req('cart',{method:'POST',body:JSON.stringify({marketer_id:data.mid.toLowerCase(),product_id:pId,variant_id:vId,color:data.color||'',size:data.size||'',qty:1,cart_id:'C'+Date.now()+'_'+Math.random().toString(36).substr(2,4)})});
      }
      case 'upd_cart': return await req(`cart?cart_id=eq.${data.cid}`,{method:'PATCH',body:JSON.stringify({qty:data.qty})});
      case 'del_cart': return await req(`cart?cart_id=eq.${data.cid}`,{method:'DELETE'});
      default: return {status:'error'};
    }
  }catch(e){ return {status:'error',message:e.message}; }
}

// ============================================================
// ===== تحميل وعرض المنتجات =====
// ============================================================
let allProducts=[], favoriteIds=[], cartItems=[], currentProduct=null;
let filteredProducts=[], currentCat='all', currentSort='newest';
let selectedColor='', selectedSize='';

async function loadProducts(){
  document.getElementById('productsGrid').innerHTML='<div class="grid-ph"><div class="ls"><div class="spin"></div></div>';
  const r=await callApi('get_products');
  if(Array.isArray(r)){ allProducts=r; if(isLoggedIn)await loadFavs(); applyFilters(); }
  else document.getElementById('productsGrid').innerHTML='<div class="grid-ph"><div class="empty-state"><div class="big">⚠️</div><p>فشل التحميل</p></div></div>';
}

async function loadFavs(){
  if(!isLoggedIn){ favoriteIds=[]; document.getElementById('favCount').textContent='0'; return; }
  const r=await callApi('get_favs',{mid:marketerId});
  if(Array.isArray(r)){ favoriteIds=r.map(f=>String(f.product_id)); document.getElementById('favCount').textContent=favoriteIds.length; }
}

function toggleFilterPanel(){ const p=document.getElementById('advFilter'), b=document.getElementById('filterToggleBtn'); const s=!p.classList.contains('show'); p.classList.toggle('show',s); b.classList.toggle('active',s); }
function setSort(s,btn){ currentSort=s; document.querySelectorAll('.sort-pill').forEach(t=>t.classList.remove('active')); if(btn)btn.classList.add('active'); applyFilters(); }
function filterCat(cat,btn){ currentCat=cat; document.querySelectorAll('.tab-pill').forEach(t=>t.classList.remove('active')); if(btn)btn.classList.add('active'); applyFilters(); }
function resetFilters(){ document.getElementById('fMinPrice').value=''; document.getElementById('fMaxPrice').value=''; document.getElementById('fStock').value='all'; document.getElementById('searchInput').value=''; applyFilters(); }

function applyFilters(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  const minP=parseFloat(document.getElementById('fMinPrice').value)||0;
  const maxP=parseFloat(document.getElementById('fMaxPrice').value)||Infinity;
  const stock=document.getElementById('fStock').value;
  let list=allProducts.filter(p=>{
    const sp=sellP(p.base_price);
    const variants=p.variants||[];
    let totalStock=variants.reduce((s,v)=>s+(parseInt(v.stock)||0),0);
    if(totalStock===0&&p.stock)totalStock=parseInt(p.stock)||0;
    const inStock=totalStock>0;
    if(currentCat!=='all'&&p.category!==currentCat)return false;
    if(search&&!(p.name||'').toLowerCase().includes(search))return false;
    if(sp<minP||sp>maxP)return false;
    if(stock==='in'&&!inStock)return false;
    if(stock==='out'&&inStock)return false;
    return true;
  });
  if(currentSort==='price_asc')list.sort((a,b)=>sellP(a.base_price)-sellP(b.base_price));
  else if(currentSort==='price_desc')list.sort((a,b)=>sellP(b.base_price)-sellP(a.base_price));
  filteredProducts=list;
  document.getElementById('resultNum').textContent=list.length;
  renderProducts(list);
}

function renderProducts(products){
  const grid=document.getElementById('productsGrid'); grid.innerHTML='';
  if(!products?.length){ grid.innerHTML='<div class="grid-ph"><div class="empty-state"><div class="big">📭</div><p>لا توجد منتجات</p></div></div>'; return; }
  products.forEach(p=>{
    const variants=p.variants||[];
    let totalStock=variants.reduce((s,v)=>s+(parseInt(v.stock)||0),0);
    if(totalStock===0&&p.stock)totalStock=parseInt(p.stock)||0;
    const out=totalStock===0;
    const sp=sellP(p.base_price), cm=comm(p.base_price);
    const isFav=isLoggedIn?favoriteIds.includes(String(p.product_id)):false;
    const cn=cleanText(p.name), cc=cleanText(p.category);
    const card=document.createElement('div'); card.className='product-card';
    let commHtml=isLoggedIn?`<div class="card-comm-badge"><span>⭐ ${cm} ج</span><small>عمولتك</small></div>`:'';
    let favHtml=isLoggedIn?`<div class="fav-btn-card ${isFav?'on':''}" onclick="event.stopPropagation();quickFav(${p.product_id},this)">${isFav?'❤️':'🤍'}</div>`:'';
    card.innerHTML=`
      <div class="card-img-wrap"><img src="${iurl(p.image_url)}" onerror="this.src='https://placehold.co/300x300/2a2a2a/808080?text=🛍️'" alt="${esc(cn)}">${out?'<div class="out-ribbon">نفذ</div>':''}${favHtml}</div>
      <div class="card-body">${cc?`<div class="card-cat-tag">${esc(cc)}</div>`:''}<div class="card-name">${esc(cn)}</div><div class="card-price-row"><div class="card-price">${sp}</div><div class="card-price-cur">جنيه</div></div>${commHtml}<div class="card-stock ${out?'stock-out':'stock-ok'}">${out?'❌ نفذت':`✅ متوفر — ${totalStock}`}</div><div class="card-add-btn">${out?'⛔ غير متوفر':'👆 التفاصيل'}</div></div>
    `;
    card.onclick=()=>openProduct(p.product_id);
    grid.appendChild(card);
  });
}

// ============================================================
// ===== المفضلة =====
// ============================================================
async function quickFav(pid,btn){
  if(!isLoggedIn){ alert('⚠️ تسجيل الدخول أولاً'); return; }
  const isFav=favoriteIds.includes(String(pid));
  await callApi(isFav?'del_fav':'add_fav',{mid:marketerId,pid});
  await loadFavs();
  if(btn){ btn.classList.toggle('on',!isFav); btn.innerHTML=(!isFav)?'❤️':'🤍'; }
}

// ============================================================
// ===== فتح المنتج =====
// ============================================================
async function openProduct(id){
  openM('productModal'); document.getElementById('productModalContent').innerHTML='<div class="ls" style="padding:60px"><div class="spin"></div></div>';
  const r=await callApi('get_product',{product_id:id});
  if(Array.isArray(r)&&r.length){ currentProduct=r[0]; selectedColor=''; selectedSize=''; renderProd(r[0]); }
  else document.getElementById('productModalContent').innerHTML='<div class="empty-state"><div class="big">⚠️</div><p>تعذر التحميل</p></div>';
}

function renderProd(p){
  const sp=sellP(p.base_price), cm=comm(p.base_price);
  const isFav=isLoggedIn?favoriteIds.includes(String(p.product_id)):false;
  const galleryLink=p.drive_link||p.gallery_link||'';
  const cn=cleanText(p.name), cd=cleanText(p.description);
  const variants=p.variants||[];
  const ucolors=[...new Set(variants.map(v=>v.color).filter(c=>c&&c.trim()))];
  const usizes=[...new Set(variants.map(v=>v.size).filter(s=>s&&s.trim()))];
  let totalStock=variants.reduce((s,v)=>s+(parseInt(v.stock)||0),0);
  if(totalStock===0&&p.stock)totalStock=parseInt(p.stock)||0;
  const out=totalStock===0;
  
  let desc=cd;
  desc=desc.replace(/\d+\.\s*اللون:\s*[^\n]+,?/g,'');
  desc=desc.replace(/الخصائص:\s*\d+\.\s*اللون:\s*[^\n]+,?/g,'');
  desc=desc.replace(/اللون:\s*[^\n]+,?\s*/g,'');
  desc=desc.replace(/\d+\.\s*/g,'');
  desc=desc.replace(/\s+/g,' ').trim();
  if(!desc)desc='منتج ممتاز بجودة عالية';
  
  let colorsHtml=ucolors.map(c=>`<button class="color-btn" style="background:${getColorHex(c)};" data-color="${esc(c)}" onclick="selectColor('${esc(c)}')"></button>`).join('')||'<span style="color:var(--muted);font-size:12px;">لا توجد ألوان</span>';
  let sizesHtml=usizes.map(s=>`<button class="size-btn" data-size="${esc(s)}" onclick="selectSize('${esc(s)}')">${esc(s)}</button>`).join('')||'<span style="color:var(--muted);font-size:12px;">لا توجد مقاسات</span>';
  
  const imgs=[]; if(p.image_url)imgs.push(p.image_url); if(p.image_url2)imgs.push(p.image_url2); if(p.image_url3)imgs.push(p.image_url3); if(p.image_url4)imgs.push(p.image_url4); if(!imgs.length)imgs.push('');
  const slides=imgs.map(src=>`<div class="slider-slide"><img src="${iurl(src)}" onerror="this.src='https://placehold.co/540x400/2a2a2a/808080?text=🛍️'" alt="${esc(cn)}"></div>`).join('');
  const dots=imgs.length>1?imgs.map((_,i)=>`<div class="slider-dot ${i===0?'on':''}" onclick="goSlide(${i})"></div>`).join(''):'';
  const navBtns=imgs.length>1?`<button class="slider-btn slider-prev" onclick="moveSlide(-1)">‹</button><button class="slider-btn slider-next" onclick="moveSlide(1)">›</button>`:'';
  
  let commHtml=isLoggedIn?`<div class="price-tile comm gold"><div class="pt-lbl gold">⭐ عمولتك</div><div class="pt-val gold">${cm}</div><div class="pt-cur gold">جنيه</div></div>`:'';
  let favHtml=isLoggedIn?`<button class="btn btn-fav ${isFav?'on':''}" onclick="toggleFav()">${isFav?'❤️ في المفضلة':'🤍 أضف للمفضلة'}</button>`:'';
  
  const hasVariants = variants.length > 0 && ucolors.length > 0 && usizes.length > 0;
  
  // ===== زر اطلب الآن =====
  let orderBtnHtml = `<button class="btn btn-primary" onclick="goToOrder(${p.product_id})" ${out?'disabled':''}>${out?'⛔ نفذت':'🛍️ اطلب الآن'}</button>`;
  
  document.getElementById('productModalContent').innerHTML=`
    <div class="slider-wrap"><div class="slider-track" id="sliderTrack">${slides}</div>${navBtns}${dots?`<div class="slider-dots">${dots}</div>`:''}</div>
    <div class="prod-body">
      <div class="prod-name">${esc(cn)}</div>
      <div class="prod-price-zone"><div class="price-tile sell"><div class="pt-lbl g">💰 السعر</div><div class="pt-val g">${sp}</div><div class="pt-cur g">جنيه</div></div>${commHtml}</div>
      ${desc?`<div class="prod-section"><div class="prod-sec-lbl">📋 الوصف</div><div class="prod-desc">${esc(desc)}</div></div>`:''}
      ${hasVariants?`
      <div class="prod-section" style="background:var(--surface);border-radius:12px;padding:14px;margin-top:8px;border:1px solid var(--border);">
        <div style="font-weight:700;font-size:14px;margin-bottom:10px;color:var(--text);">🎯 اختر اللون والمقاس</div>
        <div class="variant-group"><span class="variant-group-label">🎨 اللون</span>${colorsHtml}</div>
        <div class="variant-group"><span class="variant-group-label">📏 المقاس</span>${sizesHtml}</div>
        <div class="variant-details-box" id="variantDetails">
          <div class="variant-details-grid">
            <div class="variant-detail-item stock-item"><div class="label">📦 المخزون</div><div class="value green" id="variantStockDisplay">0</div></div>
            <div class="variant-detail-item price-item"><div class="label">💰 السعر</div><div class="value gold" id="variantPriceDisplay">0 ج</div></div>
          </div>
          <div class="variant-status" id="variantStatus"></div>
        </div>
        <div class="variant-placeholder" id="variantPlaceholder">⚠️ اختر اللون والمقاس لعرض التفاصيل</div>
      </div>`:''}
      <div class="spec-row"><span class="spec-lbl">📦 المخزون الكلي</span><span class="${out?'stock-out':'stock-ok'}" style="font-weight:900;font-size:13px;">${out?'❌ غير متوفر':`✅ ${totalStock} قطعة`}</span></div>
      <div class="prod-action">
        <div class="btn-row">${orderBtnHtml}<button class="btn btn-sec" onclick="addToCart()" ${out?'disabled':''}>🛒 للسلة</button></div>
        <div class="btn-row">${favHtml}${galleryLink?`<button class="btn btn-media" onclick="window.open('${esc(galleryLink)}','_blank')">📸 الصور</button>`:''}</div>
      </div>
    </div>
  `;
  window._sliderIdx=0; window._sliderTotal=imgs.length;
  if(hasVariants) setTimeout(updateVariantDetails,100);
}

// ============================================================
// ===== اختيار اللون والمقاس =====
// ============================================================
function selectColor(c){ selectedColor=c; document.querySelectorAll('.color-btn').forEach(b=>b.classList.toggle('active',b.dataset.color===c)); updateVariantDetails(); }
function selectSize(s){ selectedSize=s; document.querySelectorAll('.size-btn').forEach(b=>b.classList.toggle('active',b.dataset.size===s)); updateVariantDetails(); }

function updateVariantDetails(){
  const dd=document.getElementById('variantDetails'), ph=document.getElementById('variantPlaceholder');
  const sd=document.getElementById('variantStockDisplay'), pd=document.getElementById('variantPriceDisplay'), st=document.getElementById('variantStatus');
  if(!selectedColor||!selectedSize){ if(dd)dd.classList.remove('show'); if(ph)ph.style.display='block'; return; }
  if(ph)ph.style.display='none'; if(dd)dd.classList.add('show');
  const variants=currentProduct?.variants||[];
  const matched=variants.find(v=>v.color===selectedColor&&v.size===selectedSize);
  if(matched){
    const stock=parseInt(matched.stock)||0, price=parseFloat(matched.price)||currentProduct?.base_price||0;
    if(sd){ sd.textContent=stock; sd.className='value '+(stock>0?'green':'red'); }
    if(pd){ pd.textContent=price+' ج'; pd.className='value gold'; }
    if(st){ st.textContent=stock>0?'✅ متوفر':'❌ غير متوفر'; st.className='variant-status '+(stock>0?'in-stock':'out-stock'); }
  }else{
    if(sd){ sd.textContent='—'; sd.className='value'; }
    if(pd){ pd.textContent='—'; pd.className='value'; }
    if(st){ st.textContent='⚠️ غير متاح'; st.className='variant-status not-available'; }
  }
}

// ============================================================
// ===== الطلب - التوجيه لصفحة orders.html =====
// ============================================================
function goToOrder(productId){
  console.log('🛍️ goToOrder called with productId:', productId);
  
  const variants=currentProduct?.variants||[];
  
  // إذا فيه خصائص، نتحقق من الاختيار
  if(variants.length>0){
    if(!selectedColor||!selectedSize){
      alert('⚠️ يرجى اختيار اللون والمقاس أولاً');
      return;
    }
    const matched=variants.find(v=>v.color===selectedColor&&v.size===selectedSize);
    if(!matched||parseInt(matched.stock)<=0){
      alert('❌ المخزون غير متوفر لهذا المزيج');
      return;
    }
    // إغلاق مودال المنتج
    closeM('productModal');
    // التوجيه مع البيانات
    window.location.href = `orders.html?user=${encodeURIComponent(marketerId)}&type=marketer&product_id=${productId}&color=${encodeURIComponent(selectedColor)}&size=${encodeURIComponent(selectedSize)}`;
  } else {
    // مفيش خصائص → نروح مباشرة
    closeM('productModal');
    window.location.href = `orders.html?user=${encodeURIComponent(marketerId)}&type=marketer&product_id=${productId}`;
  }
}

async function toggleFav(){
  if(!isLoggedIn){ alert('⚠️ تسجيل الدخول أولاً'); return; }
  if(!currentProduct)return;
  const isFav=favoriteIds.includes(String(currentProduct.product_id));
  await callApi(isFav?'del_fav':'add_fav',{mid:marketerId,pid:currentProduct.product_id});
  await loadFavs(); renderProd(currentProduct); applyFilters();
}

async function openFavorites(){
  if(!isLoggedIn){ alert('⚠️ تسجيل الدخول أولاً'); return; }
  openM('favModal'); document.getElementById('favModalContent').innerHTML='<div class="ls"><div class="spin"></div></div>';
  const r=await callApi('get_favs',{mid:marketerId});
  if(!Array.isArray(r)||!r.length){ document.getElementById('favModalContent').innerHTML='<div class="empty-state"><div class="big">❤️</div><p>لا توجد مفضلات</p></div>'; return; }
  const prods=await callApi('get_products');
  const favs=r.map(f=>Array.isArray(prods)?prods.find(p=>String(p.product_id)===String(f.product_id)):null).filter(Boolean);
  const g=document.createElement('div'); g.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:9px;';
  favs.forEach(p=>{
    const sp=sellP(p.base_price), cm=comm(p.base_price), cn=cleanText(p.name);
    const d=document.createElement('div'); d.style.cssText='background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:10px;cursor:pointer;';
    d.onmouseenter=()=>d.style.borderColor='var(--green)'; d.onmouseleave=()=>d.style.borderColor='var(--border)';
    d.onclick=()=>{ closeM('favModal'); openProduct(p.product_id); };
    d.innerHTML=`<img src="${iurl(p.image_url)}" style="width:100%;height:88px;object-fit:contain;border-radius:9px;background:var(--white)" onerror="this.src='https://placehold.co/200x200/2a2a2a/808080?text=🛍️'"><div style="font-size:11px;font-weight:800;margin-top:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(cn)}</div><div style="color:var(--green);font-size:13px;font-weight:900;">${sp} ج</div>${isLoggedIn?`<div style="color:var(--gold);font-size:10px;">⭐ ${cm} ج عمولة</div>`:''}`;
    g.appendChild(d);
  });
  document.getElementById('favModalContent').innerHTML=''; document.getElementById('favModalContent').appendChild(g);
}

// ============================================================
// ===== السلة =====
// ============================================================
async function addToCart(){
  if(!isLoggedIn){ alert('⚠️ تسجيل الدخول أولاً'); return; }
  if(!currentProduct)return;
  const variants=currentProduct.variants||[];
  let selectedVariant=null;
  if(variants.length>0){
    if(!selectedColor||!selectedSize){ alert('⚠️ اختر اللون والمقاس'); return; }
    selectedVariant=variants.find(v=>v.color===selectedColor&&v.size===selectedSize);
    if(!selectedVariant||parseInt(selectedVariant.stock)<=0){ alert('❌ المخزون غير متوفر'); return; }
  }
  const latest=allProducts.find(p=>String(p.product_id)===String(currentProduct.product_id));
  if(!latest)return;
  if(cartItems.length>0){
    const es=(cartItems[0].username||cartItems[0].supplier||'').trim();
    const ns=(latest.username||latest.supplier||'').trim();
    if(es&&ns&&es!==ns){ alert(`⚠️ لا يمكن خلط موردين: "${es}"`); return; }
  }
  const variantId=selectedVariant?String(selectedVariant.id):'default';
  const color=selectedVariant?selectedVariant.color:'';
  const size=selectedVariant?selectedVariant.size:'';
  
  const existing=cartItems.find(i=>String(i.product_id)===String(latest.product_id)&&String(i.variant_id||'default')===variantId);
  if(existing){
    await callApi('upd_cart',{cid:existing.cart_id,qty:existing.qty+1});
  }else{
    await callApi('add_cart',{mid:marketerId,pid:latest.product_id,variant_id:variantId,color,size});
  }
  await updateCartBadge();
  alert('✅ أضيف للسلة');
  closeM('productModal'); applyFilters();
}

async function updateCartBadge(){
  if(!isLoggedIn){ document.getElementById('cartCount').textContent='0'; return; }
  const r=await callApi('get_cart',{mid:marketerId});
  if(Array.isArray(r)){ cartItems=r; let t=0; r.forEach(i=>t+=i.qty||1); document.getElementById('cartCount').textContent=t; }
}

async function openCart(){
  if(!isLoggedIn){ alert('⚠️ تسجيل الدخول أولاً'); return; }
  openM('cartModal'); document.getElementById('cartModalContent').innerHTML='<div class="ls"><div class="spin"></div></div>';
  const r=await callApi('get_cart',{mid:marketerId});
  if(Array.isArray(r)){ cartItems=r; renderCart(); }
}

function renderCart(){
  const body=document.getElementById('cartModalContent');
  if(!cartItems?.length){ body.innerHTML='<div class="empty-state"><div class="big">🛒</div><p>السلة فارغة</p></div>'; return; }
  let tp=0,tc=0,html='';
  cartItems.forEach(item=>{
    const sp=sellP(item.base_price), cm=comm(item.base_price), it=sp*item.qty, ic=cm*item.qty;
    tp+=it; tc+=ic;
    let vi='';
    if(item.color||item.size) vi=` (${item.color||''}${item.color&&item.size?' - ':''}${item.size||''})`;
    html+=`<div class="cart-item"><img src="${iurl(item.image_url)}" onerror="this.src='https://placehold.co/60x60/2a2a2a/808080?text=?'"><div class="cart-info"><div class="cart-name">${esc(cleanText(item.name))}${vi}</div><div class="cart-price">${sp} ج × ${item.qty} = ${it} ج</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:5px"><div class="qty-row"><button class="qty-btn" onclick="updQty('${item.cart_id}',-1)">−</button><span class="qty-num">${item.qty}</span><button class="qty-btn" onclick="updQty('${item.cart_id}',1)">+</button></div><button class="del-btn" onclick="delCart('${item.cart_id}')">حذف</button></div></div>`;
  });
  const ship=70, ft=tp+tc+ship;
  body.innerHTML=html+`
    <div class="cart-total-bar">
      <div class="total-row"><span>المنتجات</span><span class="green">${tp} ج</span></div>
      <div class="total-row"><span>العمولة</span><span class="gold">${tc} ج</span></div>
      <div class="total-row"><span>الشحن</span><span class="muted">${ship} ج</span></div>
      <div class="final-total"><span>الإجمالي</span><span>${ft} ج</span></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="goToOrderFromCart()">✅ إتمام الطلب</button>
      <button class="btn btn-sec" onclick="closeM('cartModal')">إغلاق</button>
    </div>
  `;
}

function goToOrderFromCart(){
  if(!isLoggedIn){ alert('⚠️ تسجيل الدخول أولاً'); return; }
  if(!cartItems?.length){ alert('⚠️ السلة فارغة'); return; }
  closeM('cartModal');
  window.location.href = `orders.html?user=${encodeURIComponent(marketerId)}&type=marketer&from_cart=true`;
}

async function updQty(cid,diff){
  const item=cartItems.find(i=>i.cart_id===cid); if(!item)return;
  const nq=item.qty+diff; if(nq<1)return;
  await callApi('upd_cart',{cid,qty:nq});
  await openCart(); await updateCartBadge(); applyFilters();
}

async function delCart(cid){
  await callApi('del_cart',{cid}); await openCart(); await updateCartBadge(); applyFilters();
}

// ============================================================
function openTrackOrder(){ openM('trackOrderModal'); document.getElementById('trackResult').innerHTML=''; document.getElementById('trackPhone').value=''; }

async function trackOrder(){
  const phone=document.getElementById('trackPhone').value.trim();
  if(!phone||phone.length!==11){ document.getElementById('trackResult').innerHTML='<div style="color:var(--red);padding:10px;">⚠️ رقم صحيح 11 رقم</div>'; return; }
  document.getElementById('trackResult').innerHTML='<div class="ls"><div class="spin"></div> جاري البحث...</div>';
  try{
    const orders=await req(`orders?phone=eq.${phone}&order=created_at.desc`);
    if(!Array.isArray(orders)||orders.length===0){ document.getElementById('trackResult').innerHTML='<div style="color:var(--muted);padding:10px;">📭 لا توجد طلبات</div>'; return; }
    let html=`<div style="color:var(--green);font-weight:700;margin-bottom:8px;">✅ ${orders.length} طلب</div>`;
    orders.forEach(o=>{
      const sm={'pending':'⏳ قيد المعالجة','accepted':'✅ تم القبول','rejected':'❌ مرفوض','shipped':'🚚 قيد الشحن','delivered':'📦 تم التسليم'};
      const st=sm[o.order_status]||o.order_status||'⏳ قيد المعالجة';
      const sc=o.order_status==='rejected'?'var(--red)':(o.order_status==='delivered'?'var(--green)':'var(--gold)');
      html+=`<div style="background:var(--surface);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;">
          <span style="font-weight:700;color:var(--text);">#${o.order_id||'ORD-'+Math.random().toString(36).substr(2,4)}</span>
          <span style="color:${sc};font-weight:700;">${st}</span>
        </div>
        <div style="font-size:12px;color:var(--text-2);margin-top:4px;">📦 ${o.product_name||'منتج'} × ${o.qty||1} | 💰 ${o.total_price||o.price||0} ج</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">📅 ${new Date(o.created_at).toLocaleDateString('ar-EG')}</div>
      </div>`;
    });
    document.getElementById('trackResult').innerHTML=html;
  }catch(e){ document.getElementById('trackResult').innerHTML=`<div style="color:var(--red);padding:10px;">❌ ${e.message}</div>`; }
}
