<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>متجر المسوقين - المنتجات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #121212;
  --white: #1e1e1e;
  --surface: #2a2a2a;
  --border: #3a3a3a;
  --border-dark: #4a4a4a;
  --text: #e4e4e4;
  --text-2: #b0b0b0;
  --muted: #808080;
  --green: #00b86b;
  --green-light: #1a3a2a;
  --green-mid: rgba(0,184,107,0.25);
  --gold: #f0a500;
  --gold-light: #3a2a0a;
  --red: #e8334a;
  --red-light: #3a1a1f;
  --blue: #3b82f6;
  --blue-light: #1a2a4a;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.6);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.8);
  --radius: 14px;
  --radius-sm: 9px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:"Tajawal",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:100px;}

/* ── SIDEBAR ── */
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
.sb-overlay.show{opacity:1;pointer-events:all;}
.sidebar{position:fixed;top:0;right:-290px;width:270px;height:100%;background:var(--white);border-left:1px solid var(--border);z-index:201;transition:right .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,0.6);}
.sidebar.open{right:0;}
.sb-head{padding:22px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sb-logo{font-size:14px;font-weight:900;color:var(--text);display:flex;align-items:center;gap:8px;}
.sb-logo span{background:var(--green);color:#fff;width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.sb-close{width:30px;height:30px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.sb-close:hover{background:var(--red);color:#fff;border-color:var(--red);}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;color:var(--text-2);font-size:13px;font-weight:700;text-decoration:none;margin-bottom:2px;transition:all .2s;cursor:pointer;border:1px solid transparent;}
.nav-item:hover{background:var(--surface);color:var(--text);}
.nav-item.active{background:var(--green-light);color:var(--green);border-color:rgba(0,184,107,.25);}
.nav-item.danger{color:var(--red);}
.nav-item.danger:hover{background:var(--red-light);}
.nav-item.wa{color:#25d366;}
.nav-item.wa:hover{background:#1a2a1a;}
.ni{font-size:16px;width:20px;text-align:center;}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm);}
.tb-left{display:flex;align-items:center;gap:10px;}
.menu-btn{width:38px;height:38px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.menu-btn:hover{background:var(--green);color:#fff;border-color:var(--green);}
.store-name{font-size:15px;font-weight:900;color:var(--text);}
.store-name span{color:var(--green);}
.tb-right{display:flex;align-items:center;gap:8px;}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--green-light);border:1px solid rgba(0,184,107,.3);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--green);font-weight:800;}
.udot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
.icon-btn{position:relative;cursor:pointer;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);font-size:16px;transition:all .2s;color:var(--text-2);}
.icon-btn:hover{border-color:var(--green);color:var(--green);}
.badge{position:absolute;top:-5px;right:-5px;background:var(--green);color:#fff;width:17px;height:17px;border-radius:50%;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;}

/* ── FILTER BAR ── */
.filter-bar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;flex-direction:column;gap:10px;}
.search-row{display:flex;gap:8px;align-items:center;}
.search-wrap{flex:1;position:relative;}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none;}
.search-field{width:100%;padding:10px 36px 10px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:"Tajawal",sans-serif;outline:none;transition:all .25s;}
.search-field:focus{border-color:var(--green);background:var(--white);box-shadow:0 0 0 3px var(--green-mid);}
.search-field::placeholder{color:var(--muted);}
.filter-toggle-btn{width:40px;height:40px;border-radius:10px;background:var(--surface);border:1.5px solid var(--border);color:var(--text-2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.filter-toggle-btn:hover,.filter-toggle-btn.active{background:var(--green);color:#fff;border-color:var(--green);}

/* Advanced filter panel */
.adv-filter{display:none;padding:4px 0 2px;border-top:1px solid var(--border);animation:slideDown .2s ease;}
.adv-filter.show{display:block;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.filter-label{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:4px;letter-spacing:.3px;}
.filter-input{width:100%;padding:9px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:12px;font-family:"Tajawal",sans-serif;outline:none;transition:border .2s;}
.filter-input:focus{border-color:var(--green);}
select.filter-input option{background:var(--white);}
.filter-actions{display:flex;gap:7px;}
.filter-apply{flex:1;padding:9px;background:var(--green);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;font-family:"Tajawal",sans-serif;transition:all .2s;}
.filter-apply:hover{background:#009a59;}
.filter-reset{padding:9px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;color:var(--text-2);font-family:"Tajawal",sans-serif;transition:all .2s;}
.filter-reset:hover{border-color:var(--red);color:var(--red);}

/* ── SORT + RESULT BAR ── */
.result-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--white);border-bottom:1px solid var(--border);}
.result-count{font-size:11px;color:var(--muted);font-weight:700;}
.result-count strong{color:var(--text);font-size:13px;}
.sort-tabs{display:flex;gap:5px;}
.sort-pill{padding:5px 11px;border-radius:20px;cursor:pointer;font-size:10px;font-weight:800;background:var(--surface);border:1.5px solid var(--border);color:var(--muted);transition:all .18s;white-space:nowrap;}
.sort-pill:hover{border-color:var(--border-dark);color:var(--text);}
.sort-pill.active{background:var(--green);color:#fff;border-color:var(--green);}

/* ── CATEGORY TABS ── */
.tabs-wrap{padding:8px 12px 6px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;background:var(--white);border-bottom:1px solid var(--border);}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tab-pill{padding:6px 14px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:800;white-space:nowrap;background:var(--surface);border:1.5px solid var(--border);color:var(--text-2);transition:all .2s;}
.tab-pill:hover{border-color:var(--border-dark);color:var(--text);}
.tab-pill.active{background:var(--text);color:#000;border-color:var(--text);}

/* ── PRODUCTS GRID ── */
.products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px;}
@media(min-width:600px){.products-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.products-grid{grid-template-columns:repeat(4,1fr);}}

.product-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative;transition:all .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.product-card:hover{border-color:var(--green);box-shadow:var(--shadow-lg);transform:translateY(-3px);}
.product-card:active{transform:scale(0.98);}

.card-img-wrap{position:relative;width:100%;background:var(--surface);aspect-ratio:1;overflow:hidden;}
.card-img-wrap img{width:100%;height:100%;object-fit:contain;padding:12px;transition:transform .35s;}
.product-card:hover .card-img-wrap img{transform:scale(1.06);}

.out-ribbon{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:9px;font-weight:900;padding:3px 8px;border-radius:6px;letter-spacing:.3px;z-index:2;}
.fav-btn-card{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:var(--white);border:1px solid var(--border);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;transition:all .2s;box-shadow:var(--shadow-sm);}
.fav-btn-card:hover{border-color:var(--gold);transform:scale(1.1);}
.fav-btn-card.on{background:var(--gold-light);border-color:var(--gold);}

.card-body{padding:10px 11px 13px;display:flex;flex-direction:column;flex:1;}
.card-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px;flex:1;}
.card-cat-tag{display:inline-block;background:var(--blue-light);color:var(--blue);font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;margin-bottom:6px;letter-spacing:.2px;}
.card-price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px;}
.card-price{color:var(--text);font-size:16px;font-weight:900;}
.card-price-cur">جنيه</div>
        </div>
        <div class="card-comm-badge">
          <span>⭐ ${cm} ج</span>
          <small>عمولتك</small>
        </div>
        <div class="card-stock ${out?'stock-out':'stock-ok'}">
          ${out?'❌ نفذت الكمية':`✅ متوفر — ${p.stock} قطعة`}
        </div>
        <button class="card-add-btn" onclick="event.stopPropagation();quickAdd(${p.product_id})" ${out?'disabled':''}>
          ${out?'⛔ غير متوفر':'🛒 أضف للسلة'}
        </button>
      </div>`;
    card.onclick = ()=>openProduct(p.product_id);
    grid.appendChild(card);
  });
}

/* ── QUICK FAV ── */
async function quickFav(pid, btn){
  const isFav = favoriteIds.includes(String(pid));
  await callApi(isFav?'del_fav':'add_fav',{mid:marketerId,pid});
  await loadFavs();
  if(btn){btn.classList.toggle('on',!isFav);btn.innerHTML=(!isFav)?'❤️':'🤍';}
}

/* ── QUICK ADD ── */
async function quickAdd(pid){
  const p = allProducts.find(x=>String(x.product_id)===String(pid));
  if(!p) return;
  const r = await callApi('add_cart',{mid:marketerId,pid});
  if(r.status==='error'){alert('❌ '+r.message);return;}
  await updateCartBadge();
  const btns = document.querySelectorAll('.card-add-btn');
  btns.forEach(b=>{
    if(b.onclick?.toString().includes(pid)){
      const orig=b.textContent;b.textContent='✅ أُضيف!';b.style.background='var(--green)';b.style.color='#fff';
      setTimeout(()=>{b.textContent=orig;b.style.background='';b.style.color='';},1200);
    }
  });
}

/* ── PRODUCT MODAL ── */
async function openProduct(id){
  openM('productModal');
  document.getElementById('productModalContent').innerHTML='<div class="ls" style="padding:60px"><div class="spin"></div></div>';
  const r = await callApi('get_product',{product_id:id});
  if(Array.isArray(r)&&r.length){currentProduct=r[0];renderProd(r[0]);}
  else document.getElementById('productModalContent').innerHTML='<div class="empty-state"><div class="big">⚠️</div><p>تعذر تحميل المنتج</p></div>';
}

function renderProd(p){
  const sp=sellP(p.base_price), cm=comm(p.base_price), out=parseInt(p.stock)===0;
  const isFav=favoriteIds.includes(String(p.product_id));
  const galleryLink=p.drive_link||p.gallery_link||'';
  
  // تنظيف كل النصوص من العلامات
  const cleanName = cleanText(p.name);
  const cleanDesc = cleanText(p.description);
  const cleanCategory = cleanText(p.category);
  
  const sizes=p.sizes?p.sizes.split(',').filter(s=>s.trim()).map(s=>`<span class="spec-tag">${esc(cleanText(s.trim()))}</span>`).join(''):'';
  const colors=p.colors?p.colors.split(',').filter(c=>c.trim()).map(c=>`<span class="spec-tag">${esc(cleanText(c.trim()))}</span>`).join(''):'';

  const imgs = [];
  if(p.image_url) imgs.push(p.image_url);
  if(p.image_url2) imgs.push(p.image_url2);
  if(p.image_url3) imgs.push(p.image_url3);
  if(p.image_url4) imgs.push(p.image_url4);
  if(imgs.length===0) imgs.push('');

  let desc = cleanDesc;
  desc = desc.replace(/📞[^\n]*/g,'').replace(/هاتف[^\n]*/g,'').replace(/واتساب المورد[^\n]*/g,'').trim();

  const slides = imgs.map(src=>`
    <div class="slider-slide">
      <img src="${iurl(src)}" onerror="this.src='https://placehold.co/540x400/2a2a2a/808080?text=🛍️'" alt="${esc(cleanName)}">
    </div>`).join('');
  const dots = imgs.length>1 ? imgs.map((_,i)=>`<div class="slider-dot ${i===0?'on':''}" onclick="goSlide(${i})"></div>`).join('') : '';
  const navBtns = imgs.length>1 ? `
    <button class="slider-btn slider-prev" onclick="moveSlide(-1)">‹</button>
    <button class="slider-btn slider-next" onclick="moveSlide(1)">›</button>` : '';

  document.getElementById('productModalContent').innerHTML=`
    <div class="slider-wrap" id="sliderWrap">
      <div class="slider-track" id="sliderTrack">${slides}</div>
      ${navBtns}
      ${dots?`<div class="slider-dots">${dots}</div>`:''}
    </div>
    <div class="prod-body">
      <div class="prod-head">
        <div class="prod-name">${esc(cleanName)}</div>
      </div>

      <div class="prod-price-zone">
        <div class="price-tile sell">
          <div class="pt-lbl g">💰 سعر البيع</div>
          <div class="pt-val g">${sp}</div>
          <div class="pt-cur g">جنيه مصري</div>
        </div>
        <div class="price-tile comm">
          <div class="pt-lbl gold">⭐ عمولتك الأولوية</div>
          <div class="pt-val gold">${cm}</div>
          <div class="pt-cur gold">يمكنك تعديلها بالطلب</div>
        </div>
      </div>

      ${desc?`<div class="prod-section"><div class="prod-sec-lbl">📋 وصف المنتج</div><div class="prod-desc">${esc(desc)}</div></div>`:''}

      ${sizes?`<div class="spec-row"><span class="spec-lbl">📏 المقاسات</span><div class="spec-tags">${sizes}</div></div>`:''}
      ${colors?`<div class="spec-row"><span class="spec-lbl">🎨 الألوان</span><div class="spec-tags">${colors}</div></div>`:''}
      <div class="spec-row">
        <span class="spec-lbl">📦 المخزون</span>
        <span class="${out?'stock-out':'stock-ok'}" style="font-weight:900;font-size:13px;">
          ${out?'❌ غير متوفر':`✅ ${p.stock} قطعة متوفرة`}
        </span>
      </div>

      <div class="prod-action">
        <div class="btn-row">
          <button class="btn btn-primary" onclick="openOrderForm()" ${out?'disabled':''}>${out?'⛔ نفذت':'🛍️ اطلب الآن'}</button>
          <button class="btn btn-sec" onclick="addToCart()" ${out?'disabled':''}>🛒 للسلة</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-fav ${isFav?'on':''}" onclick="toggleFav()">
            ${isFav?'❤️ في المفضلة':'🤍 أضف للمفضلة'}
          </button>
          ${galleryLink?`<button class="btn btn-media" onclick="window.open('${esc(galleryLink)}','_blank')">📸 الصور</button>`:''}
        </div>
      </div>
    </div>`;

  window._sliderIdx = 0;
  window._sliderTotal = imgs.length;
}

/* ── SLIDER ── */
function moveSlide(dir){
  const total = window._sliderTotal||1;
  window._sliderIdx = ((window._sliderIdx||0)+dir+total)%total;
  goSlide(window._sliderIdx);
}
function goSlide(idx){
  window._sliderIdx = idx;
  const track = document.getElementById('sliderTrack');
  if(track) track.style.transform=`translateX(${idx*100}%)`;
  document.querySelectorAll('.slider-dot').forEach((d,i)=>d.classList.toggle('on',i===idx));
}

/* ── FAV ── */
async function toggleFav(){
  if(!currentProduct) return;
  const isFav = favoriteIds.includes(String(currentProduct.product_id));
  await callApi(isFav?'del_fav':'add_fav',{mid:marketerId,pid:currentProduct.product_id});
  await loadFavs();
  renderProd(currentProduct);
  applyFilters();
}
async function openFavorites(){
  openM('favModal');
  document.getElementById('favModalContent').innerHTML='<div class="ls"><div class="spin"></div></div>';
  const r = await callApi('get_favs',{mid:marketerId});
  if(!Array.isArray(r)||!r.length){document.getElementById('favModalContent').innerHTML='<div class="empty-state"><div class="big">❤️</div><p>لم تضف أي منتج للمفضلة بعد</p></div>';return;}
  const prods = await callApi('get_products');
  const favs = r.map(f=>Array.isArray(prods)?prods.find(p=>String(p.product_id)===String(f.product_id)):null).filter(Boolean);
  const g = document.createElement('div');
  g.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:9px;';
  favs.forEach(p=>{
    const sp=sellP(p.base_price), cm=comm(p.base_price);
    const cleanName = cleanText(p.name);
    const d=document.createElement('div');
    d.style.cssText='background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:10px;cursor:pointer;transition:all .2s;';
    d.onmouseenter=()=>d.style.borderColor='var(--green)';
    d.onmouseleave=()=>d.style.borderColor='var(--border)';
    d.onclick=()=>{closeM('favModal');openProduct(p.product_id);};
    d.innerHTML=`<img src="${iurl(p.image_url)}" style="width:100%;height:88px;object-fit:contain;border-radius:9px;background:var(--white)" onerror="this.src='https://placehold.co/200x200/2a2a2a/808080?text=🛍️'">
      <div style="font-size:11px;font-weight:800;margin-top:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(cleanName)}</div>
      <div style="color:var(--green);font-size:13px;font-weight:900;margin-top:3px;">${sp} ج</div>
      <div style="color:var(--gold);font-size:10px;margin-top:2px;font-weight:700;">⭐ ${cm} ج عمولة</div>`;
    g.appendChild(d);
  });
  document.getElementById('favModalContent').innerHTML='';
  document.getElementById('favModalContent').appendChild(g);
}

/* ── CART ── */
async function addToCart(){
  const r = await callApi('add_cart',{mid:marketerId,pid:currentProduct.product_id});
  if(r.status==='error'){alert('❌ '+r.message);return;}
  await updateCartBadge();
  alert('✅ تمت الإضافة للسلة');
  closeM('productModal');
}
async function updateCartBadge(){
  const r = await callApi('get_cart',{mid:marketerId});
  if(Array.isArray(r)){cartItems=r;document.getElementById('cartCount').textContent=r.length;}
}
async function openCart(){
  openM('cartModal');
  document.getElementById('cartModalContent').innerHTML='<div class="ls"><div class="spin"></div></div>';
  const r = await callApi('get_cart',{mid:marketerId});
  if(Array.isArray(r)){cartItems=r;renderCart();}
}
function renderCart(){
  const body=document.getElementById('cartModalContent');
  if(!cartItems?.length){body.innerHTML='<div class="empty-state"><div class="big">🛒</div><p>السلة فارغة حالياً</p></div>';return;}
  let total=0,html='';
  cartItems.forEach(item=>{
    const sp=sellP(item.base_price);total+=sp*item.qty;
    const cleanName = cleanText(item.name);
    html+=`<div class="cart-item">
      <img src="${iurl(item.image_url)}" onerror="this.src='https://placehold.co/60x60/2a2a2a/808080?text=?'">
      <div class="cart-info"><div class="cart-name">${esc(cleanName)}</div><div class="cart-price">${sp} ج × ${item.qty} = ${sp*item.qty} ج</div></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:5px">
        <div class="qty-row">
          <button class="qty-btn" onclick="updQty('${item.cart_id}',-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="updQty('${item.cart_id}',1)">+</button>
        </div>
        <button class="del-btn" onclick="delCart('${item.cart_id}')">حذف</button>
      </div>
    </div>`;
  });
  const ship=70;
  body.innerHTML=html+`<div class="cart-total-bar">المنتجات: ${total} ج + شحن ${ship} ج = <strong>${total+ship} ج</strong></div>
    <div class="btn-row"><button class="btn btn-primary" onclick="checkout()">✅ إتمام الطلب</button><button class="btn btn-sec" onclick="closeM('cartModal')">إغلاق</button></div>`;
}
async function updQty(cid,diff){
  const item=cartItems.find(i=>i.cart_id===cid);if(!item)return;
  const nq=item.qty+diff;if(nq<1)return;
  await callApi('upd_cart',{cid,qty:nq});await openCart();await updateCartBadge();
}
async function delCart(cid){
  if(confirm('حذف المنتج من السلة؟')){await callApi('del_cart',{cid});await openCart();await updateCartBadge();}
}
function checkout(){
  closeM('cartModal');
  if(cartItems.length>1){
    alert('⚠️ يرجى تسجيل كل منتج كطلب منفصل حالياً لضمان دقة الشحن والعمولات.');
    openProduct(cartItems[0].product_id);
  } else if(cartItems.length===1){
    openProduct(cartItems[0].product_id).then(()=>{setTimeout(()=>openOrderForm(),400);});
  }
}

/* ── OPEN ORDER FORM ── */
function openOrderForm(){
  if(!currentProduct) return;
  closeM('productModal');
  openM('orderModal');
  
  const p = currentProduct;
  const sp = sellP(p.base_price);
  const cm = comm(p.base_price);
  const cleanName = cleanText(p.name);
  
  const sizes = p.sizes?p.sizes.split(',').filter(s=>s.trim()).map(s=>s.trim()):[];
  const colors = p.colors?p.colors.split(',').filter(c=>c.trim()).map(c=>c.trim()):[];

  let sizeOptions = sizes.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');
  let colorOptions = colors.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');

  let govOptions = `<option value="">اختر المحافظة...</option>`;
  for(let g in CITIES) { govOptions += `<option value="${g}">${g}</option>`; }

  document.getElementById('orderModalContent').innerHTML = `
    <div class="order-modal">
      <div class="order-badge">
        <img src="${iurl(p.image_url)}" onerror="this.src='https://placehold.co/50x50/2a2a2a/808080?text=?'">
        <div>
          <div class="ob-name">${esc(cleanName)}</div>
        </div>
      </div>

      <div class="fsec">📋 بيانات العميل</div>
      <div class="fg">
        <label class="fl">👤 اسم العميل بالكامل</label>
        <input class="fi" id="oName" type="text" placeholder="اسم مستلم الشحنة ثنائي أو ثلاثي">
      </div>
      <div class="fgrid">
        <div class="fg">
          <label class="fl">📱 رقم الهاتف الأول</label>
          <input class="fi" id="oPhone" type="tel" placeholder="01xxxxxxxxx">
        </div>
        <div class="fg">
          <label class="fl">📱 رقم الهاتف الثاني (إختياري)</label>
          <input class="fi" id="oPhone2" type="tel" placeholder="01xxxxxxxxx">
        </div>
      </div>
      <div class="fgrid">
        <div class="fg">
          <label class="fl">🗺️ المحافظة</label>
          <select class="fi" id="oGov" onchange="updateCities()">${govOptions}</select>
        </div>
        <div class="fg">
          <label class="fl">🏙️ المدينة / المركز</label>
          <select class="fi" id="oCity"><option value="">اختر المحافظة أولاً...</option></select>
        </div>
      </div>
      <div class="fg">
        <label class="fl">🏠 العنوان بالتفصيل</label>
        <input class="fi" id="oAddress" type="text" placeholder="اسم الشارع، رقم العقار، الدور، علامة مميزة">
      </div>

      <div class="fsec">⚙️ خيارات وتفاصيل الطلب</div>
      <div class="fgrid">
        ${sizes.length? `<div class="fg"><label class="fl">📏 المقاس</label><select class="fi" id="oSize">${sizeOptions}</select></div>` : ''}
        ${colors.length? `<div class="fg"><label class="fl">🎨 اللون</label><select class="fi" id="oColor">${colorOptions}</select></div>` : ''}
      </div>

      <div class="fgrid">
        <div class="fg">
          <label class="fl">📦 الكمية</label>
          <input class="fi fi-green" id="oQty" type="number" value="1" min="1" max="${p.stock}">
        </div>
        <div class="fg">
          <label class="fl">⭐ عمولتك</label>
          <input class="fi fi-gold" id="oCommission" type="number" value="${cm}" min="0">
        </div>
      </div>

      <div class="fg">
        <label class="fl">✍️ ملاحظات للشحن أو الإدارة (إختياري)</label>
        <input class="fi" id="oNotes" type="text" placeholder="مثلاً: الاتصال قبل التسليم، تسليم في مكان عمل...">
      </div>

      <div class="sum-box">
        <div class="sum-row">
          <span>سعر البيع للمنتج</span>
          <span>${sp} ج</span>
        </div>
        <div class="sum-row">
          <span>الكمية المطلوبة</span>
          <span id="oQtyDisplay">1</span>
        </div>
        <div class="sum-row">
          <span>مصاريف الشحن</span>
          <span>70 ج</span>
        </div>
        <div class="sum-row sum-total">
          <span>إجمالي حساب العميل</span>
          <span id="oTotalDisplay">${sp + 70} ج</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="submitOrder()">🚀 تأكيد وإرسال الطلب</button>
        <button class="btn btn-sec" onclick="closeM('orderModal')">إلغاء</button>
      </div>
    </div>`;

  function updateOrderTotal(){
    const qty = parseInt(document.getElementById('oQty').value) || 1;
    const commission = parseFloat(document.getElementById('oCommission').value) || 0;
    const total = ((sp + commission) * qty) + 70;
    
    document.getElementById('oQtyDisplay').textContent = qty;
    document.getElementById('oTotalDisplay').textContent = total + ' ج';
  }

  document.getElementById('oQty').addEventListener('input', updateOrderTotal);
  document.getElementById('oCommission').addEventListener('input', updateOrderTotal);
}

function updateCities(){
  const g = document.getElementById('oGov').value, cSel = document.getElementById('oCity');
  if(!g){cSel.innerHTML=`<option value="">اختر المحافظة أولاً...</option>`;return;}
  cSel.innerHTML = (CITIES[g]||[]).map(c=>`<option value="${c}">${c}</option>`).join('');
}

/* ── SUBMIT ORDER ── */
async function submitOrder(){
  const name = document.getElementById('oName').value.trim();
  const phone = document.getElementById('oPhone').value.trim();
  const phone2 = document.getElementById('oPhone2').value.trim();
  const gov = document.getElementById('oGov').value;
  const city = document.getElementById('oCity').value;
  const addr = document.getElementById('oAddress').value.trim();
  const qty = parseInt(document.getElementById('oQty').value) || 1;
  const szEl = document.getElementById('oSize'), size = szEl?szEl.value:'';
  const colEl = document.getElementById('oColor'), color = colEl?colEl.value:'';
  const notes = document.getElementById('oNotes').value.trim();

  if(!name||!phone||!gov||!city||!addr){alert('⚠️ من فضلك أكمل كافة البيانات الأساسية للعميل!');return;}
  if(!/^01[0125][0-9]{8}$/.test(phone)){alert('⚠️ رقم الهاتف الأول غير صحيح! يجب أن يكون رقم موبايل مصري مكون من 11 رقم.');return;}

  const p = currentProduct;
  const sp = sellP(p.base_price);
  const cm = parseFloat(document.getElementById('oCommission').value) || 0;
  const totalPrice = ((sp + cm) * qty) + 70;

  if(confirm(`هل تريد تأكيد إرسال طلب ${qty} قطعة لـ العميل/ ${name} بإجمالي ${totalPrice} ج ؟`)){
    const oid = 'ORD' + Date.now().toString().substr(-7);
    const res = await callApi('place_order', {
      order_id: oid,
      product_id: p.product_id,
      customer_name: name,
      phone: phone,
      phone2: phone2,
      governorate: gov,
      city: city,
      address: addr,
      qty: qty,
      size: size,
      color: color,
      price: sp,
      shipping: 70,
      total_price: totalPrice,
      commission: cm,
      site_profit: SITE_PROFIT,
      notes: notes,
      marketer_username: marketerName,
      marketer_id: marketerId,
      order_status: 'pending'
    });

    if(res.status==='error'){alert('❌ حدث خطأ أثناء التسجيل: '+res.message);return;}
    alert(`🎉 تم تسجيل طلبك بنجاح بكود متابعة: #${oid}`);
    closeM('orderModal');
    loadProducts();
  }
}

/* ── INITIAL START ── */
window.addEventListener('DOMContentLoaded', ()=>{
  loadProducts();
  updateCartBadge();
});
</script>
</body>
</html>
