<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>متجر المسوقين - عرض المنتجات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --card-bg: #151515;
  --card-border: #2a2a2a;
  --text: #ffffff;
  --muted: #888;
  --green: #00ff88;
  --blue: #00aaff;
  --red: #ff3366;
  --orange: #ff9900;
  --gold: #ffd700;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Tajawal", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: 80px;
}

/* ===== السليدر الجانبي ===== */
.menu-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  font-size: 28px;
  color: var(--green);
  cursor: pointer;
  z-index: 1001;
  background: #151515;
  width: 45px;
  height: 45px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #333;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  transition: all 0.3s ease;
}
.menu-btn:hover {
  background: var(--green);
  color: #000;
  transform: scale(1.05);
}

.sidebar {
  position: fixed;
  top: 0;
  right: -280px;
  width: 280px;
  height: 100%;
  background: #0a0a0a;
  border-left: 2px solid var(--green);
  transition: right 0.3s ease;
  z-index: 1002;
  overflow-y: auto;
  direction: rtl;
  box-shadow: -5px 0 30px rgba(0,0,0,0.5);
}
.sidebar.active { right: 0; }
.sidebar-header {
  padding: 20px;
  background: #151515;
  border-bottom: 2px solid var(--green);
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--green);
  font-size: 20px;
  font-weight: 900;
}
.sidebar-header button {
  background: none;
  border: none;
  color: #ff4444;
  font-size: 32px;
  cursor: pointer;
  transition: 0.2s;
}
.sidebar-header button:hover { transform: scale(1.1); }
.sidebar-menu { padding: 15px 0; }
.sidebar-menu a {
  display: block;
  padding: 15px 20px;
  color: #e0e0e0;
  text-decoration: none;
  font-size: 15px;
  font-weight: 600;
  margin: 4px 10px;
  border-radius: 10px;
  transition: 0.2s;
  border-right: 4px solid transparent;
}
.sidebar-menu a:hover {
  background: #151515;
  color: var(--green);
  border-right: 4px solid var(--green);
  padding-right: 30px;
}
.sidebar-menu a.active {
  background: #151515;
  color: var(--green);
  border-right: 4px solid var(--green);
}
.sidebar-menu a.logout-btn {
  color: #ff4444;
  margin-top: 30px;
  border-right: 4px solid transparent;
}
.sidebar-menu a.logout-btn:hover {
  background: #221111;
  color: #ff6666;
  border-right: 4px solid #ff4444;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  z-index: 1001;
}
.overlay.active { display: block; }

/* ===== الهيدر ===== */
.header {
  background: #111;
  padding: 12px 70px 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid #222;
}
.user-info {
  font-size: 14px;
  color: #aaa;
  background: #1a1a1a;
  padding: 5px 12px;
  border-radius: 20px;
}
.header-icons {
  display: flex;
  gap: 20px;
}
.cart-icon, .fav-icon, .whats-icon {
  position: relative;
  cursor: pointer;
  font-size: 22px;
  transition: 0.2s;
}
.cart-icon:hover, .fav-icon:hover, .whats-icon:hover {
  transform: scale(1.05);
}
.cart-count, .fav-count {
  position: absolute;
  top: -8px;
  right: -10px;
  background: #00ff88;
  color: #000;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}
.whats-icon { color: #25d366; }

.search-box {
  width: calc(100% - 24px);
  padding: 12px 15px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 30px;
  color: #fff;
  margin: 12px auto;
  display: block;
  font-size: 14px;
  outline: none;
}
.search-box:focus { border-color: var(--green); }

/* ===== تبويبات الأقسام ===== */
.tabs {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
  overflow-x: auto;
  flex-wrap: nowrap;
}
.tab {
  padding: 8px 16px;
  background: #1a1a1a;
  border: 1px solid #333;
  color: #888;
  border-radius: 25px;
  cursor: pointer;
  font-size: 13px;
  white-space: nowrap;
  transition: 0.2s;
}
.tab.active {
  background: var(--green);
  color: #000;
  border-color: var(--green);
  font-weight: bold;
}
.tab:hover {
  border-color: var(--green);
  color: var(--green);
}

/* ===== شبكة المنتجات ===== */
.products-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 12px;
}
@media(max-width: 768px) {
  .products-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 8px; }
}
@media(max-width: 480px) {
  .products-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 6px; }
}

.product-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
}
.product-card:hover {
  border-color: var(--green);
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(0,255,136,0.1);
}
.product-img-box {
  width: 100%;
  height: 130px;
  background: #0f0f0f;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.product-card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 6px;
}
.product-info {
  padding: 8px;
}
.product-name {
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.product-price {
  color: var(--green);
  font-size: 14px;
  font-weight: bold;
}
.product-stock {
  font-size: 10px;
  margin-top: 2px;
}
.fav-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  font-size: 14px;
  z-index: 2;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  padding: 2px 4px;
}
.loading-text {
  text-align: center;
  padding: 40px;
  color: #666;
  grid-column: 1/-1;
}
.no-products {
  text-align: center;
  padding: 40px;
  color: #666;
  grid-column: 1/-1;
}

/* ===== باقي التنسيقات ===== */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.96);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.popup-content {
  background: var(--card-bg);
  border: 1px solid #333;
  border-radius: 20px;
  max-width: 500px;
  width: 95%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 20px;
  position: relative;
}
.close-btn {
  position: sticky;
  top: 0;
  left: 100%;
  background: #ff4444;
  border: none;
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  width: 35px;
  height: 35px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
  float: left;
}
.popup-img {
  width: 100%;
  height: 220px;
  object-fit: contain;
  background: #0f0f0f;
  border-radius: 16px;
  margin-bottom: 15px;
}
.commission-box {
  background: linear-gradient(135deg, #1a3a1a, #0a2a0a);
  border: 1px solid var(--green);
  border-radius: 12px;
  padding: 12px;
  margin: 12px 0;
  text-align: center;
}
.commission-box span {
  color: var(--green);
  font-size: 20px;
  font-weight: bold;
}
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.btn {
  flex: 1;
  padding: 10px;
  border: 1px solid #333;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  background: #1a1a1a;
  color: #fff;
  text-align: center;
  transition: 0.2s;
  min-width: 60px;
}
.btn:hover {
  border-color: var(--green);
  color: var(--green);
}
.btn-green {
  background: var(--green);
  color: #000;
  border: none;
  font-weight: bold;
}
.btn-green:hover {
  background: #00cc66;
  color: #000;
}
.btn-fav {
  border-color: #ffcc00;
  color: #ffcc00;
}
.gallery-btn-style {
  background: linear-gradient(135deg, #2c3e50, #3498db) !important;
  color: #fff !important;
  border: none !important;
  font-weight: bold;
}
.tag {
  display: inline-block;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 11px;
  margin: 2px;
}

/* ===== السلة ===== */
.cart-item {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: #1a1a1a;
  border-radius: 10px;
  margin-bottom: 8px;
  align-items: center;
}
.cart-item img {
  width: 50px;
  height: 50px;
  object-fit: contain;
  border-radius: 8px;
}
.qty-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}
.qty-btn {
  width: 26px;
  height: 26px;
  background: #333;
  border: none;
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}
.cart-total {
  text-align: center;
  padding: 12px;
  font-size: 16px;
  color: var(--green);
  border-top: 1px solid #333;
  margin-top: 8px;
  font-weight: bold;
}

/* ===== الفورم ===== */
.form-group { margin-bottom: 12px; }
.form-group label { font-size: 12px; color: #aaa; display: block; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 8px;
  color: #fff;
  font-size: 13px;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.order-summary {
  background: #0a2a0a;
  border: 1px solid #00ff8844;
  border-radius: 10px;
  padding: 12px;
  margin: 12px 0;
}
.srow { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.srow span:last-child { color: var(--green); font-weight: bold; }
.stotal { border-top: 1px solid #00ff8833; margin-top: 6px; padding-top: 6px; font-size: 15px; }
</style>
</head>
<body>

    <a href="#" onclick="goToPage('manage_orders')">📋 إدارة الأوردرات</a>
    <a href="#" onclick="goToPage('my_wallet')">💰 المحفظة</a>

  </div>
</div>
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<div class="header">

</div>

<div class="products-grid" id="productsGrid">

</div>

<div class="popup" id="productPopup">
  <div class="popup-content">
    <button class="close-btn" onclick="closePopup()">×</button>
    <div id="popupBody"><div class="loading-text">جاري التحميل...</div></div>
  </div>
</div>

<div class="popup" id="cartPopup">
  <div class="popup-content">
    <button class="close-btn" onclick="closeCart()">×</button>
    <h2 style="margin-bottom:15px">🛒 سلة المشتريات</h2>
    <div id="cartBody"><div class="loading-text">جاري التحميل...</div></div>
    <div class="cart-total" id="cartTotal"></div>
    <div class="btn-row">

      <button class="btn" onclick="closeCart()">إغلاق</button>
    </div>
  </div>
</div>

<div class="popup" id="favoritesPopup">
  <div class="popup-content">
    <button class="close-btn" onclick="closeFavorites()">×</button>
    <h2 style="margin-bottom:15px">⭐ المنتجات المفضلة</h2>
    <div id="favoritesBody"><div class="loading-text">جاري التحميل...</div></div>
  </div>
</div>

<div class="popup" id="orderPopup">
  <div class="popup-content">
    <button class="close-btn" onclick="closeOrder()">×</button>
    <h2 style="margin-bottom:15px">📦 تسجيل طلب جديد</h2>
    <div id="orderBody"></div>
  </div>
</div>

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('active');
  document.getElementById('overlay').classList.toggle('active');
}

function goToPage(pageName) {
  let lowerPage = pageName.toLowerCase();
  let correctPageName = pageName + '.html'; 

  if (lowerPage.includes("data_page") || lowerPage.includes("dashboard")) {
    correctPageName = "Data_Page.html";
  } else if (lowerPage.includes("my_wallet") || lowerPage.includes("wallet")) {
    correctPageName = "my_wallet.html";
  } else if (lowerPage.includes("displayed_products")) {
    correctPageName = "Displayed_Products.html";
  } else if (lowerPage.includes("manage_orders")) {
    correctPageName = "manage_orders.html";
  }

  const currentUser = localStorage.getItem('username') || marketerId;
  window.location.href = `${correctPageName}?user=${encodeURIComponent(currentUser)}&type=marketer`;
}

function logout() {
  if(confirm("هل أنت متأكد من رغبتك في تسجيل الخروج؟")) {
    localStorage.clear();
    window.location.href = "login.html";
  }
}

function defaultCommission(basePrice) {
  const p = parseFloat(basePrice) || 0;
  if (p < 100) return 40;
  if (p < 200) return 70;
  if (p < 300) return 100;
  if (p < 500) return 180;
  return Math.round(p * 0.30);
}

function calcSellingPrice(basePrice, commission) {
  return parseFloat(basePrice) + parseFloat(commission);
}

function fixImageUrl(url) {
  if (!url) return 'https://placehold.co/400x400/1a1a1a/444?text=No+Image';
  return url.toString().trim();
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
}

async function supabaseApi(endpoint, options = {}) {
  const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    ...options.headers
  };
  const response = await fetch(url, { ...options, headers });
  if (!response.ok) {
    const error = await response.text();
    throw new Error(`خطأ ${response.status}: ${error}`);
  }
  const textData = await response.text();
  if (!textData) return {};
  return JSON.parse(textData);
}

// تم ربط العمليات بجدول شيت Marketer_Products الموحد والمحدث لجميع الأقسام والمسوقين
async function callApi(action, data = {}) {
  try {
    const tableEndpoint = 'Marketer_Products';
    switch(action) {
      case 'get_products':
        return await supabaseApi(`${tableEndpoint}?select=*`);
      case 'get_product':
        return await supabaseApi(`${tableEndpoint}?product_id=eq.${data.product_id}&select=*`);
      case 'get_favorites':
        return await supabaseApi(`favorites?marketer_id=eq.${data.marketer_id}&select=*`);
      case 'add_to_favorites':
        return await supabaseApi('favorites', { method: 'POST', body: JSON.stringify({ marketer_id: data.marketer_id, product_id: data.product_id, fav_id: 'F' + Date.now() }) });
      case 'remove_from_favorites':
        return await supabaseApi(`favorites?marketer_id=eq.${data.marketer_id}&product_id=eq.${data.product_id}`, { method: 'DELETE' });
      case 'get_cart':
        return await supabaseApi(`cart?marketer_id=eq.${data.marketer_id}&select=*`);
      case 'add_to_cart':
        return await supabaseApi('cart', { method: 'POST', body: JSON.stringify({ marketer_id: data.marketer_id, product_id: data.product_id, qty: 1, cart_id: 'C' + Date.now() }) });
      case 'update_cart_qty':
        return await supabaseApi(`cart?cart_id=eq.${data.cart_id}`, { method: 'PATCH', body: JSON.stringify({ qty: data.qty }) });
      case 'delete_cart':
        return await supabaseApi(`cart?cart_id=eq.${data.cart_id}`, { method: 'DELETE' });
      case 'place_order':
        return await supabaseApi('orders', { method: 'POST', body: JSON.stringify({ order_id: 'ORD' + Date.now(), ...data }) });
      default:
        return { status: 'error', message: 'Action غير موجود' };
    }
  } catch(err) {
    return { status: 'error', message: err.message };
  }
}

async function loadProducts() {

    document.getElementById('productsGrid').innerHTML = `<div class="loading-text">❌ ${result.message || 'فشل التحميل'}</div>`;
  }
}

async function loadFavorites() {
  const result = await callApi('get_favorites', { marketer_id: marketerId });
  if (result.status !== 'error' && Array.isArray(result)) {
    allFavorites = result;
    favoriteIds = allFavorites.map(p => String(p.product_id || ''));

}

function filterByCategory(category, btn) {
  currentCategory = category;
  if (btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }
  if (category === 'all') {
    filteredProducts = [...allProducts];
  } else {
    filteredProducts = allProducts.filter(p => p.category === category);
  }
  renderProducts(filteredProducts);
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = '';
  productCards = [];
  if (!products || products.length === 0) {
    grid.innerHTML = '<div class="no-products">📭 لا توجد منتجات حالياً</div>';
    return;
  }
  products.forEach(p => {
    const outStock = parseInt(p.stock) === 0;
    const sellingPrice = calcSellingPrice(p.base_price, defaultCommission(p.base_price));
    const imgUrl = fixImageUrl(p.image_url);
    const isFav = favoriteIds.includes(String(p.product_id));

    const card = document.createElement('div');
    card.className = 'product-card';
    card.dataset.name = (p.name || '').toLowerCase();
    card.onclick = () => openProduct(p.product_id);
    card.innerHTML = `
      ${isFav ? '<div class="fav-badge">⭐</div>' : ''}
      <div class="product-img-box">
        <img src="${imgUrl}" loading="lazy" onerror="this.onerror=null;this.src='https://placehold.co/400x400/1a1a1a/444?text=No+Img'">
      </div>
      <div class="product-info">
        <div class="product-name">${escapeHtml(p.name)}</div>
        <div class="product-price">${sellingPrice} ج</div>
        <div class="product-stock" style="color:${outStock ? '#ff4444' : '#00ff88'}">${outStock ? '❌ نفذ' : '✅ متوفر'}</div>
      </div>
    `;
    grid.appendChild(card);
    productCards.push(card);
  });
}

function searchProducts() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  productCards.forEach(card => {
    card.style.display = card.dataset.name.includes(term) ? '' : 'none';
  });
}

async function updateCartCount() {

async function openCart() {
  document.getElementById('cartPopup').style.display = 'flex';
  document.getElementById('cartBody').innerHTML = '<div class="loading-text">⏳ جاري التحميل...</div>';
  const result = await callApi('get_cart', { marketer_id: marketerId });
  if (result.status !== 'error' && Array.isArray(result)) {
    cartItems = result;
    renderCart();
  } else {
    document.getElementById('cartBody').innerHTML = `<div class="loading-text">❌ ${result.message}</div>`;
  }
}

function renderCart() {
  const body = document.getElementById('cartBody');
  if (!cartItems || cartItems.length === 0) {
    body.innerHTML = '<div class="loading-text">🛒 السلة فاضية</div>';
    document.getElementById('cartTotal').innerHTML = '';
    return;
  }
  body.innerHTML = '';
  let total = 0;
  cartItems.forEach(item => {
    const sellingPrice = calcSellingPrice(item.base_price, defaultCommission(item.base_price));
    const subTotal = sellingPrice * item.qty;
    total += subTotal;
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <img src="${fixImageUrl(item.image_url)}" onerror="this.onerror=null;this.src='https://placehold.co/60x60/1a1a1a/444'">
      <div class="cart-item-info">
        <div class="cart-item-name">${escapeHtml(item.name)}</div>
        <div class="cart-item-price">${sellingPrice} ج × ${item.qty} = ${subTotal} ج</div>
      </div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="updateQty('${item.cart_id}', -1)">−</button>
        <span style="min-width:30px;text-align:center">${item.qty}</span>
        <button class="qty-btn" onclick="updateQty('${item.cart_id}', 1)">+</button>
      </div>
      <button class="btn" style="padding:5px 10px;background:#ff4444;color:#fff" onclick="removeFromCart('${item.cart_id}')">حذف</button>
    `;
    body.appendChild(div);
  });
  const shipping = 70;
  document.getElementById('cartTotal').innerHTML = `💰 ${total} ج + شحن ${shipping} ج = ${total + shipping} ج`;
}

async function updateQty(cartId, diff) {
  const item = cartItems.find(i => i.cart_id === cartId);
  if (!item) return;
  const newQty = item.qty + diff;
  if (newQty < 1) return;
  const result = await callApi('update_cart_qty', { cart_id: cartId, qty: newQty });
  if (result.status !== 'error') {
    await openCart();
    await updateCartCount();
  }
}

async function removeFromCart(cartId) {
  const result = await callApi('delete_cart', { cart_id: cartId });
  if (result.status !== 'error') {
    await openCart();
    await updateCartCount();
  }
}

  const cities = CITIES_BY_GOV[gov] || ['أخرى'];
  cities.forEach(city => {
    const option = document.createElement('option');
    option.value = city; option.textContent = city;
    citySelect.appendChild(option);
  });

function updatePriceFromCommission() {
  const basePrice = parseFloat(currentProduct.base_price) || 0;
  const commission = parseFloat(document.getElementById('orderCommission').value) || 0;
  document.getElementById('orderPrice').value = basePrice + commission;
  updateOrderSummary();
}

function updateCommissionFromPrice() {
  const basePrice = parseFloat(currentProduct.base_price) || 0;
  const sellingPrice = parseFloat(document.getElementById('orderPrice').value) || 0;
  document.getElementById('orderCommission').value = Math.max(0, sellingPrice - basePrice);
  updateOrderSummary();
}

function updateOrderSummary() {
  const price = parseFloat(document.getElementById('orderPrice').value) || 0;
  const qty = parseInt(document.getElementById('orderQty').value) || 1;
  const shipping = parseFloat(document.getElementById('orderShipping').value) || 0;
  const commission = parseFloat(document.getElementById('orderCommission').value) || 0;
  const subtotal = price * qty;
  const total = subtotal + shipping;
  const summary = document.getElementById('orderSummary');
  if (summary) summary.innerHTML = `
    <div class="srow"><span>إجمالي المنتج</span><span>${subtotal} ج</span></div>
    <div class="srow"><span>الشحن</span><span>${shipping} ج</span></div>
    <div class="srow"><span>عمولتك المربوحة</span><span>${commission * qty} ج</span></div>
    <div class="srow stotal"><span>💰 الإجمالي المطلوب</span><span>${total} ج</span></div>
  `;
}

async function submitOrder() {
  const name = document.getElementById('customerName')?.value.trim();
  const phone = document.getElementById('customerPhone')?.value.trim();
  const gov = document.getElementById('customerGov')?.value;
  const city = document.getElementById('customerCity')?.value;
  const address = document.getElementById('customerAddress')?.value.trim();
  
  if (!name || !phone || !gov || !city || !address) { alert('⚠️ من فضلك اكمل جميع البيانات المطلوبة'); return; }

  const price = parseFloat(document.getElementById('orderPrice').value) || 0;
  const commission = parseFloat(document.getElementById('orderCommission').value) || 0;
  const qty = parseInt(document.getElementById('orderQty').value) || 1;
  const shipping = parseFloat(document.getElementById('orderShipping').value) || 70;

  const orderData = {
    product_id: currentProduct.product_id,
    customer_name: name, phone: phone, phone2: document.getElementById('customerPhone2')?.value || '',
    governorate: gov, city: city, address: address, qty: qty,
    size: document.getElementById('orderSize')?.value || '', color: document.getElementById('orderColor')?.value || '',
    price: price, shipping: shipping, total_price: (price * qty + shipping), commission: commission,
    notes: document.getElementById('orderNotes')?.value || '', marketer_username: marketerName, marketer_id: marketerId,
    order_status: 'جديد'
  };

  const btn = document.getElementById('submitOrderBtn');
  btn.disabled = true; btn.textContent = '⏳ جاري الإرسال...';

  try {
    const result = await callApi('place_order', orderData);
    if (result.status !== 'error') {
      alert(`✅ تم تسجيل الطلب بنجاح!`);
      closeOrder();
      loadProducts();
    } else alert(`❌ خطأ: ${result.message}`);
  } catch(err) { alert(`❌ خطأ: ${err.message}`); }
  finally { btn.disabled = false; btn.textContent = '✅ تأكيد الطلب'; }
}
