function getAllReviews(productId) {
  const key = `reviews_${productId}`;
  const seed = parseInt(productId) || 1;
  const count = (seed % 3) + 2;
  const shuffled = [...FAKE_REVIEWS].sort(() => {
    const x = (seed * 9301 + 49297) % 233280;
    return x / 233280 - 0.5;
  });
  const fakeReviews = shuffled.slice(0, count).map(r => ({ ...r, isFake: true }));
  const realReviews = (userReviews[key] || []).map(r => ({ ...r, isFake: false }));
  return [...realReviews, ...fakeReviews];
}

function containsBannedWords(text) {
  const lower = text.toLowerCase();
  return BANNED_WORDS.some(word => lower.includes(word.toLowerCase()));
}

// ===== API Calls =====
async function req(ep, opts={}){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${ep}`,{...opts,headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',...opts.headers}});
  const t = await r.text(); return t ? JSON.parse(t) : {};
}

async function callApi(action, data={}){
  try{
    switch(action){
      case 'get_products': {
        const products = await req('products?select=*&order=product_id.desc');
        if (!Array.isArray(products)) return products;
        const variants = await req('product_variants?select=*');
        const variantsMap = {};
        if (Array.isArray(variants)) {
          variants.forEach(v => {
            if (!variantsMap[v.product_id]) variantsMap[v.product_id] = [];
            variantsMap[v.product_id].push(v);
          });
        }
        return products.map(p => ({
          ...p,
          variants: variantsMap[p.product_id] || []
        }));
      }
      case 'get_product': {
        const product = await req(`products?product_id=eq.${data.product_id}&select=*`);
        if (Array.isArray(product) && product.length) {
          const variants = await req(`product_variants?product_id=eq.${data.product_id}&select=*`);
          return [{
            ...product[0],
            variants: Array.isArray(variants) ? variants : []
          }];
        }
        return product;
      }
      case 'get_favs':     return await req(`favorites?marketer_id=ilike.${data.mid}&select=*`);
      case 'add_fav':      return await req('favorites',{method:'POST',body:JSON.stringify({marketer_id:data.mid.toLowerCase(),product_id:data.pid,fav_id:'F'+Date.now()})});
      case 'del_fav':      return await req(`favorites?marketer_id=ilike.${data.mid}&product_id=eq.${data.pid}`,{method:'DELETE'});
      case 'get_cart':{
        const c = await req(`cart?marketer_id=ilike.${data.mid}&select=*`);
        if(!Array.isArray(c))return c;
        const pr = await req('products?select=*');
        return c.map(i=>{ const p=pr.find(x=>String(x.product_id)===String(i.product_id)); return p?{...i,...p}:i; });
      }
      case 'add_cart':{
        const existing = cartItems.find(i => String(i.product_id) === String(data.pid));
        if(existing) return await req(`cart?cart_id=eq.${existing.cart_id}`,{method:'PATCH',body:JSON.stringify({qty: existing.qty + 1})});
        return await req('cart',{method:'POST',body:JSON.stringify({marketer_id:data.mid.toLowerCase(),product_id:data.pid,qty:1,cart_id:'C'+Date.now()})});
      }
      case 'upd_cart':  return await req(`cart?cart_id=eq.${data.cid}`,{method:'PATCH',body:JSON.stringify({qty:data.qty})});
      case 'del_cart':  return await req(`cart?cart_id=eq.${data.cid}`,{method:'DELETE'});
      case 'update_variant_stock': {
        return await req(`product_variants?id=eq.${data.variant_id}`, {
          method: 'PATCH',
          body: JSON.stringify({ stock: data.stock })
        });
      }
      case 'place_order': {
        const orderBody = {
          order_id: data.order_id, product_id: String(data.product_id), customer_name: data.customer_name,
          phone: data.phone, phone2: data.phone2 || '', governorate: data.governorate, city: data.city,
          address: data.address, qty: data.qty || 1, size: data.size || '', color: data.color || '',
          price: data.price, shipping: data.shipping || 115, total_price: data.total_price,
          commission: data.commission, site_profit: data.site_profit || SITE_PROFIT, notes: data.notes || '',
          marketer_username: data.marketer_username, marketer_id: data.marketer_id, order_status: data.order_status || 'pending'
        };
        return await req('orders', { method: 'POST', body: JSON.stringify(orderBody) });
      }
      default: return {status:'error'};
    }
  }catch(e){ return {status:'error',message:e.message}; }
}

function applyFilters(){
  const search = document.getElementById('searchInput').value.toLowerCase();
  const minP = parseFloat(document.getElementById('fMinPrice').value)||0;
  const maxP = parseFloat(document.getElementById('fMaxPrice').value)||Infinity;
  const minC = parseFloat(document.getElementById('fMinComm').value)||0;
  const stock = document.getElementById('fStock').value;
  let list = allProducts.filter(p=>{
    const sp=sellP(p.base_price), cm=comm(p.base_price);
    const variants = p.variants || [];
    const totalStock = variants.reduce((sum, v) => sum + (parseInt(v.stock) || 0), 0);
    const inStock = totalStock > 0;
    if(currentCat!=='all' && p.category!==currentCat) return false;
    if(search && !(p.name||'').toLowerCase().includes(search)) return false;
    if(sp<minP||sp>maxP) return false;
    if(cm<minC) return false;
    if(stock==='in'&&!inStock) return false;
    if(stock==='out'&&inStock) return false;
    return true;
  });
  if(currentSort==='comm') list.sort((a,b)=>comm(b.base_price)-comm(a.base_price));
  else if(currentSort==='price_asc') list.sort((a,b)=>sellP(a.base_price)-sellP(b.base_price));
  else if(currentSort==='price_desc') list.sort((a,b)=>sellP(b.base_price)-sellP(a.base_price));
  filteredProducts = list;
  document.getElementById('resultNum').textContent = list.length;
  renderProducts(list);
}

// ===== تحديث المخزون عند اختيار المقاس واللون =====
function updateVariantStock() {
  const size = document.getElementById('variantSize')?.value;
  const color = document.getElementById('variantColor')?.value;
  const display = document.getElementById('variantStockDisplay');
  if (!display) return;
  
  if (!size || !color) {
    display.className = 'variant-stock-display out-stock';
    display.textContent = '⚠️ يرجى اختيار المقاس واللون';
    return;
  }
  
  const variants = currentProduct?.variants || [];
  const matched = variants.find(v => v.size === size && v.color === color);
  
  if (matched) {
    const stock = parseInt(matched.stock) || 0;
    if (stock > 0) {
      display.className = 'variant-stock-display in-stock';
      display.textContent = `✅ متوفر — ${stock} قطعة`;
    } else {
      display.className = 'variant-stock-display out-stock';
      display.textContent = '❌ غير متوفر حالياً';
    }
  } else {
    display.className = 'variant-stock-display out-stock';
    display.textContent = '⚠️ هذا المقاس واللون غير متاحين';
  }
}

// ===== إضافة التقييم =====
function submitReview(productId) {
  const name = document.getElementById('reviewName').value.trim();
  const rating = parseInt(document.getElementById('reviewRating').value);
  const text = document.getElementById('reviewText').value.trim();

  if (!name) { alert('⚠️ يرجى كتابة اسمك'); return; }
  if (!text) { alert('⚠️ يرجى كتابة تعليق'); return; }

  if (containsBannedWords(text)) {
    alert('❌ ممنوع كتابة تعليقات سلبية عن الخامة أو السعر\nيرجى كتابة تقييم إيجابي أو محايد');
    return;
  }

  const key = `reviews_${productId}`;
  if (!userReviews[key]) userReviews[key] = [];
  userReviews[key].push({
    customer_name: name,
    rating: rating,
    review_text: text,
    created_at: 'الآن'
  });
  localStorage.setItem('userReviews', JSON.stringify(userReviews));

  alert('✅ تم حفظ التقييم بنجاح');
  document.getElementById('reviewName').value = '';
  document.getElementById('reviewText').value = '';

  // تحديث التقييمات
  const container = document.getElementById('reviewsContainer');
  if (container) {
    const allReviews = getAllReviews(productId);
    if (allReviews.length === 0) {
      container.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 0;">لا توجد تقييمات لهذا المنتج</div>';
    } else {
      container.innerHTML = allReviews.map((rev, idx) => `
        <div class="review-item" key="${idx}">
          <div class="review-header">
            <span class="review-name">${esc(rev.customer_name)}</span>
            <span class="review-stars">${'⭐'.repeat(rev.rating)}</span>
          </div>
          <div class="review-text">${esc(rev.review_text)}</div>
          <div class="review-date">${rev.created_at || 'منذ يومين'}</div>
        </div>
      `).join('');
    }
  }
}

// ===== السلة =====
async function addToCart(){
  if(!currentProduct) return;
  const latest = allProducts.find(p => String(p.product_id) === String(currentProduct.product_id));
  if(!latest) return;

  // منع خلط الموردين
  if(cartItems.length > 0) {
    const existingSupplier = (cartItems[0].username || cartItems[0].supplier || '').trim();
    const newSupplier = (latest.username || latest.supplier || '').trim();
    if(existingSupplier && newSupplier && existingSupplier !== newSupplier) {
      alert(`⚠️ لا يمكن إضافة منتجات من موردين مختلفين.\nالسلة تحتوي على منتجات من مورد: "${existingSupplier}".\nلإضافة منتج جديد، يجب إنهاء الطلب الحالي أو مسح السلة أولاً.`);
      return;
    }
  }

  // التحقق من اختيار المقاس واللون
  const size = document.getElementById('variantSize')?.value;
  const color = document.getElementById('variantColor')?.value;
  const variants = latest.variants || [];
  
  let selectedVariant = null;
  if (size && color) {
    selectedVariant = variants.find(v => v.size === size && v.color === color);
  }
  
  if (variants.length > 0 && !selectedVariant) {
    alert('⚠️ يرجى اختيار المقاس واللون أولاً');
    return;
  }

  const qty = 1;
  let variantId = null;
  let newStock = 0;
  
  if (selectedVariant) {
    variantId = selectedVariant.id;
    newStock = parseInt(selectedVariant.stock) - qty;
    if(newStock < 0) { alert('❌ نفذ المخزون لهذا المقاس واللون'); return; }
    await callApi('update_variant_stock', { variant_id: variantId, stock: newStock });
    // تحديث المخزون في الكائن المحلي
    selectedVariant.stock = newStock;
  } else {
    // لو مفيش متغيرات، استخدم المخزون العادي
    const stock = parseInt(latest.stock) || 0;
    if(stock < qty) { alert('❌ نفذ المخزون'); return; }
    // تحديث المخزون العادي (لو موجود)
  }

  await callApi('add_cart', { mid: marketerId, pid: latest.product_id });
  await updateCartBadge();
  alert('✅ تمت الإضافة للسلة');
  closeM('productModal');
  applyFilters();
}

}

async function openCart(){

  const r = await callApi('get_cart',{mid:marketerId}); if(Array.isArray(r)){ cartItems=r; renderCart(); }

function renderCart(){
  const body=document.getElementById('cartModalContent');
  if(!cartItems?.length){ body.innerHTML='<div class="empty-state"><div class="big">🛒</div><p>السلة فارغة حالياً</p></div>'; return; }
  let tp=0, tc=0, html='';
  cartItems.forEach(item=>{
    const sp=sellP(item.base_price), cm=comm(item.base_price), it=sp*item.qty, ic=cm*item.qty; tp+=it; tc+=ic;
    html+=`<div class="cart-item"><img src="${iurl(item.image_url)}" onerror="this.src='https://placehold.co/60x60/2a2a2a/808080?text=?'"><div class="cart-info"><div class="cart-name">${esc(cleanText(item.name))}</div><div class="cart-price">${sp} ج × ${item.qty} = ${it} ج</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:5px"><div class="qty-row"><button class="qty-btn" onclick="updQty('${item.cart_id}',-1)">−</button><span class="qty-num">${item.qty}</span><button class="qty-btn" onclick="updQty('${item.cart_id}',1)">+</button></div><button class="del-btn" onclick="delCart('${item.cart_id}')">حذف</button></div></div>`;
  });
  const ship=70; // سيتم تحديثه حسب المحافظة
  const ft=tp+tc+ship;
  body.innerHTML=html+`<div class="cart-total-bar"><div class="total-row"><span>المنتجات</span><span class="green">${tp} ج</span></div><div class="total-row"><span>العمولة</span><span class="gold">${tc} ج</span></div><div class="total-row"><span>الشحن</span><span class="muted">${ship} ج</span></div><div class="final-total"><span>الإجمالي</span><span>${ft} ج</span></div></div><div class="btn-row"><button class="btn btn-primary" onclick="checkout()">✅ إتمام الطلب</button><button class="btn btn-sec" onclick="closeM('cartModal')">إغلاق</button></div>`;
}

async function updQty(cid, diff){
  const item = cartItems.find(i=>i.cart_id===cid); if(!item) return;
  const nq = item.qty+diff; if(nq<1) return;
  const prod = allProducts.find(p=>String(p.product_id)===String(item.product_id));
  if(prod){
    const stockChange = diff * -1;
    const updatedStock = parseInt(prod.stock) + stockChange;
    if(updatedStock<0){ alert('❌ المخزون لا يكفي لزيادة الكمية'); return; }
    // تحديث المخزون في المنتج
    prod.stock = updatedStock;
  }
  await callApi('upd_cart',{cid, qty:nq});
  await openCart(); await updateCartBadge(); applyFilters();
}

async function delCart(cid){
  const item = cartItems.find(i=>i.cart_id===cid);
  if(item){
    const prod = allProducts.find(p=>String(p.product_id)===String(item.product_id));
    if(prod){
      const ns = parseInt(prod.stock)+parseInt(item.qty);
      prod.stock = ns;
    }
  }
  await callApi('del_cart',{cid}); await openCart(); await updateCartBadge(); applyFilters();
}

function checkout(){ if(!cartItems?.length){ alert('⚠️ السلة فارغة'); return; } currentOrderProducts=[...cartItems]; closeM('cartModal'); openOrderForm(); }

// ===== نموذج الطلب =====
function openOrderForm(){
  if(currentProduct && !currentOrderProducts?.length) currentOrderProducts=[{...currentProduct, qty:1, cart_id:'temp_'+Date.now()}];
  if(!currentOrderProducts?.length && !cartItems?.length){ alert('⚠️ يرجى اختيار منتج أولاً'); return; }
  if(!currentOrderProducts?.length && cartItems?.length) currentOrderProducts=[...cartItems];
  closeM('productModal'); closeM('cartModal');
  if(!currentOrderProducts?.length){ alert('⚠️ يرجى اختيار منتج أولاً'); return; }
  const p=currentOrderProducts[0]; const sp=sellP(p.base_price); const defaultComm=comm(p.base_price);
  const govOpts=Object.keys(CITIES).map(g=>`<option value="${g}">${g}</option>`).join('');
  let tp=0, tq=0, summary='';
  currentOrderProducts.forEach(item=>{
    const isp=sellP(item.base_price), qty=item.qty||1, it=isp*qty; tp+=it; tq+=qty;
    summary+=`<div style="font-size:11px;color:var(--text-2);padding:2px 0;border-bottom:1px solid var(--border);">${esc(cleanText(item.name))} ×${qty} = ${it} ج</div>`;
  });
  const ship=115; // القيمة الافتراضية
  const calcTotal=cv=>(tp+(parseFloat(cv)||0)+ship);
  document.getElementById('orderModalContent').innerHTML=`
    <div class="order-modal">
      <div class="order-badge"><img src="${iurl(p.image_url)}" onerror="this.src='https://placehold.co/60x60/2a2a2a/808080?text=🛍️'"><div><div class="ob-name">${tq} منتج في الطلب</div><div style="font-size:10px;color:var(--muted);">${currentOrderProducts.length} منتج مختلف</div></div></div>
      <div class="fsec">👤 بيانات العميل</div>
      <div class="fg"><label class="fl">👤 اسم العميل</label><input class="fi" id="oName" placeholder="أدخل اسم العميل"></div>
      <div class="fg"><label class="fl">📱 رقم الهاتف 1</label><input class="fi" id="oPhone" type="tel" placeholder="مثال: 01012345678"></div>
      <div class="fg"><label class="fl">📱 رقم هاتف إضافي (اختياري)</label><input class="fi" id="oPhone2" type="tel" placeholder="رقم آخر للتواصل"></div>
      <div class="fgrid"><div class="fg"><label class="fl">🏙️ المحافظة</label><select class="fi" id="oGovernorate" onchange="updateCities()"><option value="">اختر المحافظة</option>${govOpts}</select></div><div class="fg"><label class="fl">🏘️ المدينة</label><select class="fi" id="oCity"><option value="">اختر المدينة</option></select></div></div>
      <div class="fg"><label class="fl">📍 العنوان بالتفصيل</label><input class="fi" id="oAddress" placeholder="اسم الشارع، المنطقة، الرقم..."></div>
      <div class="fg"><label class="fl">📝 ملاحظات إضافية</label><input class="fi" id="oNotes" placeholder="أي ملاحظات للطلب..."></div>
      <div class="fsec">💰 تعديل العمولة</div>
      <div class="fg"><label class="fl">⭐ العمولة (ج) <span style="color:var(--gold);font-weight:900;">قابلة للتعديل</span></label><input class="fi fi-gold" id="oCommission" type="number" value="${defaultComm}" oninput="updateOrderTotal()" step="1" min="0"><div style="font-size:10px;color:var(--muted);margin-top:4px;">القيمة الافتراضية: ${defaultComm} ج</div></div>
      <div class="fsec">📋 ملخص الطلب</div>
      <div class="sum-box">
        ${summary}
        <div class="sum-row" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);"><span>إجمالي المنتجات</span><span>${tp} ج</span></div>
        <div class="sum-row" id="commissionRow"><span>العمولة</span><span style="color:var(--gold);" id="commissionDisplay">${defaultComm} ج</span></div>
        <div class="sum-row"><span>رسوم الشحن</span><span style="color:var(--muted);" id="shippingDisplay">${ship} ج</span></div>
        <div class="sum-total" id="finalTotal"><span>الإجمالي النهائي</span><span id="totalAmount">${calcTotal(defaultComm)} ج</span></div>
      </div>
      <div class="btn-row"><button class="btn btn-primary" onclick="submitOrder()">✅ تأكيد الطلب</button><button class="btn btn-sec" onclick="closeM('orderModal')">إلغاء</button></div>
    </div>`;
  openM('orderModal');
}

function updateOrderTotal(){
  const ci=document.getElementById('oCommission'), cd=document.getElementById('commissionDisplay'), td=document.getElementById('totalAmount');
  if(!ci||!cd||!td) return; const cv=parseFloat(ci.value)||0; cd.textContent=cv+' ج';
  let tp=0; currentOrderProducts.forEach(item=>{ const isp=sellP(item.base_price), qty=item.qty||1; tp+=isp*qty; });
  const gov = document.getElementById('oGovernorate')?.value || '';
  const ship = getShippingCost(gov);
  const shippingDisplay = document.getElementById('shippingDisplay');
  if (shippingDisplay) shippingDisplay.textContent = ship + ' ج';
  td.textContent=(tp+cv+ship)+' ج';
}

function updateCities(){
  const gov=document.getElementById('oGovernorate').value, cs=document.getElementById('oCity');
  cs.innerHTML='<option value="">اختر المدينة</option>';
  if(gov&&CITIES[gov]) CITIES[gov].forEach(city=>{ cs.innerHTML+=`<option value="${city}">${city}</option>`; });
  updateOrderTotal();
}

async function submitOrder(){
  if(!currentOrderProducts?.length){ alert('❌ لا توجد منتجات في الطلب'); return; }
  const name=document.getElementById('oName').value.trim(), phone=document.getElementById('oPhone').value.trim(), phone2=document.getElementById('oPhone2').value.trim();
  const gov=document.getElementById('oGovernorate').value, city=document.getElementById('oCity').value, address=document.getElementById('oAddress').value.trim(), notes=document.getElementById('oNotes').value.trim();
  const cc=parseFloat(document.getElementById('oCommission').value)||0;
  if(!name||!phone||!gov||!city||!address){ alert('⚠️ يرجى ملء جميع البيانات الأساسية'); return; }
  const shippingCost = getShippingCost(gov);
  const btn=document.querySelector('#orderModalContent .btn-primary'); if(btn){ btn.disabled=true; btn.textContent='⏳ جاري الإرسال...'; }
  try{
    let ok=true, ids=[];
    for(const item of currentOrderProducts){
      const bp=parseFloat(item.base_price)||0, qty=item.qty||1, total=bp*qty+cc+shippingCost;
      const oid='ORD-'+Date.now()+'-'+String(item.product_id);
      const res=await callApi('place_order',{order_id:oid,product_id:String(item.product_id),customer_name:name,phone,phone2,governorate:gov,city,address,qty,size:'',color:'',price:bp,shipping:shippingCost,total_price:total,commission:cc,site_profit:SITE_PROFIT,notes,marketer_username:marketerName,marketer_id:marketerId,order_status:'pending'});
      if(res.status==='error'){ ok=false; alert('❌ فشل: '+ (item.name||'') +'\n'+ (res.message||'')); break; }
      ids.push(oid);
    }
    if(ok){
      for(const item of currentOrderProducts){ if(item.cart_id && !item.cart_id.startsWith('temp_')) await callApi('del_cart',{cid:item.cart_id}); }
      cartItems=[]; await updateCartBadge(); alert('✅ تم الطلب! العدد: '+currentOrderProducts.length+'\nالعمولة: '+cc+' ج\nالشحن: '+shippingCost+' ج'); closeM('orderModal'); currentOrderProducts=[];
    }
  }catch(e){ alert('❌ '+e.message); } finally{ if(btn){ btn.disabled=false; btn.textContent='✅ تأكيد الطلب'; } }
}

// ===== بدء التشغيل =====
loadProducts(); updateCartBadge();
</script>
